name = "freedesignstore-mcp"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
PUBLIC_BASE_URL = "https://freedesignstore.online"
PUBLIC_MCP_BASE_URL = "https://mcp.freedesignstore.online"

[[routes]]
pattern = "mcp.freedesignstore.online/*"
zone_name = "freedesignstore.online"

# Secrets:
#   STOCK_ADMIN_TOKEN - same value used by the Pages Functions upload backend.
#   MCP_ADMIN_TOKEN   - optional separate write token for MCP clients.
#   SESSION_SIGNING_KEY - signs/verifies FDS creator sessions and MCP OAuth tokens.
#   FDS_CREATOR_TOKENS - optional static creator-token map.
#   FDS_GITHUB_CLIENT_ID / FDS_GITHUB_CLIENT_SECRET - GitHub OAuth app for creator sign-in.
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET - optional Google OAuth app for creator sign-in.
#   GOOGLE_OAUTH_ENABLED=true - enable Google only after its callback URL is authorized.
#
# Before deploy, replace the KV id with the namespace bound to the Pages project
# as FDS_STOCK_KV. The R2 bucket name must match the Pages FDS_STOCK_BUCKET bucket.

[[kv_namespaces]]
binding = "FDS_STOCK_KV"
id = "ed27d698c5bb4c36a3ef4247eb5629ed"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "157d8b3edc6343b585cea227e9085165"

[[r2_buckets]]
binding = "FDS_STOCK_BUCKET"
bucket_name = "fds-stock-assets"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "FdsCatalogMcp" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FdsCatalogMcp"]
