name: Deploy Store
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workers/mcp/package-lock.json
      - name: Install MCP worker dependencies
        working-directory: workers/mcp
        run: npm ci
      - name: Run MCP regression tests
        working-directory: workers/mcp
        run: npm test
      - name: Typecheck MCP worker
        working-directory: workers/mcp
        run: npm run typecheck
      - name: Compile Pages Functions
        run: ./workers/mcp/node_modules/.bin/wrangler pages functions build functions --outfile /tmp/fds-functions-build/worker.js

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workers/mcp/package-lock.json
      - name: Install deploy dependencies
        working-directory: workers/mcp
        run: npm ci
      - name: Ensure MCP DNS record
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          node <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const zoneName = 'freedesignstore.online';
          const recordName = 'mcp.freedesignstore.online';
          const content = 'freedesignstore-mcp.serge-the-dev.workers.dev';
          const headers = {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          };
          async function cf(path, init = {}) {
            const res = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
              ...init,
              headers: { ...headers, ...(init.headers || {}) },
            });
            const body = await res.json();
            if (!res.ok || !body.success) {
              throw new Error(JSON.stringify(body.errors || body));
            }
            return body.result;
          }
          const zones = await cf(`/zones?name=${encodeURIComponent(zoneName)}`);
          const zone = zones[0];
          if (!zone) throw new Error(`Zone not found: ${zoneName}`);
          const existing = await cf(`/zones/${zone.id}/dns_records?type=CNAME&name=${encodeURIComponent(recordName)}`);
          const payload = JSON.stringify({ type: 'CNAME', name: recordName, content, ttl: 1, proxied: true });
          if (existing[0]) {
            await cf(`/zones/${zone.id}/dns_records/${existing[0].id}`, { method: 'PUT', body: payload });
            console.log(`Updated ${recordName}`);
          } else {
            await cf(`/zones/${zone.id}/dns_records`, { method: 'POST', body: payload });
            console.log(`Created ${recordName}`);
          }
          NODE
      - name: Deploy MCP Worker
        working-directory: workers/mcp
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Cloudflare Pages
        run: ./workers/mcp/node_modules/.bin/wrangler pages deploy store --project-name freedesignstore
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify production MCP surface
        run: |
          node <<'NODE'
          const base = 'https://mcp.freedesignstore.online';
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function retry(name, fn) {
            let lastError;
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                await fn();
                console.log(`${name}: ok`);
                return;
              } catch (error) {
                lastError = error;
                console.log(`${name}: attempt ${attempt} failed: ${error.message}`);
                await sleep(5000);
              }
            }
            throw lastError;
          }

          await retry('MCP discovery', async () => {
            const res = await fetch(`${base}/.well-known/mcp.json`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const body = await res.json();
            if (body?.servers?.[0]?.endpoint !== `${base}/mcp`) {
              throw new Error(`unexpected endpoint ${body?.servers?.[0]?.endpoint}`);
            }
            if ((body?.servers?.[0]?.tools || []).length !== 14) {
              throw new Error('expected 14 MCP tools in discovery');
            }
          });

          await retry('MCP health', async () => {
            const res = await fetch(`${base}/health`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const body = await res.json();
            if (!body.ok || body.tools !== 14) throw new Error(`bad health ${JSON.stringify(body)}`);
          });

          await retry('MCP OAuth challenge', async () => {
            const res = await fetch(`${base}/mcp`, { cache: 'no-store' });
            const text = await res.text();
            if (res.status !== 401) throw new Error(`expected 401, got ${res.status}`);
            const challenge = res.headers.get('www-authenticate') || '';
            if (!challenge.includes(`${base}/.well-known/oauth-protected-resource/mcp`)) {
              throw new Error(`missing FDS OAuth resource metadata: ${challenge || text}`);
            }
          });
          NODE
