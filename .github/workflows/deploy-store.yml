name: Deploy Store
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workers/mcp/package-lock.json
      - name: Install MCP worker dependencies
        working-directory: workers/mcp
        run: npm ci
      - name: Run MCP regression tests
        working-directory: workers/mcp
        run: npm test
      - name: Typecheck MCP worker
        working-directory: workers/mcp
        run: npm run typecheck
      - name: Compile Pages Functions
        run: ./workers/mcp/node_modules/.bin/wrangler pages functions build functions --outfile /tmp/fds-functions-build/worker.js

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workers/mcp/package-lock.json
      - name: Install deploy dependencies
        working-directory: workers/mcp
        run: npm ci
      - name: Deploy Cloudflare Pages
        run: ./workers/mcp/node_modules/.bin/wrangler pages deploy store --project-name freedesignstore
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify production MCP surface
        run: |
          node <<'NODE'
          const base = 'https://freedesignstore.pages.dev';
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function retry(name, fn) {
            let lastError;
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                await fn();
                console.log(`${name}: ok`);
                return;
              } catch (error) {
                lastError = error;
                console.log(`${name}: attempt ${attempt} failed: ${error.message}`);
                await sleep(5000);
              }
            }
            throw lastError;
          }

          await retry('MCP discovery', async () => {
            const res = await fetch(`${base}/.well-known/mcp.json`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const body = await res.json();
            if (body?.servers?.[0]?.endpoint !== `${base}/mcp`) {
              throw new Error(`unexpected endpoint ${body?.servers?.[0]?.endpoint}`);
            }
            if ((body?.servers?.[0]?.tools || []).length !== 10) {
              throw new Error('expected 10 MCP tools in discovery');
            }
          });

          await retry('MCP health', async () => {
            const res = await fetch(`${base}/health`, { cache: 'no-store' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const body = await res.json();
            if (!body.ok || body.tools !== 10) throw new Error(`bad health ${JSON.stringify(body)}`);
          });

          await retry('MCP unauthenticated guard', async () => {
            const res = await fetch(`${base}/mcp`, { cache: 'no-store' });
            const text = await res.text();
            if (res.status !== 401) throw new Error(`expected 401, got ${res.status}`);
            if (!text.includes('FDS creator/admin bearer token')) throw new Error(`unexpected body ${text}`);
          });
          NODE
