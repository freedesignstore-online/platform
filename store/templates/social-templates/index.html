<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Template Editor - FreeDesignStore</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; padding: 24px; }
a { color: #ec4899; text-decoration: none; }
a:hover { text-decoration: underline; }
.back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; font-size: 14px; color: #6b7280; }
.back:hover { color: #ec4899; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.subtitle { color: #6b7280; margin-bottom: 24px; font-size: 15px; }
.container { max-width: 1200px; margin: 0 auto; }
.panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 20px; }
.layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
@media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }
.canvas-area { display: flex; align-items: center; justify-content: center; background: repeating-conic-gradient(#e5e7eb 0% 25%, transparent 0% 50%) 50%/20px 20px; border-radius: 12px; padding: 24px; min-height: 400px; }
#canvas { border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
label { display: block; font-size: 13px; font-weight: 500; color: #6b7280; margin-bottom: 4px; margin-top: 14px; }
label:first-child { margin-top: 0; }
select, input[type="text"], textarea { width: 100%; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; }
textarea { resize: vertical; min-height: 60px; }
input[type="color"] { width: 100%; height: 38px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 3px; cursor: pointer; }
.color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.templates-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
.tpl-btn { aspect-ratio: 1; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4px; font-weight: 600; color: #6b7280; transition: all .15s; }
.tpl-btn:hover, .tpl-btn.active { border-color: #ec4899; color: #ec4899; }
.btn { padding: 10px 18px; border-radius: 8px; border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-primary { background: #ec4899; color: #fff; width: 100%; margin-top: 20px; }
.btn-primary:hover { background: #db2777; }
.btn-secondary { background: #fff; border: 1px solid #e5e7eb; color: #1a1a1a; width: 100%; margin-top: 8px; }
.btn-secondary:hover { border-color: #ec4899; }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back">&larr; Back to FreeDesignStore</a>
  <h1>Social Media Template Editor</h1>
  <p class="subtitle">Create platform-perfect social media graphics. Choose a template, customize, and download.</p>

  <div class="layout">
    <div class="panel canvas-area">
      <canvas id="canvas"></canvas>
    </div>
    <div class="panel">
      <label>Platform</label>
      <select id="platform">
        <option value="ig-post">Instagram Post (1080x1080)</option>
        <option value="ig-story">Instagram Story (1080x1920)</option>
        <option value="twitter">X / Twitter (1200x675)</option>
        <option value="linkedin">LinkedIn (1200x627)</option>
        <option value="facebook">Facebook (1200x630)</option>
      </select>

      <label>Layout Template</label>
      <div class="templates-row" id="templatesRow"></div>

      <label>Heading</label>
      <input type="text" id="heading" value="Your Headline Here" maxlength="80">

      <label>Subheading</label>
      <input type="text" id="subheading" value="Supporting text goes here" maxlength="120">

      <label>Body Text</label>
      <textarea id="bodyText">Add your message or call to action</textarea>

      <div class="color-row">
        <div>
          <label>Background</label>
          <input type="color" id="bgColor" value="#1a1a1a">
        </div>
        <div>
          <label>Text Color</label>
          <input type="color" id="textColor" value="#ffffff">
        </div>
      </div>
      <div class="color-row">
        <div>
          <label>Accent</label>
          <input type="color" id="accentColor" value="#ec4899">
        </div>
        <div>
          <label>Background Image</label>
          <input type="file" id="bgImage" accept="image/*" style="margin-top:4px;font-size:12px;border:none;padding:0;">
        </div>
      </div>

      <button class="btn btn-primary" id="downloadBtn">Download PNG</button>
      <button class="btn btn-secondary" id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const platformSel = document.getElementById('platform');
const headingInput = document.getElementById('heading');
const subheadingInput = document.getElementById('subheading');
const bodyTextInput = document.getElementById('bodyText');
const bgColorInput = document.getElementById('bgColor');
const textColorInput = document.getElementById('textColor');
const accentColorInput = document.getElementById('accentColor');
const bgImageInput = document.getElementById('bgImage');
const templatesRow = document.getElementById('templatesRow');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');

const sizes = {
  'ig-post': [1080, 1080],
  'ig-story': [1080, 1920],
  'twitter': [1200, 675],
  'linkedin': [1200, 627],
  'facebook': [1200, 630]
};

const layouts = {
  'ig-post': ['Center','Bottom','Split','Minimal'],
  'ig-story': ['Center','Top','Gradient','Bold'],
  'twitter': ['Left','Center','Banner','Quote'],
  'linkedin': ['Professional','Center','Split','Minimal'],
  'facebook': ['Center','Overlay','Side','Bold']
};

let currentLayout = 0;
let bgImg = null;

function getSize() { return sizes[platformSel.value]; }

function renderTemplateButtons() {
  const names = layouts[platformSel.value];
  templatesRow.innerHTML = names.map((n, i) =>
    `<div class="tpl-btn ${i === currentLayout ? 'active' : ''}" data-i="${i}">${n}</div>`
  ).join('');
}

function wrapText(text, x, y, maxWidth, lineHeight, align) {
  ctx.textAlign = align || 'center';
  const words = text.split(' ');
  let line = '';
  let lines = [];
  words.forEach(word => {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line.trim());
      line = word + ' ';
    } else {
      line = test;
    }
  });
  lines.push(line.trim());
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  return lines.length * lineHeight;
}

function render() {
  const [w, h] = getSize();
  const scale = Math.min(600 / w, 500 / h, 1);
  canvas.width = w;
  canvas.height = h;
  canvas.style.width = w * scale + 'px';
  canvas.style.height = h * scale + 'px';

  const bg = bgColorInput.value;
  const tc = textColorInput.value;
  const ac = accentColorInput.value;
  const heading = headingInput.value;
  const sub = subheadingInput.value;
  const body = bodyTextInput.value;
  const layout = currentLayout;

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  if (bgImg) {
    const ir = bgImg.width / bgImg.height;
    const cr = w / h;
    let sw = bgImg.width, sh = bgImg.height, sx = 0, sy = 0;
    if (ir > cr) { sw = bgImg.height * cr; sx = (bgImg.width - sw) / 2; }
    else { sh = bgImg.width / cr; sy = (bgImg.height - sh) / 2; }
    ctx.drawImage(bgImg, sx, sy, sw, sh, 0, 0, w, h);
    ctx.fillStyle = bg + '99';
    ctx.fillRect(0, 0, w, h);
  }

  const pad = w * 0.08;
  const headSize = Math.round(w * 0.065);
  const subSize = Math.round(w * 0.035);
  const bodySize = Math.round(w * 0.028);

  if (layout === 0) { // Center
    ctx.fillStyle = tc;
    ctx.font = `800 ${headSize}px Manrope, system-ui`;
    wrapText(heading, w/2, h*0.38, w - pad*2, headSize*1.2, 'center');
    ctx.font = `500 ${subSize}px Manrope, system-ui`;
    ctx.fillStyle = ac;
    wrapText(sub, w/2, h*0.55, w - pad*2, subSize*1.3, 'center');
    ctx.font = `400 ${bodySize}px Manrope, system-ui`;
    ctx.fillStyle = tc + 'cc';
    wrapText(body, w/2, h*0.68, w - pad*2, bodySize*1.4, 'center');
  } else if (layout === 1) { // Bottom/Top
    const yStart = layout === 1 ? h * 0.6 : h * 0.15;
    ctx.fillStyle = ac;
    ctx.fillRect(pad, yStart - headSize*0.5, w*0.12, 4);
    ctx.fillStyle = tc;
    ctx.font = `800 ${headSize}px Manrope, system-ui`;
    const hh = wrapText(heading, pad, yStart + headSize, w - pad*2, headSize*1.2, 'left');
    ctx.font = `500 ${subSize}px Manrope, system-ui`;
    ctx.fillStyle = tc + 'bb';
    wrapText(sub, pad, yStart + headSize + hh + subSize, w - pad*2, subSize*1.3, 'left');
  } else if (layout === 2) { // Split/Gradient
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, ac + '44');
    grad.addColorStop(1, bg);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = tc;
    ctx.font = `800 ${headSize}px Manrope, system-ui`;
    wrapText(heading, w/2, h*0.35, w - pad*2, headSize*1.2, 'center');
    ctx.font = `400 ${subSize}px Manrope, system-ui`;
    ctx.fillStyle = tc + 'cc';
    wrapText(sub, w/2, h*0.58, w - pad*2, subSize*1.3, 'center');
    ctx.fillStyle = ac;
    const btnW = Math.min(ctx.measureText(body).width + 60, w - pad*2);
    ctx.beginPath();
    ctx.roundRect((w - btnW)/2, h*0.72, btnW, subSize*2.2, subSize*1.1);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `600 ${bodySize}px Manrope, system-ui`;
    ctx.fillText(body, w/2, h*0.72 + subSize*1.4);
  } else { // Minimal/Bold
    ctx.fillStyle = ac;
    ctx.fillRect(0, 0, w, h * 0.01);
    ctx.fillRect(0, h * 0.99, w, h * 0.01);
    ctx.fillStyle = tc;
    ctx.font = `800 ${Math.round(headSize*1.3)}px Manrope, system-ui`;
    wrapText(heading, w/2, h*0.45, w - pad*2, headSize*1.5, 'center');
    ctx.font = `500 ${subSize}px Manrope, system-ui`;
    ctx.fillStyle = ac;
    ctx.fillText(sub, w/2, h*0.7);
  }
}

platformSel.addEventListener('change', () => { currentLayout = 0; renderTemplateButtons(); render(); });
templatesRow.addEventListener('click', e => {
  const btn = e.target.closest('.tpl-btn');
  if (!btn) return;
  currentLayout = parseInt(btn.dataset.i);
  renderTemplateButtons();
  render();
});

[headingInput, subheadingInput, bodyTextInput].forEach(el => el.addEventListener('input', render));
[bgColorInput, textColorInput, accentColorInput].forEach(el => el.addEventListener('input', render));

bgImageInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => { bgImg = img; render(); };
  img.src = URL.createObjectURL(file);
});

downloadBtn.addEventListener('click', () => {
  const [w, h] = getSize();
  const offscreen = document.createElement('canvas');
  offscreen.width = w; offscreen.height = h;
  const octx = offscreen.getContext('2d');
  octx.drawImage(canvas, 0, 0);
  const link = document.createElement('a');
  link.download = `social-${platformSel.value}-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

resetBtn.addEventListener('click', () => {
  headingInput.value = 'Your Headline Here';
  subheadingInput.value = 'Supporting text goes here';
  bodyTextInput.value = 'Add your message or call to action';
  bgColorInput.value = '#1a1a1a';
  textColorInput.value = '#ffffff';
  accentColorInput.value = '#ec4899';
  bgImg = null;
  bgImageInput.value = '';
  currentLayout = 0;
  renderTemplateButtons();
  render();
});

renderTemplateButtons();
render();
</script>
<script src="/related.js"></script>
</body>
</html>
