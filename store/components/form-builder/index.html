<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Builder - FreeDesignStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh}
a.back{display:inline-block;margin:24px 24px 0;color:#ec4899;text-decoration:none;font-weight:500}
a.back:hover{text-decoration:underline}
h1{font-size:28px;font-weight:700;margin:12px 24px 4px}
p.sub{color:#6b7280;margin:0 24px 16px;font-size:14px}
.app{display:flex;gap:16px;margin:0 24px 24px;min-height:600px}
.palette{width:240px;flex-shrink:0;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;overflow-y:auto}
.palette h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#374151}
.palette-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:6px;cursor:grab;font-size:13px;font-weight:500;transition:all .15s;background:#fff}
.palette-item:hover{border-color:#ec4899;background:rgba(236,72,153,.04)}
.palette-item:active{cursor:grabbing}
.palette-icon{width:28px;height:28px;border-radius:6px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.form-area{flex:1;display:flex;flex-direction:column;min-width:0}
.form-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.btn{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;font-size:13px;transition:all .15s}
.btn:hover{opacity:.85}
.btn-p{background:#ec4899;color:#fff}
.btn-s{background:#f3f4f6;color:#1a1a1a;border:1px solid #e5e7eb}
.btn-s.active{background:#ec4899;color:#fff;border-color:#ec4899}
select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff}
.form-canvas{flex:1;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;overflow-y:auto;min-height:400px;position:relative}
.form-canvas.drag-over{border-color:#ec4899;background:rgba(236,72,153,.02)}
.form-canvas.empty::after{content:'Drag fields here to build your form';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#9ca3af;font-size:14px;pointer-events:none}
.form-canvas.layout-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-canvas.layout-inline .field-wrap{display:inline-block;vertical-align:top;margin-right:12px}
.field-wrap{position:relative;padding:12px;border:2px solid transparent;border-radius:8px;margin-bottom:12px;transition:border-color .15s;cursor:pointer}
.field-wrap:hover{border-color:#e5e7eb}
.field-wrap.selected{border-color:#ec4899;background:rgba(236,72,153,.03)}
.field-wrap.dragging{opacity:.4}
.field-wrap.drag-target{border-color:#ec4899;border-style:dashed}
.field-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#374151}
.field-label .req{color:#ef4444;margin-left:2px}
.field-input{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:14px;background:#fff}
.field-input:focus{outline:none;border-color:#ec4899;box-shadow:0 0 0 3px rgba(236,72,153,.1)}
textarea.field-input{resize:vertical;min-height:60px}
select.field-input{appearance:auto}
.field-help{font-size:11px;color:#9ca3af;margin-top:4px}
.field-error{font-size:11px;color:#ef4444;margin-top:4px;display:none}
.field-actions{position:absolute;top:4px;right:4px;display:none;gap:4px}
.field-wrap:hover .field-actions,.field-wrap.selected .field-actions{display:flex}
.fa-btn{width:24px;height:24px;border:1px solid #e5e7eb;border-radius:4px;background:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:#6b7280;transition:all .15s}
.fa-btn:hover{border-color:#ec4899;color:#ec4899}
.fa-btn.del:hover{border-color:#ef4444;color:#ef4444}
.props-panel{width:280px;flex-shrink:0;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;overflow-y:auto}
.props-panel h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#374151}
.prop-row{margin-bottom:10px}
.prop-row label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px}
.prop-row input[type="text"],.prop-row input[type="number"],.prop-row textarea,.prop-row select{width:100%;padding:7px 10px;border:1px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:13px;background:#fff}
.prop-row textarea{resize:vertical;min-height:40px}
.prop-row .toggle-row{display:flex;align-items:center;gap:8px}
.toggle-sm{width:36px;height:20px;border-radius:10px;border:none;background:#d1d5db;position:relative;cursor:pointer;padding:0;transition:background .2s}
.toggle-sm.on{background:#ec4899}
.toggle-sm::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle-sm.on::after{transform:translateX(16px)}
.step-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:12px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:12px}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#6b7280;cursor:pointer;transition:all .15s}
.step-dot.active{border-color:#ec4899;background:#ec4899;color:#fff}
.step-dot:hover{border-color:#ec4899}
.step-line{flex:1;height:2px;background:#e5e7eb}
.export-panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;margin:0 24px 24px;overflow:hidden}
.export-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e5e7eb}
.export-header h3{font-size:14px;font-weight:700}
.export-tabs{display:flex;gap:4px}
.ex-tab{padding:4px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#6b7280;transition:all .15s}
.ex-tab:hover{border-color:#ec4899;color:#ec4899}
.ex-tab.active{background:#ec4899;color:#fff;border-color:#ec4899}
.export-code{padding:16px;font-family:'Courier New',monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;max-height:300px;overflow:auto;background:#fafafa}
.presets-bar{display:flex;gap:6px;margin:0 24px 12px;flex-wrap:wrap}
.preset-btn{padding:6px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:#6b7280;transition:all .15s}
.preset-btn:hover{border-color:#ec4899;color:#ec4899}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.check-group label,.radio-group label{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;margin-bottom:4px}
.check-group input,.radio-group input{accent-color:#ec4899;width:16px;height:16px}
input[type="range"].field-input{padding:6px 0;accent-color:#ec4899}
input[type="color"].field-input{width:60px;height:40px;padding:2px;cursor:pointer}
</style>
</head>
<body>
<a class="back" href="/">Back to FreeDesignStore</a>
<h1>Drag & Drop Form Builder</h1>
<p class="sub">Build forms visually. Drag fields, customize properties, export clean HTML/CSS, Tailwind, or React.</p>

<div class="presets-bar" id="presetsBar"></div>

<div id="stepBar" class="step-bar" style="margin:0 24px 12px;display:none"></div>

<div class="form-toolbar" style="margin:0 24px 12px">
<label style="font-size:12px;font-weight:600;color:#6b7280">Layout:</label>
<select id="layoutSelect">
<option value="single">Single Column</option>
<option value="two">Two Columns</option>
<option value="inline">Inline</option>
</select>
<button class="btn btn-s" id="addStepBtn">+ Add Step</button>
<button class="btn btn-s" id="removeStepBtn">- Remove Step</button>
<button class="btn btn-s" id="previewValidation">Preview Validation</button>
<button class="btn btn-s" id="saveBtn">Save</button>
<button class="btn btn-s" id="loadBtn">Load</button>
</div>

<div class="app">
<div class="palette" id="palette"></div>
<div class="form-canvas empty" id="formCanvas"></div>
<div class="props-panel" id="propsPanel"><h3>Properties</h3><p style="font-size:13px;color:#9ca3af">Select a field to edit its properties.</p></div>
</div>

<div class="export-panel">
<div class="export-header">
<h3>Generated Code</h3>
<div class="export-tabs" id="exportTabs">
<button class="ex-tab active" data-fmt="html">HTML + CSS</button>
<button class="ex-tab" data-fmt="tw">HTML + Tailwind</button>
<button class="ex-tab" data-fmt="react">React JSX</button>
</div>
<button class="btn btn-p" id="copyExport">Copy</button>
</div>
<div class="export-code" id="exportCode"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const FIELD_TYPES = [
  {type:'text',icon:'Aa',label:'Text Input'},
  {type:'email',icon:'@',label:'Email'},
  {type:'password',icon:'*',label:'Password'},
  {type:'number',icon:'#',label:'Number'},
  {type:'phone',icon:'T',label:'Phone'},
  {type:'url',icon:'/',label:'URL'},
  {type:'textarea',icon:'=',label:'Textarea'},
  {type:'select',icon:'v',label:'Dropdown'},
  {type:'checkbox',icon:'x',label:'Checkbox'},
  {type:'radio',icon:'o',label:'Radio Group'},
  {type:'toggle',icon:'~',label:'Toggle'},
  {type:'date',icon:'D',label:'Date'},
  {type:'file',icon:'F',label:'File Upload'},
  {type:'range',icon:'-',label:'Range Slider'},
  {type:'color',icon:'C',label:'Color Picker'},
  {type:'hidden',icon:'H',label:'Hidden'}
];

const PRESETS = {
  Login: [
    {type:'email',label:'Email',placeholder:'you@example.com',required:true},
    {type:'password',label:'Password',placeholder:'Enter password',required:true}
  ],
  Register: [
    {type:'text',label:'Full Name',placeholder:'John Doe',required:true},
    {type:'email',label:'Email',placeholder:'you@example.com',required:true},
    {type:'password',label:'Password',placeholder:'Min 8 characters',required:true,help:'At least 8 characters with one number'},
    {type:'checkbox',label:'I agree to the Terms of Service',required:true}
  ],
  Contact: [
    {type:'text',label:'Name',placeholder:'Your name',required:true},
    {type:'email',label:'Email',placeholder:'you@example.com',required:true},
    {type:'phone',label:'Phone',placeholder:'+1 (555) 000-0000'},
    {type:'select',label:'Subject',options:['General Inquiry','Support','Sales','Other'],required:true},
    {type:'textarea',label:'Message',placeholder:'How can we help?',required:true}
  ],
  Subscribe: [
    {type:'email',label:'Email Address',placeholder:'you@example.com',required:true},
    {type:'toggle',label:'Send me weekly updates'}
  ],
  Survey: [
    {type:'text',label:'Name',placeholder:'Optional'},
    {type:'radio',label:'How did you hear about us?',options:['Google','Social Media','Friend','Other']},
    {type:'range',label:'How satisfied are you? (1-10)'},
    {type:'textarea',label:'Any feedback?',placeholder:'Tell us what you think...'}
  ],
  Checkout: [
    {type:'text',label:'Full Name',placeholder:'Cardholder name',required:true},
    {type:'email',label:'Email',placeholder:'Receipt email',required:true},
    {type:'text',label:'Address',placeholder:'123 Main St',required:true},
    {type:'text',label:'City',placeholder:'City',required:true},
    {type:'select',label:'Country',options:['United States','United Kingdom','Canada','Australia'],required:true},
    {type:'text',label:'ZIP / Postal Code',placeholder:'10001',required:true}
  ],
  'Profile Edit': [
    {type:'text',label:'Display Name',placeholder:'Your display name',required:true},
    {type:'email',label:'Email',placeholder:'you@example.com',required:true},
    {type:'url',label:'Website',placeholder:'https://yoursite.com'},
    {type:'textarea',label:'Bio',placeholder:'Tell us about yourself'},
    {type:'file',label:'Avatar',help:'PNG or JPG, max 2MB'},
    {type:'toggle',label:'Public Profile'}
  ]
};

let fields = []; // [{id, type, label, placeholder, required, help, options, validation, step}]
let selectedId = null;
let layout = 'single';
let exportFmt = 'html';
let steps = 1;
let currentStep = 1;
let nextId = 1;

function uid() { return 'f' + (nextId++); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function buildPalette() {
  const pal = document.getElementById('palette');
  pal.innerHTML = '<h3>Field Types</h3>';
  FIELD_TYPES.forEach(ft => {
    const el = document.createElement('div');
    el.className = 'palette-item';
    el.draggable = true;
    el.innerHTML = `<div class="palette-icon">${ft.icon}</div>${ft.label}`;
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('fieldType', ft.type);
      e.dataTransfer.effectAllowed = 'copy';
    });
    pal.appendChild(el);
  });
}

function buildPresets() {
  const bar = document.getElementById('presetsBar');
  bar.innerHTML = '<span style="font-size:12px;font-weight:600;color:#6b7280;padding:6px 0">Presets:</span>';
  Object.keys(PRESETS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = name;
    btn.onclick = () => loadPreset(name);
    bar.appendChild(btn);
  });
}

function loadPreset(name) {
  const preset = PRESETS[name];
  if (!preset) return;
  fields = preset.map(f => ({
    id: uid(), type: f.type, label: f.label || '', placeholder: f.placeholder || '',
    required: f.required || false, help: f.help || '', options: f.options || ['Option 1','Option 2','Option 3'],
    validation: '', step: 1
  }));
  steps = 1; currentStep = 1; selectedId = null;
  renderForm(); renderSteps(); updateExport();
}

function addField(type, atIndex) {
  const ft = FIELD_TYPES.find(f => f.type === type);
  const field = {
    id: uid(), type, label: ft ? ft.label : type, placeholder: '',
    required: false, help: '', options: ['Option 1','Option 2','Option 3'],
    validation: '', step: currentStep
  };
  if (atIndex !== undefined) fields.splice(atIndex, 0, field);
  else fields.push(field);
  selectedId = field.id;
  renderForm(); renderProps(); updateExport();
}

function renderForm() {
  const canvas = document.getElementById('formCanvas');
  const stepFields = fields.filter(f => f.step === currentStep);
  canvas.className = 'form-canvas' + (stepFields.length === 0 ? ' empty' : '') + (layout === 'two' ? ' layout-2' : '') + (layout === 'inline' ? ' layout-inline' : '');
  canvas.innerHTML = '';
  stepFields.forEach((f, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'field-wrap' + (selectedId === f.id ? ' selected' : '');
    wrap.dataset.id = f.id;
    wrap.draggable = true;

    let inner = '';
    if (f.type !== 'hidden') {
      inner += `<label class="field-label">${f.label}${f.required ? '<span class="req">*</span>' : ''}</label>`;
    }

    switch (f.type) {
      case 'text': case 'email': case 'password': case 'number': case 'phone': case 'url':
        inner += `<input class="field-input" type="${f.type === 'phone' ? 'tel' : f.type}" placeholder="${f.placeholder}">`;
        break;
      case 'textarea':
        inner += `<textarea class="field-input" placeholder="${f.placeholder}" rows="3"></textarea>`;
        break;
      case 'select':
        inner += `<select class="field-input">${(f.options||[]).map(o => `<option>${o}</option>`).join('')}</select>`;
        break;
      case 'checkbox':
        inner += `<div class="check-group"><label><input type="checkbox"> ${f.label}</label></div>`;
        break;
      case 'radio':
        inner += `<div class="radio-group">${(f.options||[]).map((o,j) => `<label><input type="radio" name="r_${f.id}" ${j===0?'checked':''}> ${o}</label>`).join('')}</div>`;
        break;
      case 'toggle':
        inner += `<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><button class="toggle-sm on" onclick="this.classList.toggle('on')" type="button"></button><span style="font-size:14px">${f.label}</span></label>`;
        break;
      case 'date':
        inner += `<input class="field-input" type="date">`;
        break;
      case 'file':
        inner += `<div style="border:2px dashed #e5e7eb;border-radius:8px;padding:20px;text-align:center;font-size:13px;color:#9ca3af;cursor:pointer">Click or drag to upload</div>`;
        break;
      case 'range':
        inner += `<input class="field-input" type="range" min="0" max="10" value="5">`;
        break;
      case 'color':
        inner += `<input class="field-input" type="color" value="#ec4899">`;
        break;
      case 'hidden':
        inner += `<div style="padding:8px;background:#f3f4f6;border-radius:6px;font-size:12px;color:#9ca3af">Hidden field: ${f.label}</div>`;
        break;
    }

    if (f.help) inner += `<div class="field-help">${f.help}</div>`;
    inner += `<div class="field-error">This field is required</div>`;
    inner += `<div class="field-actions">
      <button class="fa-btn" title="Move up" data-action="up">&uarr;</button>
      <button class="fa-btn" title="Move down" data-action="down">&darr;</button>
      <button class="fa-btn" title="Duplicate" data-action="dup">D</button>
      <button class="fa-btn del" title="Delete" data-action="del">&times;</button>
    </div>`;

    wrap.innerHTML = inner;
    wrap.onclick = (e) => {
      if (e.target.closest('.field-actions')) return;
      selectedId = f.id;
      renderForm(); renderProps();
    };

    wrap.querySelectorAll('.fa-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const idx = fields.indexOf(f);
        if (action === 'del') { fields.splice(idx, 1); if (selectedId === f.id) selectedId = null; }
        else if (action === 'up' && idx > 0) { [fields[idx-1], fields[idx]] = [fields[idx], fields[idx-1]]; }
        else if (action === 'down' && idx < fields.length - 1) { [fields[idx], fields[idx+1]] = [fields[idx+1], fields[idx]]; }
        else if (action === 'dup') {
          const dup = { ...f, id: uid() };
          fields.splice(idx + 1, 0, dup);
        }
        renderForm(); updateExport();
      };
    });

    // Drag reorder
    wrap.addEventListener('dragstart', e => {
      if (e.target !== wrap) return;
      e.dataTransfer.setData('fieldId', f.id);
      e.dataTransfer.effectAllowed = 'move';
      wrap.classList.add('dragging');
    });
    wrap.addEventListener('dragend', () => wrap.classList.remove('dragging'));
    wrap.addEventListener('dragover', e => { e.preventDefault(); wrap.classList.add('drag-target'); });
    wrap.addEventListener('dragleave', () => wrap.classList.remove('drag-target'));
    wrap.addEventListener('drop', e => {
      e.preventDefault(); wrap.classList.remove('drag-target');
      const dragId = e.dataTransfer.getData('fieldId');
      const dragType = e.dataTransfer.getData('fieldType');
      if (dragId) {
        const fromIdx = fields.findIndex(x => x.id === dragId);
        const toIdx = fields.indexOf(f);
        if (fromIdx >= 0 && fromIdx !== toIdx) {
          const item = fields.splice(fromIdx, 1)[0];
          fields.splice(toIdx, 0, item);
          renderForm(); updateExport();
        }
      } else if (dragType) {
        addField(dragType, fields.indexOf(f));
      }
    });

    canvas.appendChild(wrap);
  });
}

function renderProps() {
  const panel = document.getElementById('propsPanel');
  const field = fields.find(f => f.id === selectedId);
  if (!field) {
    panel.innerHTML = '<h3>Properties</h3><p style="font-size:13px;color:#9ca3af">Select a field to edit its properties.</p>';
    return;
  }
  let h = `<h3>Properties: ${field.label}</h3>`;
  h += `<div class="prop-row"><label>Label</label><input type="text" id="propLabel" value="${field.label}"></div>`;
  if (!['checkbox','toggle','hidden'].includes(field.type)) {
    h += `<div class="prop-row"><label>Placeholder</label><input type="text" id="propPlaceholder" value="${field.placeholder}"></div>`;
  }
  h += `<div class="prop-row"><label>Required</label><div class="toggle-row"><button class="toggle-sm ${field.required?'on':''}" id="propRequired" type="button"></button><span style="font-size:12px">${field.required?'Yes':'No'}</span></div></div>`;
  h += `<div class="prop-row"><label>Help Text</label><input type="text" id="propHelp" value="${field.help}"></div>`;
  if (['select','radio'].includes(field.type)) {
    h += `<div class="prop-row"><label>Options (one per line)</label><textarea id="propOptions" rows="4">${(field.options||[]).join('\n')}</textarea></div>`;
  }
  h += `<div class="prop-row"><label>Validation</label><select id="propValidation"><option value="">None</option><option value="minlength" ${field.validation==='minlength'?'selected':''}>Min Length</option><option value="maxlength" ${field.validation==='maxlength'?'selected':''}>Max Length</option><option value="pattern" ${field.validation==='pattern'?'selected':''}>Pattern (regex)</option></select></div>`;
  if (steps > 1) {
    h += `<div class="prop-row"><label>Step</label><select id="propStep">${Array.from({length:steps},(_,i)=>`<option value="${i+1}" ${field.step===i+1?'selected':''}>Step ${i+1}</option>`).join('')}</select></div>`;
  }
  panel.innerHTML = h;

  document.getElementById('propLabel').oninput = e => { field.label = e.target.value; renderForm(); updateExport(); };
  const ph = document.getElementById('propPlaceholder');
  if (ph) ph.oninput = e => { field.placeholder = e.target.value; renderForm(); updateExport(); };
  document.getElementById('propRequired').onclick = function() { field.required = !field.required; this.classList.toggle('on'); this.nextElementSibling.textContent = field.required ? 'Yes' : 'No'; renderForm(); updateExport(); };
  document.getElementById('propHelp').oninput = e => { field.help = e.target.value; renderForm(); updateExport(); };
  const opts = document.getElementById('propOptions');
  if (opts) opts.oninput = e => { field.options = e.target.value.split('\n').filter(Boolean); renderForm(); updateExport(); };
  document.getElementById('propValidation').onchange = e => { field.validation = e.target.value; updateExport(); };
  const stepSel = document.getElementById('propStep');
  if (stepSel) stepSel.onchange = e => { field.step = +e.target.value; renderForm(); updateExport(); };
}

function renderSteps() {
  const bar = document.getElementById('stepBar');
  if (steps <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  let h = '';
  for (let i = 1; i <= steps; i++) {
    if (i > 1) h += '<div class="step-line"></div>';
    h += `<div class="step-dot ${currentStep === i ? 'active' : ''}" data-step="${i}">${i}</div>`;
  }
  bar.innerHTML = h;
  bar.querySelectorAll('.step-dot').forEach(d => {
    d.onclick = () => { currentStep = +d.dataset.step; renderForm(); renderSteps(); };
  });
}

function generateHTML() {
  let css = `form { max-width: 480px; margin: 0 auto; font-family: 'Manrope', sans-serif; }\nlabel { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #374151; }\ninput, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px; margin-bottom: 16px; }\ninput:focus, select:focus, textarea:focus { outline: none; border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236,72,153,0.1); }\nbutton[type="submit"] { background: #ec4899; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }\nbutton[type="submit"]:hover { opacity: 0.85; }\n.help { font-size: 12px; color: #9ca3af; margin-top: -12px; margin-bottom: 16px; }`;
  let html = '<form>';
  const allFields = steps > 1 ? [...fields].sort((a,b) => a.step - b.step) : fields;
  let curStep = 0;
  allFields.forEach(f => {
    if (steps > 1 && f.step !== curStep) {
      if (curStep > 0) html += '\n  </fieldset>';
      curStep = f.step;
      html += `\n  <fieldset>\n    <legend>Step ${curStep}</legend>`;
    }
    const indent = steps > 1 ? '    ' : '  ';
    const req = f.required ? ' required' : '';
    switch (f.type) {
      case 'text': case 'email': case 'password': case 'number': case 'phone': case 'url':
        html += `\n${indent}<label>${f.label}${f.required?' *':''}</label>\n${indent}<input type="${f.type==='phone'?'tel':f.type}" placeholder="${f.placeholder}"${req}>`;
        break;
      case 'textarea':
        html += `\n${indent}<label>${f.label}${f.required?' *':''}</label>\n${indent}<textarea placeholder="${f.placeholder}" rows="3"${req}></textarea>`;
        break;
      case 'select':
        html += `\n${indent}<label>${f.label}${f.required?' *':''}</label>\n${indent}<select${req}>${(f.options||[]).map(o=>`<option>${o}</option>`).join('')}</select>`;
        break;
      case 'checkbox':
        html += `\n${indent}<label><input type="checkbox"${req}> ${f.label}</label>`;
        break;
      case 'radio':
        html += `\n${indent}<fieldset style="border:none;padding:0;margin-bottom:16px"><legend style="font-weight:600;margin-bottom:6px">${f.label}</legend>${(f.options||[]).map(o=>`<label style="display:block;margin-bottom:4px"><input type="radio" name="${f.id}"> ${o}</label>`).join('')}</fieldset>`;
        break;
      case 'toggle':
        html += `\n${indent}<label><input type="checkbox"${req}> ${f.label}</label>`;
        break;
      case 'date':
        html += `\n${indent}<label>${f.label}${f.required?' *':''}</label>\n${indent}<input type="date"${req}>`;
        break;
      case 'file':
        html += `\n${indent}<label>${f.label}${f.required?' *':''}</label>\n${indent}<input type="file"${req}>`;
        break;
      case 'range':
        html += `\n${indent}<label>${f.label}</label>\n${indent}<input type="range" min="0" max="10" value="5">`;
        break;
      case 'color':
        html += `\n${indent}<label>${f.label}</label>\n${indent}<input type="color" value="#ec4899">`;
        break;
      case 'hidden':
        html += `\n${indent}<input type="hidden" name="${f.label.toLowerCase().replace(/\s+/g,'_')}">`;
        break;
    }
    if (f.help) html += `\n${indent}<p class="help">${f.help}</p>`;
  });
  if (steps > 1 && curStep > 0) html += '\n  </fieldset>';
  html += '\n  <button type="submit">Submit</button>\n</form>';
  return `<style>\n${css}\n</style>\n\n${html}`;
}

function generateTailwind() {
  let html = '<form class="max-w-md mx-auto font-sans">';
  fields.forEach(f => {
    const req = f.required ? ' required' : '';
    switch (f.type) {
      case 'text': case 'email': case 'password': case 'number': case 'phone': case 'url':
        html += `\n  <label class="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}${f.required?' *':''}</label>\n  <input type="${f.type==='phone'?'tel':f.type}" placeholder="${f.placeholder}" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-100 outline-none mb-4"${req}>`;
        break;
      case 'textarea':
        html += `\n  <label class="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}${f.required?' *':''}</label>\n  <textarea placeholder="${f.placeholder}" rows="3" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm resize-y focus:border-pink-500 focus:ring-2 focus:ring-pink-100 outline-none mb-4"${req}></textarea>`;
        break;
      case 'select':
        html += `\n  <label class="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}</label>\n  <select class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:border-pink-500 outline-none mb-4"${req}>${(f.options||[]).map(o=>`<option>${o}</option>`).join('')}</select>`;
        break;
      case 'checkbox': case 'toggle':
        html += `\n  <label class="flex items-center gap-2 text-sm cursor-pointer mb-4"><input type="checkbox" class="accent-pink-500 w-4 h-4"${req}> ${f.label}</label>`;
        break;
      case 'radio':
        html += `\n  <p class="text-sm font-semibold text-gray-700 mb-1.5">${f.label}</p>`;
        (f.options||[]).forEach(o => { html += `\n  <label class="flex items-center gap-2 text-sm cursor-pointer mb-1"><input type="radio" name="${f.id}" class="accent-pink-500 w-4 h-4"> ${o}</label>`; });
        html += '\n  <div class="mb-4"></div>';
        break;
      default:
        html += `\n  <label class="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}</label>\n  <input type="${f.type}" class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-pink-500 outline-none mb-4">`;
    }
    if (f.help) html += `\n  <p class="text-xs text-gray-400 -mt-3 mb-4">${f.help}</p>`;
  });
  html += '\n  <button type="submit" class="w-full py-2.5 bg-pink-500 text-white font-semibold rounded-lg hover:opacity-85 transition">Submit</button>\n</form>';
  return html;
}

function generateReact() {
  let imports = `import { useState } from 'react';\n\n`;
  let stateLines = fields.map(f => {
    const key = f.label.replace(/[^a-zA-Z0-9]/g,'').toLowerCase() || f.id;
    const def = f.type === 'checkbox' || f.type === 'toggle' ? 'false' : "''";
    return `  const [${key}, set${key.charAt(0).toUpperCase()+key.slice(1)}] = useState(${def});`;
  }).join('\n');

  let jsx = `  const handleSubmit = (e) => {\n    e.preventDefault();\n    // handle form data\n  };\n\n  return (\n    <form onSubmit={handleSubmit} className="max-w-md mx-auto space-y-4">`;
  fields.forEach(f => {
    const key = f.label.replace(/[^a-zA-Z0-9]/g,'').toLowerCase() || f.id;
    const setKey = 'set' + key.charAt(0).toUpperCase() + key.slice(1);
    const req = f.required ? ' required' : '';
    switch (f.type) {
      case 'text': case 'email': case 'password': case 'number': case 'phone': case 'url':
        jsx += `\n      <div>\n        <label className="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}${f.required?' *':''}</label>\n        <input type="${f.type==='phone'?'tel':f.type}" placeholder="${f.placeholder}" value={${key}} onChange={e => ${setKey}(e.target.value)} className="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-pink-500 focus:ring-2 focus:ring-pink-100 outline-none"${req} />\n      </div>`;
        break;
      case 'textarea':
        jsx += `\n      <div>\n        <label className="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}${f.required?' *':''}</label>\n        <textarea placeholder="${f.placeholder}" rows={3} value={${key}} onChange={e => ${setKey}(e.target.value)} className="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm resize-y focus:border-pink-500 outline-none"${req} />\n      </div>`;
        break;
      case 'checkbox': case 'toggle':
        jsx += `\n      <label className="flex items-center gap-2 text-sm cursor-pointer">\n        <input type="checkbox" checked={${key}} onChange={e => ${setKey}(e.target.checked)} className="accent-pink-500 w-4 h-4"${req} />\n        ${f.label}\n      </label>`;
        break;
      default:
        jsx += `\n      <div>\n        <label className="block text-sm font-semibold text-gray-700 mb-1.5">${f.label}</label>\n        <input type="${f.type}" value={${key}} onChange={e => ${setKey}(e.target.value)} className="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm focus:border-pink-500 outline-none" />\n      </div>`;
    }
  });
  jsx += `\n      <button type="submit" className="w-full py-2.5 bg-pink-500 text-white font-semibold rounded-lg hover:opacity-85 transition">Submit</button>\n    </form>\n  );`;

  return `${imports}export default function MyForm() {\n${stateLines}\n\n${jsx}\n}`;
}

function updateExport() {
  const code = document.getElementById('exportCode');
  if (exportFmt === 'html') code.textContent = generateHTML();
  else if (exportFmt === 'tw') code.textContent = generateTailwind();
  else code.textContent = generateReact();
}

// Canvas drop zone
const canvas = document.getElementById('formCanvas');
canvas.addEventListener('dragover', e => { e.preventDefault(); canvas.classList.add('drag-over'); });
canvas.addEventListener('dragleave', () => canvas.classList.remove('drag-over'));
canvas.addEventListener('drop', e => {
  e.preventDefault(); canvas.classList.remove('drag-over');
  const type = e.dataTransfer.getData('fieldType');
  if (type) addField(type);
});

// Layout select
document.getElementById('layoutSelect').onchange = e => {
  layout = e.target.value;
  renderForm();
};

// Steps
document.getElementById('addStepBtn').onclick = () => { steps++; renderSteps(); };
document.getElementById('removeStepBtn').onclick = () => {
  if (steps <= 1) return;
  fields = fields.filter(f => f.step !== steps);
  steps--;
  if (currentStep > steps) currentStep = steps;
  renderForm(); renderSteps(); updateExport();
};

// Validation preview
document.getElementById('previewValidation').onclick = () => {
  document.querySelectorAll('.field-wrap').forEach(wrap => {
    const fId = wrap.dataset.id;
    const field = fields.find(f => f.id === fId);
    if (field && field.required) {
      const input = wrap.querySelector('.field-input');
      const err = wrap.querySelector('.field-error');
      if (input && !input.value) { input.style.borderColor = '#ef4444'; if (err) err.style.display = 'block'; }
      else { input && (input.style.borderColor = ''); if (err) err.style.display = 'none'; }
    }
  });
  showToast('Validation preview active');
};

// Save / Load
document.getElementById('saveBtn').onclick = () => {
  localStorage.setItem('formbuilder-data', JSON.stringify({fields, steps, layout}));
  showToast('Form saved');
};
document.getElementById('loadBtn').onclick = () => {
  const data = localStorage.getItem('formbuilder-data');
  if (!data) { showToast('No saved form'); return; }
  const parsed = JSON.parse(data);
  fields = parsed.fields || [];
  steps = parsed.steps || 1;
  layout = parsed.layout || 'single';
  currentStep = 1; selectedId = null;
  document.getElementById('layoutSelect').value = layout;
  renderForm(); renderSteps(); renderProps(); updateExport();
  showToast('Form loaded');
};

// Export tabs
document.getElementById('exportTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('ex-tab')) return;
  exportFmt = e.target.dataset.fmt;
  document.querySelectorAll('.ex-tab').forEach(t => t.classList.toggle('active', t === e.target));
  updateExport();
});

document.getElementById('copyExport').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('exportCode').textContent).then(() => showToast('Copied!'));
};

// Init
buildPalette();
buildPresets();
renderForm();
renderSteps();
updateExport();
</script>
<script src="/related.js"></script>
</body>
</html>
