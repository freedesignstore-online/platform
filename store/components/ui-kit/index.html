<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Kit - FreeDesignStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh}
a.back{display:inline-block;margin:24px 24px 0;color:#ec4899;text-decoration:none;font-weight:500}
a.back:hover{text-decoration:underline}
h1{font-size:28px;font-weight:700;margin:12px 24px 4px}
p.sub{color:#6b7280;margin:0 24px 16px;font-size:14px}
:root{--accent:#ec4899;--bg:#fafafa;--text:#1a1a1a;--panel:#ffffff;--line:#e5e7eb;--muted:#6b7280;--radius:8px}
.app{display:flex;height:calc(100vh - 120px);margin:0 24px 20px;gap:16px}
.sidebar{width:220px;flex-shrink:0;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow-y:auto;padding:12px}
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:12px 0 6px;padding:0 8px}
.sidebar h3:first-child{margin-top:4px}
.cat-btn{display:block;width:100%;text-align:left;padding:7px 10px;border:none;background:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s}
.cat-btn:hover{background:#f3f4f6}
.cat-btn.active{background:var(--accent);color:#fff}
.cat-btn .count{float:right;font-size:11px;color:var(--muted);font-weight:400}
.cat-btn.active .count{color:rgba(255,255,255,.7)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--line);border-radius:var(--radius);font-family:inherit;font-size:13px;background:var(--panel)}
.search:focus{outline:none;border-color:var(--accent)}
.tb-btn{padding:6px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text)}
.tb-btn:hover{border-color:var(--accent)}
.tb-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.accent-pick{width:32px;height:32px;border:1px solid var(--line);border-radius:var(--radius);padding:2px;cursor:pointer}
.grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding-bottom:20px}
.comp-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:border-color .15s}
.comp-card:hover{border-color:var(--accent)}
.comp-card.hidden{display:none}
.comp-preview{padding:20px;min-height:80px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;position:relative;background:var(--bg)}
.comp-preview.dark-mode{background:#1a1a1a;color:#fff}
.comp-info{padding:12px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.comp-name{font-size:13px;font-weight:600}
.comp-actions{display:flex;gap:4px}
.comp-actions button{padding:4px 8px;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all .15s}
.comp-actions button:hover{border-color:var(--accent);color:var(--accent)}
.comp-actions button.fav{color:#f59e0b}
.code-panel{display:none;border-top:1px solid var(--line);background:#fafafa}
.code-panel.open{display:block}
.code-tabs{display:flex;border-bottom:1px solid var(--line)}
.code-tab{padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px}
.code-tab:hover{color:var(--text)}
.code-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.code-content{position:relative}
.code-content pre{padding:12px;font-size:12px;line-height:1.5;overflow-x:auto;max-height:200px;font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:6px;right:6px;padding:4px 10px;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;transition:all .15s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.recently-copied{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:12px}
.recently-copied h4{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.recent-tags{display:flex;gap:4px;flex-wrap:wrap}
.recent-tag{padding:3px 8px;border-radius:4px;font-size:11px;background:#f3f4f6;color:var(--text);cursor:pointer;border:none;font-family:inherit}
.recent-tag:hover{background:var(--accent);color:#fff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

let activeCat = 'all';
let darkPreview = false;
let favorites = JSON.parse(localStorage.getItem('uikit-favs') || '[]');
let recentCopied = JSON.parse(localStorage.getItem('uikit-recent') || '[]');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<h3>Categories</h3>';
  html += `<button class="cat-btn ${activeCat==='all'?'active':''}" data-cat="all">All <span class="count">${COMPS.length}</span></button>`;
  html += `<button class="cat-btn ${activeCat==='favorites'?'active':''}" data-cat="favorites">Favorites <span class="count">${favorites.length}</span></button>`;
  CATS.forEach(c => {
    html += `<button class="cat-btn ${activeCat===c.id?'active':''}" data-cat="${c.id}">${c.label} <span class="count">${c.count}</span></button>`;
  });
  sb.innerHTML = html;
  sb.querySelectorAll('.cat-btn').forEach(b => {
    b.onclick = () => { activeCat = b.dataset.cat; buildSidebar(); filterCards(); };
  });
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  COMPS.forEach((comp, i) => {
    const card = document.createElement('div');
    card.className = 'comp-card';
    card.dataset.cat = comp.cat;
    card.dataset.name = comp.name.toLowerCase();
    card.dataset.idx = i;
    const isFav = favorites.includes(comp.name);
    card.innerHTML = `
      <div class="comp-preview ${darkPreview?'dark-mode':''}">${comp.html}</div>
      <div class="comp-info">
        <span class="comp-name">${comp.name}</span>
        <div class="comp-actions">
          <button class="fav-btn ${isFav?'fav':''}" title="Favorite">${isFav?'&#9733;':'&#9734;'}</button>
          <button class="code-toggle" title="View Code">&lt;/&gt;</button>
        </div>
      </div>
      <div class="code-panel" id="cp-${i}">
        <div class="code-tabs">
          <button class="code-tab active" data-fmt="html">HTML</button>
          <button class="code-tab" data-fmt="css">CSS</button>
          <button class="code-tab" data-fmt="tw">Tailwind</button>
          <button class="code-tab" data-fmt="react">React JSX</button>
        </div>
        <div class="code-content">
          <pre id="pre-${i}"></pre>
          <button class="copy-btn" data-idx="${i}">Copy</button>
        </div>
      </div>`;
    // inject accent style into preview
    const preview = card.querySelector('.comp-preview');
    preview.style.setProperty('--accent', ac());
    grid.appendChild(card);

    card.querySelector('.fav-btn').onclick = () => toggleFav(comp.name);
    card.querySelector('.code-toggle').onclick = () => toggleCode(i);
    card.querySelector('.copy-btn').onclick = () => copyCode(i);
    card.querySelectorAll('.code-tab').forEach(tab => {
      tab.onclick = () => switchTab(i, tab.dataset.fmt);
    });
    // default show HTML
    card.querySelector(`#pre-${i}`).textContent = comp.html;
  });
  filterCards();
}

function toggleCode(i) {
  const panel = document.getElementById(`cp-${i}`);
  panel.classList.toggle('open');
}

let activeFormats = {};
function switchTab(i, fmt) {
  activeFormats[i] = fmt;
  const panel = document.getElementById(`cp-${i}`);
  panel.querySelectorAll('.code-tab').forEach(t => t.classList.toggle('active', t.dataset.fmt === fmt));
  const comp = COMPS[i];
  const pre = document.getElementById(`pre-${i}`);
  const map = { html: comp.html, css: comp.css, tw: comp.tw, react: comp.react };
  pre.textContent = map[fmt] || '';
}

function copyCode(i) {
  const fmt = activeFormats[i] || 'html';
  const comp = COMPS[i];
  const map = { html: comp.html, css: comp.css, tw: comp.tw, react: comp.react };
  navigator.clipboard.writeText(map[fmt] || '').then(() => {
    showToast(`Copied ${comp.name} (${fmt.toUpperCase()})`);
    addRecent(comp.name);
  });
}

function toggleFav(name) {
  const idx = favorites.indexOf(name);
  if (idx >= 0) favorites.splice(idx, 1);
  else favorites.push(name);
  localStorage.setItem('uikit-favs', JSON.stringify(favorites));
  buildSidebar();
  buildGrid();
}

function addRecent(name) {
  recentCopied = recentCopied.filter(n => n !== name);
  recentCopied.unshift(name);
  if (recentCopied.length > 8) recentCopied.pop();
  localStorage.setItem('uikit-recent', JSON.stringify(recentCopied));
  renderRecent();
}

function renderRecent() {
  const box = document.getElementById('recentBox');
  const tags = document.getElementById('recentTags');
  if (!recentCopied.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  tags.innerHTML = recentCopied.map(n => `<button class="recent-tag">${n}</button>`).join('');
  tags.querySelectorAll('.recent-tag').forEach(t => {
    t.onclick = () => {
      const idx = COMPS.findIndex(c => c.name === t.textContent);
      if (idx >= 0) {
        const card = document.querySelector(`[data-idx="${idx}"]`);
        if (card) { card.scrollIntoView({behavior:'smooth',block:'center'}); toggleCode(idx); }
      }
    };
  });
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.comp-card').forEach(card => {
    const matchCat = activeCat === 'all' || card.dataset.cat === activeCat || (activeCat === 'favorites' && favorites.includes(COMPS[parseInt(card.dataset.idx)].name));
    const matchSearch = !q || card.dataset.name.includes(q);
    card.classList.toggle('hidden', !(matchCat && matchSearch));
  });
}

document.getElementById('search').addEventListener('input', filterCards);

document.getElementById('darkToggle').addEventListener('click', function() {
  darkPreview = !darkPreview;
  this.classList.toggle('active', darkPreview);
  this.textContent = darkPreview ? 'Light Preview' : 'Dark Preview';
  document.querySelectorAll('.comp-preview').forEach(p => p.classList.toggle('dark-mode', darkPreview));
});

document.getElementById('accentPick').addEventListener('input', function() {
  document.documentElement.style.setProperty('--accent', this.value);
  document.querySelectorAll('.comp-preview').forEach(p => p.style.setProperty('--accent', this.value));
});

buildSidebar();
buildGrid();
renderRecent();
</script>
<script src="/related.js"></script>
</body>
</html>
