<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Editor - FreeDesignStore</title>
<link rel="icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
a { color: #ec4899; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Top bar */
.topbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
.back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #6b7280; text-decoration: none; margin-right: 12px; }
.back:hover { color: #ec4899; }
.topbar h1 { font-size: 16px; font-weight: 700; margin-right: 24px; }
.menu-group { position: relative; }
.menu-btn { padding: 5px 12px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; }
.menu-btn:hover { border-color: #ec4899; }
.menu-drop { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 1000; min-width: 160px; padding: 4px; }
.menu-drop.open { display: block; }
.menu-drop button { display: block; width: 100%; text-align: left; padding: 7px 12px; border: none; background: none; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 4px; }
.menu-drop button:hover { background: #fdf2f8; color: #ec4899; }
.menu-drop .shortcut { float: right; color: #9ca3af; font-size: 11px; }
.separator { width: 1px; height: 20px; background: #e5e7eb; margin: 0 8px; }
.zoom-controls { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.zoom-controls button { width: 28px; height: 28px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.zoom-controls button:hover { border-color: #ec4899; }
.zoom-controls span { font-size: 12px; color: #6b7280; min-width: 40px; text-align: center; }

/* Main layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left tools */
.tools-panel { width: 48px; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px; flex-shrink: 0; }
.tool-btn { width: 36px; height: 36px; border: none; background: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
.tool-btn:hover { background: #fdf2f8; }
.tool-btn.active { background: #ec4899; color: #fff; }
.tool-btn svg { width: 18px; height: 18px; }
.tool-btn .shortcut-hint { position: absolute; bottom: 2px; right: 2px; font-size: 8px; color: #9ca3af; }
.tool-btn.active .shortcut-hint { color: rgba(255,255,255,.7); }

/* Canvas area */
.canvas-area { flex: 1; position: relative; overflow: hidden; background: #f0f0f0; }
.ruler-h { position: absolute; top: 0; left: 24px; right: 0; height: 24px; background: #fff; border-bottom: 1px solid #e5e7eb; z-index: 10; overflow: hidden; }
.ruler-v { position: absolute; top: 24px; left: 0; bottom: 0; width: 24px; background: #fff; border-right: 1px solid #e5e7eb; z-index: 10; overflow: hidden; }
.ruler-corner { position: absolute; top: 0; left: 0; width: 24px; height: 24px; background: #fff; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; z-index: 11; }
.canvas-wrap { position: absolute; top: 24px; left: 24px; right: 0; bottom: 0; overflow: hidden; }
#canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#svg-canvas { background: #fff; box-shadow: 0 2px 20px rgba(0,0,0,.1); position: absolute; }
.grid-overlay { position: absolute; pointer-events: none; }

/* Right panel */
.right-panel { width: 260px; background: #fff; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.panel-section { padding: 14px; border-bottom: 1px solid #e5e7eb; }
.panel-section h3 { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.prop-row label { font-size: 11px; font-weight: 500; color: #6b7280; min-width: 24px; }
.prop-row input[type="number"] { width: 100%; padding: 5px 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-family: inherit; font-size: 12px; }
.prop-row input[type="number"]:focus { outline: none; border-color: #ec4899; }
.prop-row input[type="color"] { width: 32px; height: 28px; border: 1px solid #e5e7eb; border-radius: 6px; padding: 2px; cursor: pointer; }
.prop-row input[type="range"] { flex: 1; accent-color: #ec4899; }
.prop-row select { flex: 1; padding: 5px 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-family: inherit; font-size: 12px; }
.color-group { display: flex; align-items: center; gap: 6px; }
.none-toggle { font-size: 10px; padding: 3px 6px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff; cursor: pointer; }
.none-toggle.active { background: #ec4899; color: #fff; border-color: #ec4899; }
.align-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.align-btns button { width: 28px; height: 28px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.align-btns button:hover { border-color: #ec4899; background: #fdf2f8; }

/* Layers */
.layers-list { max-height: 200px; overflow-y: auto; }
.layer-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.layer-item:hover { background: #f9fafb; }
.layer-item.selected { background: #fdf2f8; border: 1px solid #fbcfe8; }
.layer-item .layer-vis { width: 18px; height: 18px; border: none; background: none; cursor: pointer; font-size: 12px; opacity: .6; }
.layer-item .layer-vis:hover { opacity: 1; }
.layer-item .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.layer-item .layer-lock { width: 18px; height: 18px; border: none; background: none; cursor: pointer; font-size: 10px; opacity: .6; }
.layer-actions { display: flex; gap: 4px; margin-top: 8px; }
.layer-actions button { padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; font-family: inherit; }
.layer-actions button:hover { border-color: #ec4899; }

.snap-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6b7280; }
.snap-toggle input { accent-color: #ec4899; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 2000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal textarea { width: 100%; height: 200px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; resize: vertical; }
.modal textarea:focus { outline: none; border-color: #ec4899; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; }
.btn:hover { border-color: #ec4899; }
.btn-primary { background: #ec4899; color: #fff; border-color: #ec4899; }
.btn-primary:hover { background: #db2777; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/tools/" class="back">&larr; Tools</a>
  <h1>Vector Editor</h1>
  <div class="menu-group">
    <button class="menu-btn" onclick="toggleMenu('file-menu')">File</button>
    <div class="menu-drop" id="file-menu">
      <button onclick="newCanvas()">New <span class="shortcut">Ctrl+N</span></button>
      <button onclick="openSVGModal()">Open SVG <span class="shortcut">Ctrl+O</span></button>
      <button onclick="exportSVG()">Save SVG <span class="shortcut">Ctrl+S</span></button>
      <button onclick="exportPNG()">Export PNG</button>
      <button onclick="copySVGCode()">Copy SVG Code</button>
    </div>
  </div>
  <div class="menu-group">
    <button class="menu-btn" onclick="toggleMenu('edit-menu')">Edit</button>
    <div class="menu-drop" id="edit-menu">
      <button onclick="undo()">Undo <span class="shortcut">Ctrl+Z</span></button>
      <button onclick="redo()">Redo <span class="shortcut">Ctrl+Y</span></button>
      <button onclick="copyShape()">Copy <span class="shortcut">Ctrl+C</span></button>
      <button onclick="pasteShape()">Paste <span class="shortcut">Ctrl+V</span></button>
      <button onclick="deleteSelected()">Delete <span class="shortcut">Del</span></button>
    </div>
  </div>
  <div class="separator"></div>
  <div class="align-btns">
    <button onclick="alignShapes('left')" title="Align Left">&#9664;</button>
    <button onclick="alignShapes('centerH')" title="Align Center">&#9644;</button>
    <button onclick="alignShapes('right')" title="Align Right">&#9654;</button>
    <button onclick="alignShapes('top')" title="Align Top">&#9650;</button>
    <button onclick="alignShapes('centerV')" title="Align Middle">&#9644;</button>
    <button onclick="alignShapes('bottom')" title="Align Bottom">&#9660;</button>
  </div>
  <div class="separator"></div>
  <label class="snap-toggle"><input type="checkbox" id="snap-grid" onchange="toggleGrid()"> Grid</label>
  <div class="zoom-controls">
    <button onclick="zoomCanvas(-0.1)">-</button>
    <span id="zoom-level">100%</span>
    <button onclick="zoomCanvas(0.1)">+</button>
    <button onclick="zoomCanvas(0, 1)">Fit</button>
  </div>
</div>

<div class="main">
  <!-- Left Tools -->
  <div class="tools-panel">
    <button class="tool-btn active" data-tool="select" title="Select (V)" onclick="setTool('select')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      <span class="shortcut-hint">V</span>
    </button>
    <button class="tool-btn" data-tool="pen" title="Pen (P)" onclick="setTool('pen')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
      <span class="shortcut-hint">P</span>
    </button>
    <button class="tool-btn" data-tool="rect" title="Rectangle (R)" onclick="setTool('rect')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      <span class="shortcut-hint">R</span>
    </button>
    <button class="tool-btn" data-tool="ellipse" title="Ellipse (E)" onclick="setTool('ellipse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="8"/></svg>
      <span class="shortcut-hint">E</span>
    </button>
    <button class="tool-btn" data-tool="line" title="Line (L)" onclick="setTool('line')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="4"/></svg>
      <span class="shortcut-hint">L</span>
    </button>
    <button class="tool-btn" data-tool="polygon" title="Polygon (G)" onclick="setTool('polygon')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 22,8.5 19,20 5,20 2,8.5"/></svg>
      <span class="shortcut-hint">G</span>
    </button>
    <button class="tool-btn" data-tool="text" title="Text (T)" onclick="setTool('text')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M8 20h8"/></svg>
      <span class="shortcut-hint">T</span>
    </button>
    <button class="tool-btn" data-tool="freehand" title="Freehand (F)" onclick="setTool('freehand')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17c3-3 5-8 9-8s4 6 7 6 3-3 3-3"/></svg>
      <span class="shortcut-hint">F</span>
    </button>
    <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)" onclick="setTool('eyedropper')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.42-1.42-1.41 1.42 1.41 1.41-7.07 7.07a1 1 0 000 1.42l2.34 2.34a1 1 0 001.42 0l7.07-7.07 1.41 1.41 1.42-1.41-1.42-1.42 3.12-3.12a1 1 0 000-1.41z"/></svg>
      <span class="shortcut-hint">I</span>
    </button>
    <button class="tool-btn" data-tool="pan" title="Pan/Zoom (H)" onclick="setTool('pan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 00-4 0v5m0 0V4a2 2 0 00-4 0v7m0 0V5a2 2 0 00-4 0v9l-1.8-1.8a2 2 0 00-2.83 2.83L8 21h10a2 2 0 002-2v-5.5a2 2 0 00-4 0v.5"/></svg>
      <span class="shortcut-hint">H</span>
    </button>
  </div>

  <!-- Canvas -->
  <div class="canvas-area">
    <div class="ruler-corner"></div>
    <canvas class="ruler-h" id="ruler-h" height="24"></canvas>
    <canvas class="ruler-v" id="ruler-v" width="24"></canvas>
    <div class="canvas-wrap" id="canvas-wrap">
      <div id="canvas-container">
        <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg" width="800" height="600"></svg>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="panel-section">
      <h3>Fill & Stroke</h3>
      <div class="prop-row">
        <label>Fill</label>
        <div class="color-group">
          <input type="color" id="prop-fill" value="#ec4899" onchange="updateProp('fill', this.value)">
          <input type="range" id="prop-fill-opacity" min="0" max="100" value="100" onchange="updateProp('fill-opacity', this.value/100)" style="width:60px">
          <button class="none-toggle" id="fill-none" onclick="toggleFillNone()">None</button>
        </div>
      </div>
      <div class="prop-row">
        <label>Stroke</label>
        <div class="color-group">
          <input type="color" id="prop-stroke" value="#1a1a1a" onchange="updateProp('stroke', this.value)">
          <input type="number" id="prop-stroke-width" min="0" max="20" value="2" style="width:48px" onchange="updateProp('stroke-width', this.value)">
          <button class="none-toggle" id="stroke-none" onclick="toggleStrokeNone()">None</button>
        </div>
      </div>
      <div class="prop-row">
        <label>Dash</label>
        <select id="prop-dash" onchange="updateProp('stroke-dasharray', this.value)">
          <option value="">Solid</option>
          <option value="5,5">Dashed</option>
          <option value="2,2">Dotted</option>
          <option value="10,5,2,5">Dash-Dot</option>
        </select>
      </div>
      <div class="prop-row">
        <label>Cap</label>
        <select id="prop-cap" onchange="updateProp('stroke-linecap', this.value)">
          <option value="butt">Butt</option>
          <option value="round">Round</option>
          <option value="square">Square</option>
        </select>
      </div>
    </div>

    <div class="panel-section">
      <h3>Transform</h3>
      <div class="prop-row">
        <label>X</label><input type="number" id="prop-x" onchange="updateTransform()">
        <label>Y</label><input type="number" id="prop-y" onchange="updateTransform()">
      </div>
      <div class="prop-row">
        <label>W</label><input type="number" id="prop-w" min="1" onchange="updateTransform()">
        <label>H</label><input type="number" id="prop-h" min="1" onchange="updateTransform()">
      </div>
      <div class="prop-row">
        <label>Rot</label><input type="number" id="prop-rot" min="-360" max="360" value="0" onchange="updateTransform()">
        <label>Op</label><input type="range" id="prop-opacity" min="0" max="100" value="100" style="width:60px" onchange="updateProp('opacity', this.value/100)">
      </div>
      <div class="prop-row">
        <label>Rx</label><input type="number" id="prop-rx" min="0" max="200" value="0" onchange="updateProp('rx', this.value)">
      </div>
    </div>

    <div class="panel-section" id="polygon-opts" style="display:none">
      <h3>Polygon</h3>
      <div class="prop-row">
        <label>Sides</label><input type="number" id="poly-sides" min="3" max="12" value="5">
        <label class="snap-toggle"><input type="checkbox" id="poly-star"> Star</label>
      </div>
    </div>

    <div class="panel-section">
      <h3>Layers</h3>
      <div class="layers-list" id="layers-list"></div>
      <div class="layer-actions">
        <button onclick="moveLayer(-1)">Up</button>
        <button onclick="moveLayer(1)">Down</button>
        <button onclick="groupSelected()">Group</button>
        <button onclick="deleteSelected()">Del</button>
      </div>
    </div>
  </div>
</div>

<!-- Open SVG Modal -->
<div class="modal-overlay" id="svg-modal">
  <div class="modal">
    <h2>Open SVG</h2>
    <textarea id="svg-input" placeholder="Paste SVG code here..."></textarea>
    <input type="file" id="svg-file" accept=".svg" style="margin-top:12px" onchange="loadSVGFile(event)">
    <div class="modal-actions">
      <button class="btn" onclick="closeSVGModal()">Cancel</button>
      <button class="btn btn-primary" onclick="importSVG()">Import</button>
    </div>
  </div>
</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const canvas = document.getElementById('svg-canvas');
const container = document.getElementById('canvas-container');
const wrap = document.getElementById('canvas-wrap');

let currentTool = 'select';
let shapes = [];
let selectedShape = null;
let clipboard = null;
let undoStack = [];
let redoStack = [];
let zoom = 1;
let panX = 50, panY = 50;
let isDrawing = false;
let drawStart = null;
let penPoints = [];
let freehandPoints = [];
let fillNone = false, strokeNone = false;
let gridSnap = false;
let shapeCounter = 0;

function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  document.getElementById('polygon-opts').style.display = tool === 'polygon' ? 'block' : 'none';
  if (tool !== 'pen') finishPen();
  canvas.style.cursor = tool === 'pan' ? 'grab' : tool === 'eyedropper' ? 'crosshair' : 'default';
}

function toggleMenu(id) {
  document.querySelectorAll('.menu-drop').forEach(m => { if (m.id !== id) m.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', e => { if (!e.target.closest('.menu-group')) document.querySelectorAll('.menu-drop').forEach(m => m.classList.remove('open')); });

function snap(v) { return gridSnap ? Math.round(v / 10) * 10 : v; }
function toggleGrid() { gridSnap = document.getElementById('snap-grid').checked; }

// Zoom
function zoomCanvas(delta, reset) {
  if (reset) { zoom = 1; panX = 50; panY = 50; }
  else { zoom = Math.max(0.1, Math.min(5, zoom + delta)); }
  updateCanvasTransform();
}
function updateCanvasTransform() {
  canvas.style.transform = `scale(${zoom})`;
  canvas.style.transformOrigin = '0 0';
  canvas.style.left = panX + 'px';
  canvas.style.top = panY + 'px';
  document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
  drawRulers();
}

// Rulers
function drawRulers() {
  const rh = document.getElementById('ruler-h');
  const rv = document.getElementById('ruler-v');
  rh.width = wrap.clientWidth;
  rv.height = wrap.clientHeight;
  const ctxH = rh.getContext('2d');
  const ctxV = rv.getContext('2d');
  ctxH.clearRect(0, 0, rh.width, 24);
  ctxV.clearRect(0, 0, 24, rv.height);
  ctxH.fillStyle = ctxV.fillStyle = '#9ca3af';
  ctxH.font = ctxV.font = '9px Manrope';
  const step = zoom >= 2 ? 10 : zoom >= 1 ? 20 : 50;
  for (let i = 0; i < 2000; i += step) {
    const px = panX + i * zoom;
    if (px > 0 && px < rh.width) { ctxH.fillRect(px, 16, 1, 8); ctxH.fillText(i, px + 2, 12); }
    const py = panY + i * zoom;
    if (py > 0 && py < rv.height) { ctxV.fillRect(16, py, 8, 1); ctxV.save(); ctxV.translate(10, py + 12); ctxV.rotate(-Math.PI/2); ctxV.fillText(i, 0, 0); ctxV.restore(); }
  }
}

// Undo/Redo
function saveState() {
  undoStack.push(canvas.innerHTML);
  if (undoStack.length > 30) undoStack.shift();
  redoStack = [];
}
function undo() { if (!undoStack.length) return; redoStack.push(canvas.innerHTML); canvas.innerHTML = undoStack.pop(); rebuildShapes(); }
function redo() { if (!redoStack.length) return; undoStack.push(canvas.innerHTML); canvas.innerHTML = redoStack.pop(); rebuildShapes(); }

function rebuildShapes() {
  shapes = Array.from(canvas.querySelectorAll('[data-shape]'));
  selectedShape = null;
  clearHandles();
  updateLayers();
}

// Shape creation helpers
function createSVGElement(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function addShape(el, name) {
  shapeCounter++;
  el.setAttribute('data-shape', 'true');
  el.setAttribute('data-name', name || el.tagName + '-' + shapeCounter);
  el.setAttribute('data-locked', 'false');
  el.setAttribute('data-visible', 'true');
  canvas.appendChild(el);
  shapes.push(el);
  selectShape(el);
  updateLayers();
}

// Selection
function selectShape(el) {
  selectedShape = el;
  clearHandles();
  if (!el) { updateProps(); updateLayers(); return; }
  drawHandles(el);
  updateProps();
  updateLayers();
}

function clearHandles() {
  canvas.querySelectorAll('.sel-handle, .sel-box').forEach(h => h.remove());
}

function drawHandles(el) {
  clearHandles();
  if (!el) return;
  const bbox = el.getBBox();
  const box = createSVGElement('rect', { x: bbox.x - 2, y: bbox.y - 2, width: bbox.width + 4, height: bbox.height + 4, fill: 'none', stroke: '#ec4899', 'stroke-width': 1/zoom, 'stroke-dasharray': `${3/zoom}`, class: 'sel-box' });
  canvas.appendChild(box);
  const corners = [[bbox.x, bbox.y],[bbox.x+bbox.width, bbox.y],[bbox.x+bbox.width, bbox.y+bbox.height],[bbox.x, bbox.y+bbox.height]];
  corners.forEach(([cx,cy], i) => {
    const h = createSVGElement('rect', { x: cx-4/zoom, y: cy-4/zoom, width: 8/zoom, height: 8/zoom, fill: '#fff', stroke: '#ec4899', 'stroke-width': 1/zoom, class: 'sel-handle', 'data-corner': i, style: 'cursor:nwse-resize' });
    canvas.appendChild(h);
  });
}

// Properties
function updateProps() {
  if (!selectedShape) return;
  const bbox = selectedShape.getBBox();
  document.getElementById('prop-x').value = Math.round(bbox.x);
  document.getElementById('prop-y').value = Math.round(bbox.y);
  document.getElementById('prop-w').value = Math.round(bbox.width);
  document.getElementById('prop-h').value = Math.round(bbox.height);
  const fill = selectedShape.getAttribute('fill') || '#ec4899';
  const stroke = selectedShape.getAttribute('stroke') || '#1a1a1a';
  if (fill !== 'none') document.getElementById('prop-fill').value = fill.startsWith('#') ? fill : '#ec4899';
  if (stroke !== 'none') document.getElementById('prop-stroke').value = stroke.startsWith('#') ? stroke : '#1a1a1a';
  document.getElementById('prop-stroke-width').value = parseFloat(selectedShape.getAttribute('stroke-width')) || 2;
  document.getElementById('prop-opacity').value = (parseFloat(selectedShape.getAttribute('opacity')) || 1) * 100;
  document.getElementById('prop-rx').value = parseFloat(selectedShape.getAttribute('rx')) || 0;
  document.getElementById('fill-none').classList.toggle('active', fill === 'none');
  document.getElementById('stroke-none').classList.toggle('active', stroke === 'none');
}

function updateProp(prop, val) {
  if (!selectedShape) return;
  saveState();
  selectedShape.setAttribute(prop, val);
  drawHandles(selectedShape);
}

function updateTransform() {
  if (!selectedShape) return;
  saveState();
  const x = parseFloat(document.getElementById('prop-x').value) || 0;
  const y = parseFloat(document.getElementById('prop-y').value) || 0;
  const w = parseFloat(document.getElementById('prop-w').value) || 1;
  const h = parseFloat(document.getElementById('prop-h').value) || 1;
  const rot = parseFloat(document.getElementById('prop-rot').value) || 0;
  const bbox = selectedShape.getBBox();
  const tag = selectedShape.tagName;
  if (tag === 'rect') { selectedShape.setAttribute('x', x); selectedShape.setAttribute('y', y); selectedShape.setAttribute('width', w); selectedShape.setAttribute('height', h); }
  else if (tag === 'ellipse') { selectedShape.setAttribute('cx', x + w/2); selectedShape.setAttribute('cy', y + h/2); selectedShape.setAttribute('rx', w/2); selectedShape.setAttribute('ry', h/2); }
  else if (tag === 'line') { selectedShape.setAttribute('x1', x); selectedShape.setAttribute('y1', y); selectedShape.setAttribute('x2', x+w); selectedShape.setAttribute('y2', y+h); }
  if (rot !== 0) { const cx = x + w/2, cy = y + h/2; selectedShape.setAttribute('transform', `rotate(${rot} ${cx} ${cy})`); }
  else { selectedShape.removeAttribute('transform'); }
  drawHandles(selectedShape);
}

function toggleFillNone() { fillNone = !fillNone; document.getElementById('fill-none').classList.toggle('active', fillNone); if (selectedShape) { saveState(); selectedShape.setAttribute('fill', fillNone ? 'none' : document.getElementById('prop-fill').value); } }
function toggleStrokeNone() { strokeNone = !strokeNone; document.getElementById('stroke-none').classList.toggle('active', strokeNone); if (selectedShape) { saveState(); selectedShape.setAttribute('stroke', strokeNone ? 'none' : document.getElementById('prop-stroke').value); } }

// Layers
function updateLayers() {
  const list = document.getElementById('layers-list');
  list.innerHTML = '';
  [...shapes].reverse().forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'layer-item' + (s === selectedShape ? ' selected' : '');
    const vis = s.getAttribute('data-visible') !== 'false';
    const locked = s.getAttribute('data-locked') === 'true';
    div.innerHTML = `<button class="layer-vis" onclick="toggleVis(${shapes.length-1-i})">${vis ? '&#128065;' : '&#128064;'}</button><span class="layer-name">${s.getAttribute('data-name')}</span><button class="layer-lock" onclick="toggleLock(${shapes.length-1-i})">${locked ? '&#128274;' : '&#128275;'}</button>`;
    div.onclick = (e) => { if (e.target.tagName !== 'BUTTON') selectShape(s); };
    list.appendChild(div);
  });
}

function toggleVis(idx) { const s = shapes[idx]; const v = s.getAttribute('data-visible') !== 'false'; s.setAttribute('data-visible', !v); s.style.display = v ? 'none' : ''; updateLayers(); }
function toggleLock(idx) { const s = shapes[idx]; s.setAttribute('data-locked', s.getAttribute('data-locked') === 'true' ? 'false' : 'true'); updateLayers(); }

function moveLayer(dir) {
  if (!selectedShape) return;
  saveState();
  const idx = shapes.indexOf(selectedShape);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= shapes.length) return;
  shapes.splice(idx, 1);
  shapes.splice(newIdx, 0, selectedShape);
  canvas.innerHTML = '';
  shapes.forEach(s => canvas.appendChild(s));
  drawHandles(selectedShape);
  updateLayers();
}

function groupSelected() { /* placeholder for group functionality */ }

// Align
function alignShapes(type) {
  if (!selectedShape) return;
  saveState();
  const bbox = selectedShape.getBBox();
  const cw = 800, ch = 600;
  let dx = 0, dy = 0;
  if (type === 'left') dx = -bbox.x;
  else if (type === 'right') dx = cw - (bbox.x + bbox.width);
  else if (type === 'centerH') dx = (cw - bbox.width) / 2 - bbox.x;
  else if (type === 'top') dy = -bbox.y;
  else if (type === 'bottom') dy = ch - (bbox.y + bbox.height);
  else if (type === 'centerV') dy = (ch - bbox.height) / 2 - bbox.y;
  moveShapeBy(selectedShape, dx, dy);
  drawHandles(selectedShape);
  updateProps();
}

function moveShapeBy(el, dx, dy) {
  const tag = el.tagName;
  if (tag === 'rect' || tag === 'image') { el.setAttribute('x', parseFloat(el.getAttribute('x')||0)+dx); el.setAttribute('y', parseFloat(el.getAttribute('y')||0)+dy); }
  else if (tag === 'ellipse' || tag === 'circle') { el.setAttribute('cx', parseFloat(el.getAttribute('cx')||0)+dx); el.setAttribute('cy', parseFloat(el.getAttribute('cy')||0)+dy); }
  else if (tag === 'line') { el.setAttribute('x1', parseFloat(el.getAttribute('x1'))+dx); el.setAttribute('y1', parseFloat(el.getAttribute('y1'))+dy); el.setAttribute('x2', parseFloat(el.getAttribute('x2'))+dx); el.setAttribute('y2', parseFloat(el.getAttribute('y2'))+dy); }
  else if (tag === 'text') { el.setAttribute('x', parseFloat(el.getAttribute('x')||0)+dx); el.setAttribute('y', parseFloat(el.getAttribute('y')||0)+dy); }
  else if (tag === 'path' || tag === 'polygon' || tag === 'polyline') {
    const t = el.getAttribute('transform') || '';
    const m = t.match(/translate\(([^)]+)\)/);
    const cur = m ? m[1].split(/[\s,]+/).map(Number) : [0,0];
    el.setAttribute('transform', `translate(${cur[0]+dx} ${cur[1]+dy})`);
  }
}

// Mouse interaction
let dragStart = null, dragShape = null, dragOffset = null, resizeCorner = -1, resizeBBox = null;

function getSVGPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) / zoom, y: (e.clientY - rect.top) / zoom };
}

canvas.addEventListener('mousedown', e => {
  const pt = getSVGPoint(e);
  const target = e.target;

  if (currentTool === 'pan') { dragStart = { x: e.clientX - panX, y: e.clientY - panY }; canvas.style.cursor = 'grabbing'; return; }

  if (currentTool === 'select') {
    if (target.classList.contains('sel-handle')) {
      resizeCorner = parseInt(target.getAttribute('data-corner'));
      resizeBBox = selectedShape.getBBox();
      dragStart = pt;
      return;
    }
    if (target.hasAttribute('data-shape') && target.getAttribute('data-locked') !== 'true') {
      selectShape(target);
      dragShape = target;
      const bbox = target.getBBox();
      dragOffset = { x: pt.x - bbox.x, y: pt.y - bbox.y };
      dragStart = pt;
    } else if (!target.hasAttribute('data-shape') && !target.classList.contains('sel-handle') && !target.classList.contains('sel-box')) {
      selectShape(null);
    }
    return;
  }

  if (currentTool === 'eyedropper') {
    if (target.hasAttribute('data-shape')) {
      const fill = target.getAttribute('fill');
      if (fill && fill !== 'none') document.getElementById('prop-fill').value = fill;
      const stroke = target.getAttribute('stroke');
      if (stroke && stroke !== 'none') document.getElementById('prop-stroke').value = stroke;
    }
    return;
  }

  if (currentTool === 'pen') {
    penPoints.push(pt);
    drawPenPreview();
    return;
  }

  if (currentTool === 'text') {
    saveState();
    const txt = prompt('Enter text:', 'Text');
    if (!txt) return;
    const el = createSVGElement('text', { x: snap(pt.x), y: snap(pt.y), fill: document.getElementById('prop-fill').value, 'font-size': '24', 'font-family': 'Manrope, sans-serif' });
    el.textContent = txt;
    addShape(el, 'text-' + shapeCounter);
    return;
  }

  isDrawing = true;
  drawStart = pt;

  if (currentTool === 'freehand') {
    freehandPoints = [pt];
  }
});

canvas.addEventListener('mousemove', e => {
  const pt = getSVGPoint(e);

  if (currentTool === 'pan' && dragStart) {
    panX = e.clientX - dragStart.x;
    panY = e.clientY - dragStart.y;
    updateCanvasTransform();
    return;
  }

  if (currentTool === 'select') {
    if (resizeCorner >= 0 && selectedShape && dragStart) {
      const dx = pt.x - dragStart.x;
      const dy = pt.y - dragStart.y;
      let { x, y, width, height } = resizeBBox;
      if (resizeCorner === 0) { x += dx; y += dy; width -= dx; height -= dy; }
      else if (resizeCorner === 1) { y += dy; width += dx; height -= dy; }
      else if (resizeCorner === 2) { width += dx; height += dy; }
      else if (resizeCorner === 3) { x += dx; width -= dx; height += dy; }
      if (width < 1) width = 1;
      if (height < 1) height = 1;
      const tag = selectedShape.tagName;
      if (tag === 'rect') { selectedShape.setAttribute('x', x); selectedShape.setAttribute('y', y); selectedShape.setAttribute('width', width); selectedShape.setAttribute('height', height); }
      else if (tag === 'ellipse') { selectedShape.setAttribute('cx', x+width/2); selectedShape.setAttribute('cy', y+height/2); selectedShape.setAttribute('rx', width/2); selectedShape.setAttribute('ry', height/2); }
      drawHandles(selectedShape);
      updateProps();
      return;
    }
    if (dragShape && dragStart) {
      saveState();
      const dx = pt.x - dragStart.x;
      const dy = pt.y - dragStart.y;
      moveShapeBy(dragShape, dx, dy);
      dragStart = pt;
      drawHandles(dragShape);
      updateProps();
      return;
    }
    return;
  }

  if (!isDrawing) return;

  if (currentTool === 'freehand') {
    freehandPoints.push(pt);
    drawFreehandPreview();
  }
});

canvas.addEventListener('mouseup', e => {
  const pt = getSVGPoint(e);

  if (currentTool === 'pan') { dragStart = null; canvas.style.cursor = 'grab'; return; }

  if (currentTool === 'select') {
    if (resizeCorner >= 0) { saveState(); resizeCorner = -1; }
    dragShape = null; dragStart = null; dragOffset = null;
    return;
  }

  if (!isDrawing) return;
  isDrawing = false;

  const x1 = snap(Math.min(drawStart.x, pt.x));
  const y1 = snap(Math.min(drawStart.y, pt.y));
  const w = snap(Math.abs(pt.x - drawStart.x));
  const h = snap(Math.abs(pt.y - drawStart.y));
  const fill = fillNone ? 'none' : document.getElementById('prop-fill').value;
  const stroke = strokeNone ? 'none' : document.getElementById('prop-stroke').value;
  const sw = document.getElementById('prop-stroke-width').value;

  saveState();

  if (currentTool === 'rect' && w > 2 && h > 2) {
    const constrained = e.shiftKey ? Math.min(w, h) : null;
    const el = createSVGElement('rect', { x: x1, y: y1, width: constrained || w, height: constrained || h, fill, stroke, 'stroke-width': sw, rx: document.getElementById('prop-rx').value || 0 });
    addShape(el, 'rect-' + shapeCounter);
  } else if (currentTool === 'ellipse' && w > 2 && h > 2) {
    const rw = e.shiftKey ? Math.min(w,h)/2 : w/2;
    const rh = e.shiftKey ? rw : h/2;
    const el = createSVGElement('ellipse', { cx: x1 + (e.shiftKey?rw:w/2), cy: y1 + (e.shiftKey?rh:h/2), rx: rw, ry: rh, fill, stroke, 'stroke-width': sw });
    addShape(el, 'ellipse-' + shapeCounter);
  } else if (currentTool === 'line') {
    const el = createSVGElement('line', { x1: snap(drawStart.x), y1: snap(drawStart.y), x2: snap(pt.x), y2: snap(pt.y), stroke, 'stroke-width': sw, 'stroke-linecap': 'round' });
    addShape(el, 'line-' + shapeCounter);
  } else if (currentTool === 'polygon' && w > 2 && h > 2) {
    const sides = parseInt(document.getElementById('poly-sides').value) || 5;
    const isStar = document.getElementById('poly-star').checked;
    const cx = x1 + w/2, cy = y1 + h/2, r = Math.min(w,h)/2;
    let pts = [];
    for (let i = 0; i < sides; i++) {
      const angle = (Math.PI * 2 * i / sides) - Math.PI/2;
      pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
      if (isStar) {
        const ia = angle + Math.PI/sides;
        pts.push(`${cx + r*0.4 * Math.cos(ia)},${cy + r*0.4 * Math.sin(ia)}`);
      }
    }
    const el = createSVGElement('polygon', { points: pts.join(' '), fill, stroke, 'stroke-width': sw });
    addShape(el, 'polygon-' + shapeCounter);
  } else if (currentTool === 'freehand' && freehandPoints.length > 2) {
    const d = smoothPath(freehandPoints);
    const el = createSVGElement('path', { d, fill: 'none', stroke, 'stroke-width': sw, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
    addShape(el, 'freehand-' + shapeCounter);
    removeFreehandPreview();
    freehandPoints = [];
  }
});

// Freehand
function smoothPath(points) {
  if (points.length < 2) return '';
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length - 1; i++) {
    const mx = (points[i].x + points[i+1].x) / 2;
    const my = (points[i].y + points[i+1].y) / 2;
    d += ` Q ${points[i].x} ${points[i].y} ${mx} ${my}`;
  }
  d += ` L ${points[points.length-1].x} ${points[points.length-1].y}`;
  return d;
}

function drawFreehandPreview() {
  removeFreehandPreview();
  const d = smoothPath(freehandPoints);
  const el = createSVGElement('path', { d, fill: 'none', stroke: '#ec4899', 'stroke-width': 1.5/zoom, 'stroke-dasharray': `${4/zoom}`, class: 'freehand-preview' });
  canvas.appendChild(el);
}
function removeFreehandPreview() { canvas.querySelectorAll('.freehand-preview').forEach(e => e.remove()); }

// Pen tool
function drawPenPreview() {
  canvas.querySelectorAll('.pen-preview, .pen-dot').forEach(e => e.remove());
  if (penPoints.length < 2) {
    if (penPoints.length === 1) {
      const dot = createSVGElement('circle', { cx: penPoints[0].x, cy: penPoints[0].y, r: 4/zoom, fill: '#ec4899', class: 'pen-dot' });
      canvas.appendChild(dot);
    }
    return;
  }
  let d = `M ${penPoints[0].x} ${penPoints[0].y}`;
  for (let i = 1; i < penPoints.length; i++) d += ` L ${penPoints[i].x} ${penPoints[i].y}`;
  const el = createSVGElement('path', { d, fill: 'none', stroke: '#ec4899', 'stroke-width': 1.5/zoom, 'stroke-dasharray': `${4/zoom}`, class: 'pen-preview' });
  canvas.appendChild(el);
  penPoints.forEach(p => {
    const dot = createSVGElement('circle', { cx: p.x, cy: p.y, r: 3/zoom, fill: '#ec4899', class: 'pen-dot' });
    canvas.appendChild(dot);
  });
}

function finishPen() {
  if (penPoints.length < 2) { penPoints = []; canvas.querySelectorAll('.pen-preview, .pen-dot').forEach(e => e.remove()); return; }
  saveState();
  let d = `M ${penPoints[0].x} ${penPoints[0].y}`;
  for (let i = 1; i < penPoints.length; i++) d += ` L ${penPoints[i].x} ${penPoints[i].y}`;
  const stroke = strokeNone ? 'none' : document.getElementById('prop-stroke').value;
  const fill = fillNone ? 'none' : document.getElementById('prop-fill').value;
  const el = createSVGElement('path', { d, fill, stroke, 'stroke-width': document.getElementById('prop-stroke-width').value });
  canvas.querySelectorAll('.pen-preview, .pen-dot').forEach(e => e.remove());
  addShape(el, 'path-' + shapeCounter);
  penPoints = [];
}

// Wheel zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  zoomCanvas(delta);
}, { passive: false });

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const ctrl = e.ctrlKey || e.metaKey;
  if (e.key === 'v' && !ctrl) setTool('select');
  else if (e.key === 'p' && !ctrl) setTool('pen');
  else if (e.key === 'r' && !ctrl) setTool('rect');
  else if (e.key === 'e' && !ctrl) setTool('ellipse');
  else if (e.key === 'l' && !ctrl) setTool('line');
  else if (e.key === 'g' && !ctrl) setTool('polygon');
  else if (e.key === 't' && !ctrl) setTool('text');
  else if (e.key === 'f' && !ctrl) setTool('freehand');
  else if (e.key === 'i' && !ctrl) setTool('eyedropper');
  else if (e.key === 'h' && !ctrl) setTool('pan');
  else if (e.key === 'z' && ctrl) { e.preventDefault(); undo(); }
  else if (e.key === 'y' && ctrl) { e.preventDefault(); redo(); }
  else if (e.key === 'c' && ctrl) copyShape();
  else if (e.key === 'v' && ctrl) pasteShape();
  else if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  else if (e.key === 'Escape') { if (currentTool === 'pen') finishPen(); }
  else if (e.key === 'Enter' && currentTool === 'pen') finishPen();
});

// Copy/Paste/Delete
function copyShape() { if (selectedShape) clipboard = selectedShape.cloneNode(true); }
function pasteShape() {
  if (!clipboard) return;
  saveState();
  const el = clipboard.cloneNode(true);
  moveShapeBy(el, 20, 20);
  addShape(el, el.getAttribute('data-name') + '-copy');
}
function deleteSelected() {
  if (!selectedShape) return;
  saveState();
  const idx = shapes.indexOf(selectedShape);
  if (idx > -1) shapes.splice(idx, 1);
  selectedShape.remove();
  selectedShape = null;
  clearHandles();
  updateLayers();
}

// File operations
function newCanvas() {
  if (!confirm('Clear canvas? Unsaved changes will be lost.')) return;
  saveState();
  shapes = [];
  canvas.innerHTML = '';
  selectedShape = null;
  updateLayers();
}

function exportSVG() {
  clearHandles();
  const svgData = new XMLSerializer().serializeToString(canvas);
  const blob = new Blob([svgData], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vector-art.svg';
  a.click();
  if (selectedShape) drawHandles(selectedShape);
}

function exportPNG() {
  clearHandles();
  const svgData = new XMLSerializer().serializeToString(canvas);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 800; c.height = 600;
    c.getContext('2d').drawImage(img, 0, 0);
    c.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vector-art.png';
      a.click();
    });
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
  if (selectedShape) drawHandles(selectedShape);
}

function copySVGCode() {
  clearHandles();
  const svgData = new XMLSerializer().serializeToString(canvas);
  navigator.clipboard.writeText(svgData);
  alert('SVG code copied to clipboard!');
  if (selectedShape) drawHandles(selectedShape);
}

function openSVGModal() { document.getElementById('svg-modal').classList.add('open'); }
function closeSVGModal() { document.getElementById('svg-modal').classList.remove('open'); }

function importSVG() {
  const code = document.getElementById('svg-input').value.trim();
  if (!code) return;
  saveState();
  const parser = new DOMParser();
  const doc = parser.parseFromString(code, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  if (svg) {
    Array.from(svg.children).forEach(child => {
      const imported = document.importNode(child, true);
      addShape(imported, imported.tagName + '-' + shapeCounter);
    });
  }
  closeSVGModal();
  document.getElementById('svg-input').value = '';
}

function loadSVGFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { document.getElementById('svg-input').value = reader.result; };
  reader.readAsText(file);
}

// Init
updateCanvasTransform();
updateLayers();
</script>
