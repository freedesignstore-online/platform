<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; padding: 24px; }
a { color: #ec4899; text-decoration: none; }
a:hover { text-decoration: underline; }
.back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; font-size: 14px; color: #6b7280; }
.back:hover { color: #ec4899; text-decoration: none; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.subtitle { color: #6b7280; margin-bottom: 24px; font-size: 15px; }
.container { max-width: 1400px; margin: 0 auto; }
.panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 20px; }
.toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.search-input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; }
.search-input:focus { outline: none; border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236,72,153,.1); }
.count { font-size: 13px; color: #6b7280; white-space: nowrap; }
.cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.cat-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; color: #6b7280; transition: all .15s; }
.cat-tab:hover { border-color: #ec4899; color: #ec4899; }
.cat-tab.active { background: #ec4899; color: #fff; border-color: #ec4899; }
.main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
.icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
.icon-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px 6px 10px; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all .15s; gap: 6px; position: relative; }
.icon-card:hover { border-color: #ec4899; background: #fdf2f8; transform: translateY(-1px); }
.icon-card.selected { border-color: #ec4899; background: #fdf2f8; box-shadow: 0 0 0 2px rgba(236,72,153,.2); }
.icon-card.in-collection::after { content: ''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: #ec4899; }
.icon-card svg { flex-shrink: 0; }
.icon-card span { font-size: 9px; color: #6b7280; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
.sidebar .panel { position: sticky; top: 24px; }
.sidebar h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.sidebar label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 4px; margin-top: 10px; }
.sidebar select, .sidebar input[type="number"] { width: 100%; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-family: inherit; font-size: 13px; background: #fff; }
.sidebar select:focus, .sidebar input:focus { outline: none; border-color: #ec4899; }
.size-presets { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
.size-btn { padding: 3px 8px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; font-family: inherit; }
.size-btn:hover, .size-btn.active { border-color: #ec4899; color: #ec4899; }
.color-row { display: flex; gap: 6px; align-items: center; }
.color-row input[type="color"] { width: 32px; height: 32px; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; padding: 2px; }
.recent-colors { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.recent-color { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #e5e7eb; cursor: pointer; }
.recent-color:hover { border-color: #ec4899; }
.toggle-row { display: flex; gap: 12px; margin-top: 10px; }
.toggle-btn { padding: 4px 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500; }
.toggle-btn.active { background: #ec4899; color: #fff; border-color: #ec4899; }
.preview-sizes { display: flex; gap: 12px; align-items: flex-end; margin: 14px 0; padding: 14px; background: #f9fafb; border-radius: 8px; flex-wrap: wrap; justify-content: center; }
.preview-sizes .ps-item { text-align: center; }
.preview-sizes .ps-label { font-size: 9px; color: #9ca3af; margin-top: 4px; }
.similar-section { margin-top: 14px; }
.similar-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.similar-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; }
.similar-icon:hover { border-color: #ec4899; background: #fdf2f8; }
.copy-btns { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.btn { padding: 7px 14px; border-radius: 8px; border: none; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; text-align: center; }
.btn:hover { opacity: .85; }
.btn-primary { background: #ec4899; color: #fff; }
.btn-secondary { background: #fff; border: 1px solid #e5e7eb; color: #1a1a1a; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.collection-bar { display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
.collection-bar select { flex: 1; }
.collection-bar input { flex: 1; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 6px; font-family: inherit; font-size: 12px; }
.recent-section { margin-top: 16px; }
.recent-row { display: flex; gap: 6px; flex-wrap: wrap; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
.batch-bar { display: flex; gap: 8px; align-items: center; padding: 10px 16px; background: #fdf2f8; border: 1px solid #fbcfe8; border-radius: 8px; margin-bottom: 16px; }
.batch-bar span { font-size: 13px; font-weight: 500; flex: 1; }
.hidden { display: none !important; }
</style>

<body>
<div class="container">
  <a href="/tools/" class="back">&larr; Tools</a>
  <h1>SVG Icon Library</h1>
  <p class="subtitle">300+ open-source SVG icons across 12 categories. Search, customize, and export in any format.</p>

  <div class="panel">
    <div class="toolbar">
      <input type="text" class="search-input" id="search" placeholder="Search 300+ icons...">
      <span class="count" id="count"></span>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="batch-bar hidden" id="batchBar">
      <span id="batchCount">0 selected</span>
      <button class="btn btn-sm btn-secondary" onclick="clearBatch()">Clear</button>
      <button class="btn btn-sm btn-primary" onclick="downloadBatchSVG()">Download ZIP (SVG)</button>
      <button class="btn btn-sm btn-secondary" onclick="downloadSpriteSheet()">Sprite Sheet</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="panel" style="overflow-y:auto;max-height:80vh;">
      <div class="icon-grid" id="iconGrid"></div>
    </div>
    <div class="sidebar">
      <div class="panel" id="customizePanel">
        <h3 id="panelTitle">Select an icon</h3>
        <div id="panelContent">
          <p style="font-size:13px;color:#9ca3af;">Click any icon to customize and export it.</p>
          <div class="recent-section" id="recentSection" style="display:none;">
            <label>Recently Used</label>
            <div class="recent-row" id="recentRow"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>

const CATS=[
  {id:'all',label:'All'},
  {id:'arrows',label:'Arrows'},{id:'ui',label:'UI/Interface'},{id:'social',label:'Social Media'},
  {id:'business',label:'Business'},{id:'media',label:'Media'},{id:'weather',label:'Weather'},
  {id:'comms',label:'Communication'},{id:'ecommerce',label:'E-commerce'},{id:'files',label:'Files'},
  {id:'maps',label:'Maps'},{id:'health',label:'Health'},{id:'misc',label:'Misc'}
];

// State
let selectedIcon=null, activeCat='all';
let iconSize=24, strokeW=2, iconColor='#1a1a1a', fillMode=false, roundCap=true;
let recentColors=JSON.parse(localStorage.getItem('fds-icon-recent-colors')||'[]');
let recentIcons=JSON.parse(localStorage.getItem('fds-icon-recent')||'[]');
let collections=JSON.parse(localStorage.getItem('fds-icon-collections')||'{}');
let currentCollection=Object.keys(collections)[0]||'';
let batchSelected=new Set();

const grid=document.getElementById('iconGrid');
const searchEl=document.getElementById('search');
const countEl=document.getElementById('count');
const catTabsEl=document.getElementById('catTabs');
const toast=document.getElementById('toast');
const batchBar=document.getElementById('batchBar');
const batchCountEl=document.getElementById('batchCount');

function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500);}

function makeSVG(icon,size,sw,color,fill,round){
  const lc=round?'round':'butt', lj=round?'round':'miter';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill?color:'none'}" stroke="${color}" stroke-width="${sw}" stroke-linecap="${lc}" stroke-linejoin="${lj}"><path d="${icon.path}"/></svg>`;
}

// Category tabs
CATS.forEach(c=>{
  const btn=document.createElement('button');
  btn.className='cat-tab'+(c.id==='all'?' active':'');
  btn.textContent=c.label;
  btn.onclick=()=>{
    activeCat=c.id;
    catTabsEl.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  };
  catTabsEl.appendChild(btn);
});

function getFiltered(){
  const q=searchEl.value.toLowerCase().trim();
  return icons.filter(i=>{
    if(activeCat!=='all'&&i.cat!==activeCat)return false;
    if(q&&!i.name.includes(q)&&!i.cat.includes(q))return false;
    return true;
  });
}

function renderGrid(){
  const filtered=getFiltered();
  countEl.textContent=filtered.length+' icons';
  grid.innerHTML=filtered.map(i=>{
    const svg=makeSVG(i,24,2,'#1a1a1a',false,true);
    const sel=selectedIcon&&selectedIcon.name===i.name?' selected':'';
    const inC=isInAnyCollection(i.name)?' in-collection':'';
    const batch=batchSelected.has(i.name)?' selected':'';
    return `<div class="icon-card${sel}${inC}${batch}" data-name="${i.name}" title="${i.name}">${svg}<span>${i.name}</span></div>`;
  }).join('');
  batchBar.classList.toggle('hidden',batchSelected.size===0);
  batchCountEl.textContent=batchSelected.size+' selected';
}

function isInAnyCollection(name){
  return Object.values(collections).some(arr=>arr.includes(name));
}

grid.addEventListener('click',e=>{
  const card=e.target.closest('.icon-card');
  if(!card)return;
  const name=card.dataset.name;
  if(e.shiftKey){
    if(batchSelected.has(name))batchSelected.delete(name);else batchSelected.add(name);
    renderGrid();
    return;
  }
  const icon=icons.find(i=>i.name===name);
  if(!icon)return;
  selectedIcon=icon;
  addRecent(name);
  renderGrid();
  renderPanel();
});

function addRecent(name){
  recentIcons=recentIcons.filter(n=>n!==name);
  recentIcons.unshift(name);
  if(recentIcons.length>12)recentIcons.length=12;
  localStorage.setItem('fds-icon-recent',JSON.stringify(recentIcons));
}

function addRecentColor(c){
  recentColors=recentColors.filter(x=>x!==c);
  recentColors.unshift(c);
  if(recentColors.length>8)recentColors.length=8;
  localStorage.setItem('fds-icon-recent-colors',JSON.stringify(recentColors));
}

function renderPanel(){
  const panel=document.getElementById('panelContent');
  const title=document.getElementById('panelTitle');
  if(!selectedIcon){
    title.textContent='Select an icon';
    panel.innerHTML='<p style="font-size:13px;color:#9ca3af;">Click any icon to customize and export it.</p>';
    renderRecentInPanel(panel);
    return;
  }
  title.textContent=selectedIcon.name;
  const svg=makeSVG(selectedIcon,iconSize,strokeW,iconColor,fillMode,roundCap);
  const similar=icons.filter(i=>i.cat===selectedIcon.cat&&i.name!==selectedIcon.name).slice(0,8);

  panel.innerHTML=`
    <div class="preview-sizes">
      ${[16,24,32,48,64].map(s=>`<div class="ps-item"><div>${makeSVG(selectedIcon,s,strokeW,iconColor,fillMode,roundCap)}</div><div class="ps-label">${s}px</div></div>`).join('')}
    </div>
    <label>Size</label>
    <div class="size-presets">${[16,20,24,32,48,64].map(s=>`<button class="size-btn${iconSize===s?' active':''}" data-s="${s}">${s}</button>`).join('')}
      <input type="number" value="${iconSize}" min="8" max="128" style="width:52px;padding:3px 6px;border:1px solid #e5e7eb;border-radius:4px;font-size:11px;" id="customSize">
    </div>
    <label>Stroke Width</label>
    <div class="size-presets">${[1,1.5,2,2.5,3].map(s=>`<button class="size-btn${strokeW===s?' active':''}" data-sw="${s}">${s}</button>`).join('')}</div>
    <label>Color</label>
    <div class="color-row">
      <input type="color" id="pColor" value="${iconColor}">
      <span style="font-size:12px;color:#6b7280;" id="pColorHex">${iconColor}</span>
    </div>
    ${recentColors.length?`<div class="recent-colors">${recentColors.map(c=>`<div class="recent-color" style="background:${c}" data-c="${c}"></div>`).join('')}</div>`:''}
    <div class="toggle-row">
      <button class="toggle-btn${fillMode?' active':''}" id="toggleFill">Fill</button>
      <button class="toggle-btn${!fillMode?' active':''}" id="toggleStroke">Stroke</button>
      <button class="toggle-btn${roundCap?' active':''}" id="toggleRound">Round</button>
      <button class="toggle-btn${!roundCap?' active':''}" id="toggleSquare">Square</button>
    </div>
    <div class="copy-btns">
      <button class="btn btn-primary" id="copySVG">Copy SVG</button>
      <button class="btn btn-secondary" id="copyJSX">Copy React JSX</button>
      <button class="btn btn-secondary" id="copyVue">Copy Vue Template</button>
      <button class="btn btn-secondary" id="copyDataURL">Copy Data URL</button>
      <button class="btn btn-secondary" id="dlSVG">Download SVG</button>
      <button class="btn btn-secondary" id="dlPNG">Download PNG</button>
    </div>
    <label style="margin-top:14px;">Collections</label>
    <div class="collection-bar">
      <select id="collSelect">${Object.keys(collections).map(n=>`<option value="${n}"${n===currentCollection?' selected':''}>${n} (${collections[n].length})</option>`).join('')}
        <option value="__new">+ New collection...</option>
      </select>
      <button class="btn btn-sm btn-primary" id="addToColl">Add</button>
    </div>
    ${similar.length?`<div class="similar-section"><label>Similar Icons</label><div class="similar-grid">${similar.map(s=>`<div class="similar-icon" data-name="${s.name}" title="${s.name}">${makeSVG(s,18,2,'#6b7280',false,true)}</div>`).join('')}</div></div>`:''}
  `;

  // Event handlers
  panel.querySelectorAll('.size-btn[data-s]').forEach(b=>b.onclick=()=>{iconSize=+b.dataset.s;renderPanel();});
  panel.querySelectorAll('.size-btn[data-sw]').forEach(b=>b.onclick=()=>{strokeW=+b.dataset.sw;renderPanel();});
  const cs=panel.querySelector('#customSize');
  cs.onchange=()=>{iconSize=Math.max(8,Math.min(128,+cs.value));renderPanel();};
  const pc=panel.querySelector('#pColor');
  pc.oninput=()=>{iconColor=pc.value;panel.querySelector('#pColorHex').textContent=pc.value;addRecentColor(pc.value);renderPanel();};
  panel.querySelectorAll('.recent-color').forEach(el=>el.onclick=()=>{iconColor=el.dataset.c;renderPanel();});
  panel.querySelector('#toggleFill').onclick=()=>{fillMode=true;renderPanel();};
  panel.querySelector('#toggleStroke').onclick=()=>{fillMode=false;renderPanel();};
  panel.querySelector('#toggleRound').onclick=()=>{roundCap=true;renderPanel();};
  panel.querySelector('#toggleSquare').onclick=()=>{roundCap=false;renderPanel();};
  panel.querySelector('#copySVG').onclick=()=>{navigator.clipboard.writeText(makeSVG(selectedIcon,iconSize,strokeW,iconColor,fillMode,roundCap));showToast('SVG copied');};
  panel.querySelector('#copyJSX').onclick=()=>{
    const lc=roundCap?'round':'butt',lj=roundCap?'round':'miter';
    const jsx=`<svg xmlns="http://www.w3.org/2000/svg" width={${iconSize}} height={${iconSize}} viewBox="0 0 24 24" fill="${fillMode?iconColor:'none'}" stroke="${iconColor}" strokeWidth={${strokeW}} strokeLinecap="${lc}" strokeLinejoin="${lj}"><path d="${selectedIcon.path}" /></svg>`;
    navigator.clipboard.writeText(jsx);showToast('JSX copied');
  };
  panel.querySelector('#copyVue').onclick=()=>{
    const lc=roundCap?'round':'butt',lj=roundCap?'round':'miter';
    const vue=`<template>\n  <svg xmlns="http://www.w3.org/2000/svg" :width="${iconSize}" :height="${iconSize}" viewBox="0 0 24 24" fill="${fillMode?iconColor:'none'}" stroke="${iconColor}" stroke-width="${strokeW}" stroke-linecap="${lc}" stroke-linejoin="${lj}">\n    <path d="${selectedIcon.path}" />\n  </svg>\n</template>`;
    navigator.clipboard.writeText(vue);showToast('Vue template copied');
  };
  panel.querySelector('#copyDataURL').onclick=()=>{
    const encoded=encodeURIComponent(makeSVG(selectedIcon,iconSize,strokeW,iconColor,fillMode,roundCap));
    navigator.clipboard.writeText(`data:image/svg+xml,${encoded}`);showToast('Data URL copied');
  };
  panel.querySelector('#dlSVG').onclick=()=>{
    const blob=new Blob([makeSVG(selectedIcon,iconSize,strokeW,iconColor,fillMode,roundCap)],{type:'image/svg+xml'});
    const a=document.createElement('a');a.download=selectedIcon.name+'.svg';a.href=URL.createObjectURL(blob);a.click();
  };
  panel.querySelector('#dlPNG').onclick=()=>{
    const svgStr=makeSVG(selectedIcon,iconSize,strokeW,iconColor,fillMode,roundCap);
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');c.width=iconSize;c.height=iconSize;
      c.getContext('2d').drawImage(img,0,0);
      const a=document.createElement('a');a.download=selectedIcon.name+'.png';a.href=c.toDataURL('image/png');a.click();
    };
    img.src='data:image/svg+xml,'+encodeURIComponent(svgStr);
  };
  const collSel=panel.querySelector('#collSelect');
  collSel.onchange=()=>{
    if(collSel.value==='__new'){
      const name=prompt('Collection name:');
      if(name&&name.trim()){
        currentCollection=name.trim();
        if(!collections[currentCollection])collections[currentCollection]=[];
        saveCollections();
        renderPanel();
      }else{collSel.value=currentCollection;}
    }else{currentCollection=collSel.value;}
  };
  panel.querySelector('#addToColl').onclick=()=>{
    if(!currentCollection){
      const name=prompt('Collection name:');
      if(!name||!name.trim())return;
      currentCollection=name.trim();
      collections[currentCollection]=[];
    }
    if(!collections[currentCollection])collections[currentCollection]=[];
    if(!collections[currentCollection].includes(selectedIcon.name)){
      collections[currentCollection].push(selectedIcon.name);
      saveCollections();
      showToast('Added to '+currentCollection);
      renderGrid();
      renderPanel();
    }else{showToast('Already in collection');}
  };
  panel.querySelectorAll('.similar-icon').forEach(el=>el.onclick=()=>{
    const ic=icons.find(i=>i.name===el.dataset.name);
    if(ic){selectedIcon=ic;addRecent(ic.name);renderGrid();renderPanel();}
  });
}

function renderRecentInPanel(panel){
  if(!recentIcons.length)return;
  const sec=document.createElement('div');
  sec.className='recent-section';
  sec.style.marginTop='14px';
  sec.innerHTML=`<label>Recently Used</label><div class="recent-row">${recentIcons.slice(0,8).map(name=>{
    const ic=icons.find(i=>i.name===name);
    if(!ic)return'';
    return `<div class="similar-icon" data-name="${name}" title="${name}">${makeSVG(ic,18,2,'#6b7280',false,true)}</div>`;
  }).join('')}</div>`;
  panel.appendChild(sec);
  sec.querySelectorAll('.similar-icon').forEach(el=>el.onclick=()=>{
    const ic=icons.find(i=>i.name===el.dataset.name);
    if(ic){selectedIcon=ic;addRecent(ic.name);renderGrid();renderPanel();}
  });
}

function saveCollections(){localStorage.setItem('fds-icon-collections',JSON.stringify(collections));}

// Batch download
function clearBatch(){batchSelected.clear();renderGrid();}

function downloadBatchSVG(){
  if(!batchSelected.size)return;
  const files=[];
  batchSelected.forEach(name=>{
    const ic=icons.find(i=>i.name===name);
    if(ic)files.push({name:name+'.svg',content:makeSVG(ic,iconSize,strokeW,iconColor,fillMode,roundCap)});
  });
  // Simple concatenation download as combined SVG sprite
  let sprite='<svg xmlns="http://www.w3.org/2000/svg" style="display:none">\n';
  files.forEach(f=>{
    const inner=f.content.replace(/<svg[^>]*>/,'').replace('</svg>','');
    sprite+=`  <symbol id="${f.name.replace('.svg','')}" viewBox="0 0 24 24">${inner}</symbol>\n`;
  });
  sprite+='</svg>';
  // Download each as individual file triggers
  files.forEach(f=>{
    const blob=new Blob([f.content],{type:'image/svg+xml'});
    const a=document.createElement('a');a.download=f.name;a.href=URL.createObjectURL(blob);a.click();
  });
  showToast(files.length+' SVGs downloaded');
}

function downloadSpriteSheet(){
  if(!batchSelected.size)return;
  let sprite='<svg xmlns="http://www.w3.org/2000/svg">\n<defs>\n';
  batchSelected.forEach(name=>{
    const ic=icons.find(i=>i.name===name);
    if(!ic)return;
    const lc=roundCap?'round':'butt',lj=roundCap?'round':'miter';
    sprite+=`  <symbol id="${name}" viewBox="0 0 24 24" fill="${fillMode?iconColor:'none'}" stroke="${iconColor}" stroke-width="${strokeW}" stroke-linecap="${lc}" stroke-linejoin="${lj}"><path d="${ic.path}"/></symbol>\n`;
  });
  sprite+='</defs>\n</svg>';
  const blob=new Blob([sprite],{type:'image/svg+xml'});
  const a=document.createElement('a');a.download='icon-sprite.svg';a.href=URL.createObjectURL(blob);a.click();
  showToast('Sprite sheet downloaded');
}

searchEl.addEventListener('input',renderGrid);
renderGrid();
renderPanel();
</script>
<script src="/related.js"></script>
</body>
