<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; padding: 24px; }
a { color: #ec4899; text-decoration: none; }
a:hover { text-decoration: underline; }
.back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; font-size: 14px; color: #6b7280; }
.back:hover { color: #ec4899; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.subtitle { color: #6b7280; margin-bottom: 24px; font-size: 15px; }
.container { max-width: 1200px; margin: 0 auto; }
.panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 20px; }
.toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
.search-input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px; }
.search-input:focus { outline: none; border-color: #ec4899; }
select { padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff; }
.customize { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.customize label { font-size: 13px; color: #6b7280; font-weight: 500; }
.customize input[type="number"] { width: 60px; padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; }
.customize input[type="color"] { width: 32px; height: 32px; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; padding: 2px; }
.icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
.icon-card { display: flex; flex-direction: column; align-items: center; padding: 16px 8px; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; transition: all .15s; gap: 8px; }
.icon-card:hover { border-color: #ec4899; background: #fdf2f8; transform: translateY(-1px); }
.icon-card svg { flex-shrink: 0; }
.icon-card span { font-size: 10px; color: #6b7280; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
.count { font-size: 13px; color: #6b7280; }
</style>
</head>

<div class="container">
  <a href="/" class="back">&larr; Back to FreeDesignStore</a>
  <h1>SVG Icon Library</h1>

  <div class="panel">
    <div class="toolbar">
      <input type="text" class="search-input" id="search" placeholder="Search icons...">
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="arrows">Arrows</option>
        <option value="ui">UI</option>
        <option value="social">Social</option>
        <option value="business">Business</option>
        <option value="media">Media</option>
        <option value="weather">Weather</option>
        <option value="shapes">Shapes</option>
      </select>
      <span class="count" id="count"></span>
    </div>
    <div class="customize">
      <label>Size</label>
      <input type="number" id="iconSize" value="24" min="12" max="96">
      <label>Stroke</label>
      <input type="number" id="strokeWidth" value="2" min="1" max="4" step="0.5">
      <label>Color</label>
      <input type="color" id="iconColor" value="#1a1a1a">
    </div>
  </div>

  <div class="panel">
    <div class="icon-grid" id="iconGrid"></div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>

const grid = document.getElementById('iconGrid');
const search = document.getElementById('search');
const categoryFilter = document.getElementById('categoryFilter');
const iconSize = document.getElementById('iconSize');
const strokeWidth = document.getElementById('strokeWidth');
const iconColor = document.getElementById('iconColor');
const countEl = document.getElementById('count');
const toast = document.getElementById('toast');

function renderIcons() {
  const q = search.value.toLowerCase();
  const cat = categoryFilter.value;
  const size = parseInt(iconSize.value) || 24;
  const sw = parseFloat(strokeWidth.value) || 2;
  const color = iconColor.value;

  const filtered = icons.filter(i => {
    if (cat !== 'all' && i.cat !== cat) return false;
    if (q && !i.name.includes(q) && !i.cat.includes(q)) return false;
    return true;
  });

  countEl.textContent = filtered.length + ' icons';
  grid.innerHTML = filtered.map(i => {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><path d="${i.path}"/></svg>`;
    return `<div class="icon-card" data-svg='${svg.replace(/'/g,"&#39;")}'>${svg}<span>${i.name}</span></div>`;
  }).join('');
}

grid.addEventListener('click', e => {
  const card = e.target.closest('.icon-card');
  if (!card) return;
  const svg = card.dataset.svg;
  navigator.clipboard.writeText(svg).then(() => {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
});

search.addEventListener('input', renderIcons);
categoryFilter.addEventListener('change', renderIcons);
iconSize.addEventListener('input', renderIcons);
strokeWidth.addEventListener('input', renderIcons);
iconColor.addEventListener('input', renderIcons);

renderIcons();
</script>
