<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#ec4899;--muted:#6b7280;--line:#e5e7eb}
body{background:#fafafa;color:#1a1a1a;font-family:'Manrope',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{position:sticky;top:0;z-index:40;border-bottom:1px solid var(--line);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;background:rgba(255,255,255,.94);backdrop-filter:blur(14px)}

.content{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-family:'Fraunces',serif;font-size:4rem;color:var(--accent);margin-bottom:.5rem}
p{color:var(--muted);font-size:1rem;margin-bottom:1.5rem;line-height:1.6}
.links{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}
.links a{color:var(--accent);font-weight:600;font-size:.82rem;padding:.5rem 1.2rem;border:1px solid var(--line);border-radius:8px;text-decoration:none;transition:border-color .15s}
.links a:hover{border-color:var(--accent)}
footer{border-top:1px solid var(--line);padding:1rem;text-align:center;font-size:.7rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
