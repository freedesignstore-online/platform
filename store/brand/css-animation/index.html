<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animation Studio - FreeDesignStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Manrope', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; padding: 24px; }
a.back { display: inline-block; margin-bottom: 24px; color: #ec4899; text-decoration: none; font-weight: 500; }
a.back:hover { text-decoration: underline; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
p.subtitle { color: #6b7280; margin-bottom: 24px; }
.panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 24px; }
h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
label { display: block; font-size: 13px; font-weight: 500; color: #6b7280; margin-bottom: 6px; }
input[type="text"], input[type="number"], select { padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 13px; background: #fff; }
input[type="color"] { width: 36px; height: 32px; border: 1px solid #e5e7eb; border-radius: 6px; padding: 2px; cursor: pointer; }
input[type="range"] { width: 100%; cursor: pointer; }
textarea { width: 100%; resize: vertical; min-height: 100px; font-family: 'Courier New', monospace; font-size: 12px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fafafa; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; font-size: 13px; transition: opacity .2s; }
.btn:hover { opacity: .85; }
.btn-primary { background: #ec4899; color: #fff; }
.btn-secondary { background: #f3f4f6; color: #1a1a1a; border: 1px solid #e5e7eb; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; padding: 0; font-size: 16px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }

/* Preview */
.preview-stage { width: 100%; height: 280px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-bottom: 16px; }
.preview-element { transition: none; }

/* Timeline */
.timeline-wrap { position: relative; margin-bottom: 24px; }
.timeline-bar { position: relative; height: 48px; background: #f3f4f6; border-radius: 8px; cursor: pointer; overflow: visible; border: 1px solid #e5e7eb; }
.timeline-track { position: absolute; top: 22px; left: 0; right: 0; height: 4px; background: #d1d5db; border-radius: 2px; }
.timeline-progress { position: absolute; top: 22px; left: 0; height: 4px; background: #ec4899; border-radius: 2px; transition: width .05s linear; }
.timeline-marker { position: absolute; top: 12px; width: 24px; height: 24px; background: #ec4899; border: 2px solid #fff; border-radius: 50%; transform: translateX(-12px); cursor: grab; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.timeline-marker.selected { background: #be185d; box-shadow: 0 0 0 3px rgba(236,72,153,.3); }
.timeline-labels { display: flex; justify-content: space-between; font-size: 10px; color: #9ca3af; margin-top: 4px; }
.playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #1a1a1a; z-index: 3; pointer-events: none; }

/* Keyframe editor */
.kf-props { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.kf-prop label { margin-bottom: 2px; }
.kf-prop input, .kf-prop select { width: 100%; }

/* Easing curve editor */
.curve-canvas { width: 200px; height: 200px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; cursor: crosshair; }

/* Presets */
.preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 16px; }
.preset-item { padding: 10px; text-align: center; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; transition: border-color .15s; }
.preset-item:hover { border-color: #ec4899; }

/* Library */
.lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.lib-item { padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; }
.lib-item .lib-name { font-weight: 600; margin-bottom: 4px; }
.lib-item .lib-actions { display: flex; gap: 4px; margin-top: 8px; }

.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<a class="back" href="/tools/">&larr; Tools</a>
<h1>CSS Animation Studio</h1>
<p class="subtitle">Visual keyframe animation editor with timeline, easing curves, and 20 presets.</p>

<!-- Preview -->
<div class="panel">
<h2>Preview</h2>
<div class="row" style="margin-bottom:12px;">
<label style="margin:0;">Element:</label>
<select id="elShape" onchange="updateElement()">
<option value="box">Box</option>
<option value="circle">Circle</option>
<option value="text">Text</option>
<option value="icon">Star Icon</option>
</select>
<label style="margin:0;">Size:</label>
<input type="number" id="elSize" value="80" min="20" max="200" style="width:70px;" onchange="updateElement()">
<label style="margin:0;">Color:</label>
<input type="color" id="elColor" value="#ec4899" onchange="updateElement()">
</div>
<div class="preview-stage" id="stage">
<div class="preview-element" id="previewEl"></div>
</div>

<!-- Playback -->
<div class="row" style="margin-bottom:12px;">
<button class="btn btn-primary btn-icon" id="playBtn" onclick="togglePlay()">&#9654;</button>
<button class="btn btn-secondary btn-icon" onclick="stopAnim()">&#9632;</button>
<label style="margin:0;">Speed:</label>
<select id="speedSelect">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="2">2x</option>
</select>
<label style="margin:0;">Loop:</label>
<input type="checkbox" id="loopCheck" checked style="width:auto;">
<label style="margin:0;">Duration:</label>
<input type="number" id="duration" value="1000" min="100" max="10000" step="100" style="width:90px;"> <span style="font-size:12px;color:#6b7280;">ms</span>
<label style="margin:0;">Delay:</label>
<input type="number" id="delay" value="0" min="0" max="5000" step="100" style="width:80px;"> <span style="font-size:12px;color:#6b7280;">ms</span>
</div>
</div>

<!-- Timeline -->
<div class="panel">
<h2>Timeline</h2>
<div class="timeline-wrap">
<div class="timeline-bar" id="timelineBar">
<div class="timeline-track"></div>
<div class="timeline-progress" id="timelineProgress"></div>
<div class="playhead" id="playhead" style="left:0;"></div>
</div>
<div class="timeline-labels"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
</div>
<div class="row">
<button class="btn btn-primary btn-sm" onclick="addKeyframe()">+ Add Keyframe</button>
<button class="btn btn-secondary btn-sm" onclick="removeKeyframe()">Remove Selected</button>
<span style="font-size:12px;color:#6b7280;" id="kfInfo">Click timeline to add keyframe at position</span>
</div>
</div>

<!-- Keyframe Properties -->
<div class="panel" id="kfPanel">
<h2>Keyframe Properties <span id="kfLabel" style="color:#ec4899;"></span></h2>
<div class="kf-props" id="kfProps"></div>
</div>

<!-- Easing -->
<div class="panel">
<div class="grid-2">
<div>
<h2>Easing</h2>
<div class="row" style="margin-bottom:12px;">
<select id="easingSelect" onchange="onEasingChange()" style="flex:1;">
<option value="linear">linear</option>
<option value="ease" selected>ease</option>
<option value="ease-in">ease-in</option>
<option value="ease-out">ease-out</option>
<option value="ease-in-out">ease-in-out</option>
<option value="custom">cubic-bezier (custom)</option>
</select>
</div>
<div id="cubicControls" style="display:none;">
<div class="row" style="margin-bottom:8px;">
<label style="margin:0;">x1:</label><input type="number" id="cx1" value="0.42" step="0.01" min="0" max="1" style="width:70px;" onchange="updateCurve()">
<label style="margin:0;">y1:</label><input type="number" id="cy1" value="0" step="0.01" min="-1" max="2" style="width:70px;" onchange="updateCurve()">
<label style="margin:0;">x2:</label><input type="number" id="cx2" value="0.58" step="0.01" min="0" max="1" style="width:70px;" onchange="updateCurve()">
<label style="margin:0;">y2:</label><input type="number" id="cy2" value="1" step="0.01" min="-1" max="2" style="width:70px;" onchange="updateCurve()">
</div>
</div>
<canvas class="curve-canvas" id="curveCanvas" width="200" height="200"></canvas>
</div>
<div>
<h2>Presets</h2>
<div class="preset-grid" id="presetGrid"></div>
</div>
</div>
</div>

<!-- Export -->
<div class="panel">
<h2>Export CSS</h2>
<textarea id="exportOutput" readonly></textarea>
<div class="row" style="margin-top:12px;">
<button class="btn btn-primary" onclick="copyCSS()">Copy to Clipboard</button>
<button class="btn btn-secondary" onclick="saveToLibrary()">Save to Library</button>
</div>
</div>

<!-- Library -->
<div class="panel">
<h2>My Library</h2>
<div class="lib-grid" id="libGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== State ===== */
let keyframes = [
  { pct: 0, transform: '', opacity: 1, color: '', background: '', borderRadius: '', boxShadow: '', filter: '' },
  { pct: 100, transform: '', opacity: 1, color: '', background: '', borderRadius: '', boxShadow: '', filter: '' }
];
let selectedKf = 0;
let playing = false;
let animId = null;

const PRESETS = {
  fadeIn: [{ pct:0, opacity:0 },{ pct:100, opacity:1 }],
  fadeOut: [{ pct:0, opacity:1 },{ pct:100, opacity:0 }],
  slideUp: [{ pct:0, transform:'translateY(40px)', opacity:0 },{ pct:100, transform:'translateY(0)', opacity:1 }],
  slideDown: [{ pct:0, transform:'translateY(-40px)', opacity:0 },{ pct:100, transform:'translateY(0)', opacity:1 }],
  slideInLeft: [{ pct:0, transform:'translateX(-60px)', opacity:0 },{ pct:100, transform:'translateX(0)', opacity:1 }],
  slideInRight: [{ pct:0, transform:'translateX(60px)', opacity:0 },{ pct:100, transform:'translateX(0)', opacity:1 }],
  bounce: [{ pct:0, transform:'translateY(0)' },{ pct:20, transform:'translateY(0)' },{ pct:40, transform:'translateY(-30px)' },{ pct:50, transform:'translateY(0)' },{ pct:60, transform:'translateY(-15px)' },{ pct:80, transform:'translateY(0)' },{ pct:100, transform:'translateY(0)' }],
  shake: [{ pct:0, transform:'translateX(0)' },{ pct:10, transform:'translateX(-10px)' },{ pct:20, transform:'translateX(10px)' },{ pct:30, transform:'translateX(-10px)' },{ pct:40, transform:'translateX(10px)' },{ pct:50, transform:'translateX(-5px)' },{ pct:60, transform:'translateX(5px)' },{ pct:70, transform:'translateX(-2px)' },{ pct:80, transform:'translateX(2px)' },{ pct:100, transform:'translateX(0)' }],
  pulse: [{ pct:0, transform:'scale(1)' },{ pct:50, transform:'scale(1.08)' },{ pct:100, transform:'scale(1)' }],
  spin: [{ pct:0, transform:'rotate(0deg)' },{ pct:100, transform:'rotate(360deg)' }],
  flip: [{ pct:0, transform:'perspective(400px) rotateY(0)' },{ pct:40, transform:'perspective(400px) rotateY(170deg)' },{ pct:50, transform:'perspective(400px) rotateY(190deg)' },{ pct:80, transform:'perspective(400px) rotateY(360deg) scale(0.95)' },{ pct:100, transform:'perspective(400px) rotateY(360deg) scale(1)' }],
  swing: [{ pct:0, transform:'rotate(0deg)' },{ pct:20, transform:'rotate(15deg)' },{ pct:40, transform:'rotate(-10deg)' },{ pct:60, transform:'rotate(5deg)' },{ pct:80, transform:'rotate(-5deg)' },{ pct:100, transform:'rotate(0deg)' }],
  rubberBand: [{ pct:0, transform:'scaleX(1) scaleY(1)' },{ pct:30, transform:'scaleX(1.25) scaleY(0.75)' },{ pct:40, transform:'scaleX(0.75) scaleY(1.25)' },{ pct:50, transform:'scaleX(1.15) scaleY(0.85)' },{ pct:65, transform:'scaleX(0.95) scaleY(1.05)' },{ pct:75, transform:'scaleX(1.05) scaleY(0.95)' },{ pct:100, transform:'scaleX(1) scaleY(1)' }],
  tada: [{ pct:0, transform:'scale(1) rotate(0deg)' },{ pct:10, transform:'scale(0.9) rotate(-3deg)' },{ pct:20, transform:'scale(0.9) rotate(-3deg)' },{ pct:30, transform:'scale(1.1) rotate(3deg)' },{ pct:50, transform:'scale(1.1) rotate(-3deg)' },{ pct:70, transform:'scale(1.1) rotate(3deg)' },{ pct:90, transform:'scale(1.1) rotate(-3deg)' },{ pct:100, transform:'scale(1) rotate(0deg)' }],
  wobble: [{ pct:0, transform:'translateX(0) rotate(0)' },{ pct:15, transform:'translateX(-25%) rotate(-5deg)' },{ pct:30, transform:'translateX(20%) rotate(3deg)' },{ pct:45, transform:'translateX(-15%) rotate(-3deg)' },{ pct:60, transform:'translateX(10%) rotate(2deg)' },{ pct:75, transform:'translateX(-5%) rotate(-1deg)' },{ pct:100, transform:'translateX(0) rotate(0)' }],
  jello: [{ pct:0, transform:'skewX(0deg) skewY(0deg)' },{ pct:11, transform:'skewX(0deg) skewY(0deg)' },{ pct:22, transform:'skewX(-12.5deg) skewY(-12.5deg)' },{ pct:33, transform:'skewX(6.25deg) skewY(6.25deg)' },{ pct:44, transform:'skewX(-3.125deg) skewY(-3.125deg)' },{ pct:55, transform:'skewX(1.5625deg) skewY(1.5625deg)' },{ pct:66, transform:'skewX(-0.78deg) skewY(-0.78deg)' },{ pct:77, transform:'skewX(0.39deg) skewY(0.39deg)' },{ pct:100, transform:'skewX(0deg) skewY(0deg)' }],
  heartBeat: [{ pct:0, transform:'scale(1)' },{ pct:14, transform:'scale(1.3)' },{ pct:28, transform:'scale(1)' },{ pct:42, transform:'scale(1.3)' },{ pct:70, transform:'scale(1)' },{ pct:100, transform:'scale(1)' }],
  fadeInUp: [{ pct:0, opacity:0, transform:'translateY(20px)' },{ pct:100, opacity:1, transform:'translateY(0)' }],
  fadeInDown: [{ pct:0, opacity:0, transform:'translateY(-20px)' },{ pct:100, opacity:1, transform:'translateY(0)' }],
  zoomIn: [{ pct:0, opacity:0, transform:'scale(0.3)' },{ pct:50, opacity:1 },{ pct:100, transform:'scale(1)' }],
  zoomOut: [{ pct:0, opacity:1, transform:'scale(1)' },{ pct:50, opacity:0, transform:'scale(0.3)' },{ pct:100, opacity:0, transform:'scale(0.3)' }],
  rotateIn: [{ pct:0, opacity:0, transform:'rotate(-200deg)' },{ pct:100, opacity:1, transform:'rotate(0)' }]
};

const KF_FIELDS = ['transform','opacity','color','background','borderRadius','boxShadow','filter'];
const KF_LABELS = { transform:'Transform', opacity:'Opacity', color:'Color', background:'Background', borderRadius:'Border Radius', boxShadow:'Box Shadow', filter:'Filter (blur, brightness)' };
const KF_PLACEHOLDERS = { transform:'e.g. translateX(20px) rotate(45deg) scale(1.2)', opacity:'0 - 1', color:'e.g. #ff0000', background:'e.g. #3b82f6', borderRadius:'e.g. 50%', boxShadow:'e.g. 0 4px 12px rgba(0,0,0,.3)', filter:'e.g. blur(2px) brightness(1.2)' };

/* ===== Render ===== */
function renderTimeline() {
  const bar = document.getElementById('timelineBar');
  bar.querySelectorAll('.timeline-marker').forEach(m => m.remove());
  keyframes.forEach((kf, i) => {
    const m = document.createElement('div');
    m.className = 'timeline-marker' + (i === selectedKf ? ' selected' : '');
    m.style.left = kf.pct + '%';
    m.textContent = kf.pct;
    m.addEventListener('mousedown', e => { e.stopPropagation(); startDragMarker(i, e); });
    m.addEventListener('click', e => { e.stopPropagation(); selectKf(i); });
    bar.appendChild(m);
  });
  document.getElementById('kfInfo').textContent = `${keyframes.length} keyframes`;
}

function selectKf(i) {
  selectedKf = i;
  renderTimeline();
  renderKfProps();
}

function renderKfProps() {
  const kf = keyframes[selectedKf];
  if (!kf) return;
  document.getElementById('kfLabel').textContent = `@ ${kf.pct}%`;
  const container = document.getElementById('kfProps');
  container.innerHTML = KF_FIELDS.map(f => `
    <div class="kf-prop">
      <label>${KF_LABELS[f]}</label>
      <input type="${f === 'opacity' ? 'number' : 'text'}" value="${kf[f] ?? ''}"
        ${f === 'opacity' ? 'min="0" max="1" step="0.05"' : ''}
        placeholder="${KF_PLACEHOLDERS[f]}"
        oninput="updateKfProp('${f}', this.value)">
    </div>
  `).join('');
}

function updateKfProp(field, value) {
  if (!keyframes[selectedKf]) return;
  keyframes[selectedKf][field] = field === 'opacity' ? (value === '' ? '' : parseFloat(value)) : value;
  generateCSS();
}

/* ===== Timeline interaction ===== */
document.getElementById('timelineBar').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  if (keyframes.find(k => Math.abs(k.pct - pct) < 2)) return;
  const kf = { pct };
  KF_FIELDS.forEach(f => kf[f] = f === 'opacity' ? 1 : '');
  keyframes.push(kf);
  keyframes.sort((a,b) => a.pct - b.pct);
  selectedKf = keyframes.indexOf(kf);
  renderTimeline();
  renderKfProps();
  generateCSS();
});

function addKeyframe() {
  const existing = keyframes.map(k => k.pct);
  let pct = 50;
  while (existing.includes(pct) && pct < 100) pct += 5;
  if (existing.includes(pct)) { toast('No space for keyframe'); return; }
  const kf = { pct };
  KF_FIELDS.forEach(f => kf[f] = f === 'opacity' ? 1 : '');
  keyframes.push(kf);
  keyframes.sort((a,b) => a.pct - b.pct);
  selectedKf = keyframes.indexOf(kf);
  renderTimeline();
  renderKfProps();
  generateCSS();
}

function removeKeyframe() {
  if (keyframes.length <= 2) { toast('Need at least 2 keyframes'); return; }
  keyframes.splice(selectedKf, 1);
  selectedKf = Math.min(selectedKf, keyframes.length - 1);
  renderTimeline();
  renderKfProps();
  generateCSS();
}

let draggingIdx = -1;
function startDragMarker(i, e) {
  draggingIdx = i;
  const bar = document.getElementById('timelineBar');
  const rect = bar.getBoundingClientRect();
  const move = ev => {
    let pct = Math.round(((ev.clientX - rect.left) / rect.width) * 100);
    pct = Math.max(0, Math.min(100, pct));
    keyframes[draggingIdx].pct = pct;
    keyframes.sort((a,b) => a.pct - b.pct);
    draggingIdx = keyframes.findIndex(k => k.pct === pct);
    selectedKf = draggingIdx;
    renderTimeline();
    renderKfProps();
  };
  const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); draggingIdx = -1; generateCSS(); };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

/* ===== Element ===== */
function updateElement() {
  const el = document.getElementById('previewEl');
  const shape = document.getElementById('elShape').value;
  const size = parseInt(document.getElementById('elSize').value) || 80;
  const color = document.getElementById('elColor').value;
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.background = color;
  el.style.borderRadius = shape === 'circle' ? '50%' : '8px';
  el.style.display = 'flex';
  el.style.alignItems = 'center';
  el.style.justifyContent = 'center';
  el.style.fontSize = shape === 'text' ? (size * 0.4) + 'px' : (size * 0.5) + 'px';
  el.style.fontWeight = '700';
  el.style.color = '#fff';
  if (shape === 'text') { el.textContent = 'Abc'; el.style.background = color; }
  else if (shape === 'icon') {
    el.innerHTML = `<svg width="${size*0.5}" height="${size*0.5}" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  } else {
    el.textContent = '';
  }
}

/* ===== Easing ===== */
let cubicBezier = [0.42, 0, 0.58, 1];

function onEasingChange() {
  const v = document.getElementById('easingSelect').value;
  document.getElementById('cubicControls').style.display = v === 'custom' ? 'block' : 'none';
  if (v === 'custom') {
    document.getElementById('cx1').value = cubicBezier[0];
    document.getElementById('cy1').value = cubicBezier[1];
    document.getElementById('cx2').value = cubicBezier[2];
    document.getElementById('cy2').value = cubicBezier[3];
  }
  drawCurve();
  generateCSS();
}

function updateCurve() {
  cubicBezier = [
    parseFloat(document.getElementById('cx1').value),
    parseFloat(document.getElementById('cy1').value),
    parseFloat(document.getElementById('cx2').value),
    parseFloat(document.getElementById('cy2').value)
  ];
  drawCurve();
  generateCSS();
}

function drawCurve() {
  const canvas = document.getElementById('curveCanvas');
  const ctx = canvas.getContext('2d');
  const w = 200, h = 200, pad = 20;
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
  ctx.strokeRect(pad, pad, w - 2*pad, h - 2*pad);
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad, h - pad); ctx.lineTo(w - pad, pad); ctx.stroke();
  ctx.setLineDash([]);

  const easing = document.getElementById('easingSelect').value;
  let pts;
  if (easing === 'linear') pts = [0,0,1,1];
  else if (easing === 'ease') pts = [0.25,0.1,0.25,1];
  else if (easing === 'ease-in') pts = [0.42,0,1,1];
  else if (easing === 'ease-out') pts = [0,0,0.58,1];
  else if (easing === 'ease-in-out') pts = [0.42,0,0.58,1];
  else pts = cubicBezier;

  const sx = v => pad + v * (w - 2*pad);
  const sy = v => h - pad - v * (h - 2*pad);

  // Control point lines
  ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx(0), sy(0)); ctx.lineTo(sx(pts[0]), sy(pts[1])); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx(1), sy(1)); ctx.lineTo(sx(pts[2]), sy(pts[3])); ctx.stroke();

  // Curve
  ctx.strokeStyle = '#ec4899'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(sx(0), sy(0));
  ctx.bezierCurveTo(sx(pts[0]), sy(pts[1]), sx(pts[2]), sy(pts[3]), sx(1), sy(1));
  ctx.stroke();

  // Control points
  [{ x: pts[0], y: pts[1] }, { x: pts[2], y: pts[3] }].forEach(p => {
    ctx.fillStyle = '#ec4899';
    ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), 2, 0, Math.PI*2); ctx.fill();
  });
}

// Drag control points on canvas
const curveCanvas = document.getElementById('curveCanvas');
let dragPt = -1;
curveCanvas.addEventListener('mousedown', e => {
  const rect = curveCanvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width, my = 1 - (e.clientY - rect.top) / rect.height;
  const pts = getEasingPts();
  if (Math.hypot(mx - pts[0], my - pts[1]) < 0.08) { dragPt = 0; document.getElementById('easingSelect').value = 'custom'; document.getElementById('cubicControls').style.display = 'block'; }
  else if (Math.hypot(mx - pts[2], my - pts[3]) < 0.08) { dragPt = 1; document.getElementById('easingSelect').value = 'custom'; document.getElementById('cubicControls').style.display = 'block'; }
});
document.addEventListener('mousemove', e => {
  if (dragPt < 0) return;
  const rect = curveCanvas.getBoundingClientRect();
  let x = Math.max(0, Math.min(1, (e.clientX - rect.left - 20) / (rect.width - 40)));
  let y = Math.max(-0.5, Math.min(1.5, 1 - (e.clientY - rect.top - 20) / (rect.height - 40)));
  cubicBezier[dragPt*2] = Math.round(x*100)/100;
  cubicBezier[dragPt*2+1] = Math.round(y*100)/100;
  document.getElementById('cx1').value = cubicBezier[0];
  document.getElementById('cy1').value = cubicBezier[1];
  document.getElementById('cx2').value = cubicBezier[2];
  document.getElementById('cy2').value = cubicBezier[3];
  drawCurve();
});
document.addEventListener('mouseup', () => { if (dragPt >= 0) { dragPt = -1; generateCSS(); } });

function getEasingPts() {
  const v = document.getElementById('easingSelect').value;
  if (v === 'linear') return [0,0,1,1];
  if (v === 'ease') return [0.25,0.1,0.25,1];
  if (v === 'ease-in') return [0.42,0,1,1];
  if (v === 'ease-out') return [0,0,0.58,1];
  if (v === 'ease-in-out') return [0.42,0,0.58,1];
  return cubicBezier;
}

function getEasingCSS() {
  const v = document.getElementById('easingSelect').value;
  if (v === 'custom') return `cubic-bezier(${cubicBezier.join(', ')})`;
  return v;
}

/* ===== Presets ===== */
function renderPresets() {
  document.getElementById('presetGrid').innerHTML = Object.keys(PRESETS).map(name =>
    `<div class="preset-item" onclick="applyPreset('${name}')">${name}</div>`
  ).join('');
}

function applyPreset(name) {
  const preset = PRESETS[name];
  keyframes = preset.map(kf => {
    const full = { pct: kf.pct };
    KF_FIELDS.forEach(f => full[f] = kf[f] ?? (f === 'opacity' && kf.opacity !== undefined ? kf.opacity : (f === 'opacity' ? 1 : '')));
    return full;
  });
  selectedKf = 0;
  renderTimeline();
  renderKfProps();
  generateCSS();
  toast(`Loaded: ${name}`);
}

/* ===== CSS Generation ===== */
function generateCSS() {
  const name = 'custom-animation';
  const dur = document.getElementById('duration').value || '1000';
  const del = document.getElementById('delay').value || '0';
  const easing = getEasingCSS();
  const loop = document.getElementById('loopCheck').checked;

  let css = `@keyframes ${name} {\n`;
  for (const kf of keyframes) {
    const props = [];
    if (kf.transform) props.push(`  transform: ${kf.transform};`);
    if (kf.opacity !== '' && kf.opacity !== undefined) props.push(`  opacity: ${kf.opacity};`);
    if (kf.color) props.push(`  color: ${kf.color};`);
    if (kf.background) props.push(`  background: ${kf.background};`);
    if (kf.borderRadius) props.push(`  border-radius: ${kf.borderRadius};`);
    if (kf.boxShadow) props.push(`  box-shadow: ${kf.boxShadow};`);
    if (kf.filter) props.push(`  filter: ${kf.filter};`);
    if (props.length === 0) props.push(`  /* no properties */`);
    css += `  ${kf.pct}% {\n${props.join('\n')}\n  }\n`;
  }
  css += `}\n\n.animated {\n  animation: ${name} ${dur}ms ${easing} ${del}ms ${loop ? 'infinite' : '1'} both;\n}\n`;
  document.getElementById('exportOutput').value = css;
  return css;
}

function copyCSS() {
  navigator.clipboard.writeText(document.getElementById('exportOutput').value);
  toast('Copied to clipboard');
}

/* ===== Playback ===== */
function togglePlay() {
  playing ? stopAnim() : startAnim();
}

function startAnim() {
  stopAnim();
  playing = true;
  document.getElementById('playBtn').innerHTML = '&#10074;&#10074;';

  const el = document.getElementById('previewEl');
  const dur = parseInt(document.getElementById('duration').value) || 1000;
  const del = parseInt(document.getElementById('delay').value) || 0;
  const speed = parseFloat(document.getElementById('speedSelect').value) || 1;
  const easing = getEasingCSS();
  const loop = document.getElementById('loopCheck').checked;

  // Build @keyframes dynamically
  const name = 'live-anim-' + Date.now();
  let cssText = `@keyframes ${name} {\n`;
  for (const kf of keyframes) {
    const props = [];
    if (kf.transform) props.push(`transform:${kf.transform}`);
    if (kf.opacity !== '' && kf.opacity !== undefined) props.push(`opacity:${kf.opacity}`);
    if (kf.color) props.push(`color:${kf.color}`);
    if (kf.background) props.push(`background:${kf.background}`);
    if (kf.borderRadius) props.push(`border-radius:${kf.borderRadius}`);
    if (kf.boxShadow) props.push(`box-shadow:${kf.boxShadow}`);
    if (kf.filter) props.push(`filter:${kf.filter}`);
    cssText += `${kf.pct}%{${props.join(';')}}\n`;
  }
  cssText += '}';

  const style = document.createElement('style');
  style.id = 'live-style';
  style.textContent = cssText;
  document.head.appendChild(style);

  const realDur = dur / speed;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = `${name} ${realDur}ms ${easing} ${del}ms ${loop ? 'infinite' : '1'} both`;

  // Playhead animation
  const start = performance.now() + del;
  const total = realDur;
  function tick(now) {
    if (!playing) return;
    let elapsed = now - start;
    if (elapsed < 0) elapsed = 0;
    let progress;
    if (loop) {
      progress = (elapsed % total) / total;
    } else {
      progress = Math.min(elapsed / total, 1);
    }
    document.getElementById('playhead').style.left = (progress * 100) + '%';
    document.getElementById('timelineProgress').style.width = (progress * 100) + '%';
    if (!loop && progress >= 1) { stopAnim(); return; }
    animId = requestAnimationFrame(tick);
  }
  animId = requestAnimationFrame(tick);
}

function stopAnim() {
  playing = false;
  document.getElementById('playBtn').innerHTML = '&#9654;';
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  const el = document.getElementById('previewEl');
  el.style.animation = 'none';
  const s = document.getElementById('live-style');
  if (s) s.remove();
  document.getElementById('playhead').style.left = '0';
  document.getElementById('timelineProgress').style.width = '0';
}

/* ===== Library (localStorage) ===== */
function getLibrary() {
  try { return JSON.parse(localStorage.getItem('fds-animations') || '[]'); } catch { return []; }
}

function saveToLibrary() {
  const name = prompt('Animation name:');
  if (!name) return;
  const lib = getLibrary();
  lib.push({ name, keyframes: JSON.parse(JSON.stringify(keyframes)), easing: getEasingCSS(), duration: document.getElementById('duration').value, delay: document.getElementById('delay').value, loop: document.getElementById('loopCheck').checked });
  localStorage.setItem('fds-animations', JSON.stringify(lib));
  renderLibrary();
  toast('Saved to library');
}

function loadFromLibrary(i) {
  const lib = getLibrary();
  const item = lib[i];
  if (!item) return;
  keyframes = item.keyframes;
  selectedKf = 0;
  document.getElementById('duration').value = item.duration || 1000;
  document.getElementById('delay').value = item.delay || 0;
  document.getElementById('loopCheck').checked = item.loop !== false;
  renderTimeline();
  renderKfProps();
  generateCSS();
  toast('Loaded: ' + item.name);
}

function deleteFromLibrary(i) {
  const lib = getLibrary();
  lib.splice(i, 1);
  localStorage.setItem('fds-animations', JSON.stringify(lib));
  renderLibrary();
  toast('Deleted');
}

function renderLibrary() {
  const lib = getLibrary();
  document.getElementById('libGrid').innerHTML = lib.length === 0
    ? '<p style="color:#9ca3af;font-size:13px;">No saved animations yet. Create one above and click "Save to Library".</p>'
    : lib.map((item, i) => `
      <div class="lib-item">
        <div class="lib-name">${item.name}</div>
        <div style="font-size:11px;color:#6b7280;">${item.keyframes.length} keyframes, ${item.duration}ms</div>
        <div class="lib-actions">
          <button class="btn btn-primary btn-sm" onclick="loadFromLibrary(${i})">Load</button>
          <button class="btn btn-secondary btn-sm" onclick="deleteFromLibrary(${i})">Delete</button>
        </div>
      </div>
    `).join('');
}

/* ===== Toast ===== */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ===== Init ===== */
updateElement();
renderTimeline();
renderKfProps();
renderPresets();
renderLibrary();
drawCurve();
generateCSS();
</script>
