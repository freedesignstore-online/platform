<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator - FreeDesignStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Manrope', system-ui, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; padding: 24px; }
a.back { display: inline-block; margin-bottom: 24px; color: #ec4899; text-decoration: none; font-weight: 500; }
a.back:hover { text-decoration: underline; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
p.subtitle { color: #6b7280; margin-bottom: 24px; }
.panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; margin-bottom: 24px; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 24px; }
.controls select, .controls button, .controls label { font-family: inherit; font-size: 14px; }
.controls select { padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: inherit; transition: opacity .2s; }
.btn:hover { opacity: .85; }
.btn-primary { background: #ec4899; color: #fff; }
.btn-secondary { background: #f3f4f6; color: #1a1a1a; border: 1px solid #e5e7eb; }
.palette-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.swatch { flex: 1; min-width: 120px; min-height: 180px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 12px; cursor: pointer; position: relative; transition: transform .2s; }
.swatch:hover { transform: scale(1.03); }
.swatch .lock-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,.8); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.swatch .lock-btn.locked { background: rgba(0,0,0,.6); color: #fff; }
.swatch .info { background: rgba(255,255,255,.9); border-radius: 8px; padding: 8px; text-align: center; font-size: 12px; width: 100%; }
.swatch .info .hex { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.contrast-section { margin-top: 16px; }
.contrast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 12px; }
.contrast-item { padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb; font-size: 13px; }
.contrast-item .ratio { font-weight: 700; }
.contrast-item .pass { color: #16a34a; }
.contrast-item .fail { color: #dc2626; }
.export-section { margin-top: 16px; }
.export-section textarea { width: 100%; height: 120px; font-family: monospace; font-size: 13px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; resize: vertical; }
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.image-upload { margin-bottom: 16px; }
.image-upload input { display: none; }
.image-upload label { cursor: pointer; }
.hf-btn{position:fixed;bottom:40px;right:40px;z-index:1000;background:#ec4899;color:#fff;border:none;padding:8px 18px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(236,72,153,.3);transition:transform .15s}.hf-btn:hover{transform:scale(1.05)}
.hf-panel{position:fixed;bottom:0;left:0;right:0;z-index:1001;background:#fff;border-top:1px solid #e5e7eb;box-shadow:0 -4px 20px rgba(0,0,0,.1);max-height:0;overflow:hidden;transition:max-height .3s ease}.hf-panel.open{max-height:340px}
.hf-panel-inner{padding:16px 20px;overflow-y:auto;max-height:320px}
.hf-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hf-tabs{display:flex;gap:8px}
.hf-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e5e7eb;background:#fafafa;font-family:inherit}.hf-tab.active{background:#ec4899;color:#fff;border-color:#ec4899}
.hf-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6b7280;padding:4px 8px}
.hf-items{display:flex;gap:8px;flex-wrap:wrap}
.hf-item{background:#fafafa;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;transition:border-color .15s;position:relative;min-width:140px}.hf-item:hover{border-color:#ec4899}
.hf-item .hf-heart{position:absolute;top:4px;right:6px;background:none;border:none;cursor:pointer;font-size:14px;opacity:.5}.hf-item .hf-heart:hover{opacity:1}
.hf-swatches{display:flex;gap:2px;margin-bottom:4px}
.hf-swatches span{width:18px;height:18px;border-radius:3px;display:inline-block}
.hf-item-meta{color:#6b7280;font-size:11px}
.hf-empty{color:#6b7280;font-size:13px;padding:16px;text-align:center}
</style>
</head>
<body>
<a class="back" href="/">Back to Store</a>
<h1>Color Palette Generator</h1>
<p class="subtitle">Generate harmonious color palettes, check contrast, and export for your projects.</p>

<div class="panel">
  <div class="controls">
    <select id="mode">
      <option value="complementary">Complementary</option>
      <option value="analogous">Analogous</option>
      <option value="triadic">Triadic</option>
      <option value="split-complementary">Split-Complementary</option>
      <option value="monochromatic">Monochromatic</option>
    </select>
    <button class="btn btn-primary" onclick="generate()">Generate</button>
    <span style="color:#6b7280; font-size:13px;">Press Space to regenerate</span>
    <div class="image-upload">
      <label class="btn btn-secondary" for="imgUpload">Extract from Image</label>
      <input type="file" id="imgUpload" accept="image/*" onchange="extractFromImage(event)">
    </div>
  </div>

  <div class="palette-row" id="paletteRow"></div>

  <div class="contrast-section">
    <h3>Accessibility Contrast</h3>
    <div class="contrast-grid" id="contrastGrid"></div>
  </div>

  <div class="export-section" style="margin-top:24px;">
    <div class="controls">
      <button class="btn btn-secondary" onclick="exportCSS()">Export CSS Variables</button>
      <button class="btn btn-secondary" onclick="exportTailwind()">Export Tailwind Config</button>
      <button class="btn btn-secondary" onclick="exportImage()">Export as Image</button>
    </div>
    <textarea id="exportOutput" readonly placeholder="Export output will appear here..."></textarea>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
let palette = [];
let locked = [false, false, false, false, false];

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * color).toString(16).padStart(2, '0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function hexToHsl(hex) {
  let { r, g, b } = hexToRgb(hex);
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) * 60; break;
      case g: h = ((b - r) / d + 2) * 60; break;
      case b: h = ((r - g) / d + 4) * 60; break;
    }
  }
  return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function relativeLuminance(hex) {
  let { r, g, b } = hexToRgb(hex);
  [r, g, b] = [r, g, b].map(c => { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

function contrastRatio(hex1, hex2) {
  const l1 = relativeLuminance(hex1), l2 = relativeLuminance(hex2);
  const lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
  return (lighter + 0.05) / (darker + 0.05);
}

function generatePalette(mode) {
  const baseH = Math.random() * 360;
  const baseS = 50 + Math.random() * 30;
  const baseL = 40 + Math.random() * 20;
  let hues = [];
  switch (mode) {
    case 'complementary': hues = [0, 180, 30, 210, 60]; break;
    case 'analogous': hues = [0, 30, 60, -30, -60]; break;
    case 'triadic': hues = [0, 120, 240, 60, 180]; break;
    case 'split-complementary': hues = [0, 150, 210, 30, 330]; break;
    case 'monochromatic': hues = [0, 0, 0, 0, 0]; break;
  }
  const colors = [];
  for (let i = 0; i < 5; i++) {
    if (locked[i]) { colors.push(palette[i]); continue; }
    const h = (baseH + hues[i]) % 360;
    let s = baseS + (Math.random() - 0.5) * 20;
    let l = mode === 'monochromatic' ? 20 + i * 15 : baseL + (Math.random() - 0.5) * 20;
    s = Math.max(20, Math.min(90, s));
    l = Math.max(20, Math.min(80, l));
    colors.push(hslToHex(h, s, l));
  }
  return colors;
}

function generate() {
  const mode = document.getElementById('mode').value;
  palette = generatePalette(mode);
  render();
}

function render() {
  const row = document.getElementById('paletteRow');
  row.innerHTML = '';
  palette.forEach((color, i) => {
    const { r, g, b } = hexToRgb(color);
    const { h, s, l } = hexToHsl(color);
    const textColor = relativeLuminance(color) > 0.5 ? '#1a1a1a' : '#ffffff';
    row.innerHTML += `
      <div class="swatch" style="background:${color}; color:${textColor}" onclick="copyColor('${color}')">
        <button class="lock-btn ${locked[i] ? 'locked' : ''}" onclick="event.stopPropagation(); toggleLock(${i})">${locked[i] ? '&#128274;' : '&#128275;'}</button>
        <div class="info">
          <div class="hex">${color.toUpperCase()}</div>
          <div>rgb(${r}, ${g}, ${b})</div>
          <div>hsl(${h}, ${s}%, ${l}%)</div>
        </div>
      </div>`;
  });
  renderContrast();
}

function toggleLock(i) { locked[i] = !locked[i]; render(); }

function copyColor(color) {
  navigator.clipboard.writeText(color);
  showToast(`Copied ${color}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderContrast() {
  const grid = document.getElementById('contrastGrid');
  grid.innerHTML = '';
  const white = '#ffffff', black = '#000000';
  palette.forEach(color => {
    const wRatio = contrastRatio(color, white).toFixed(2);
    const bRatio = contrastRatio(color, black).toFixed(2);
    const wAA = wRatio >= 4.5, wAAA = wRatio >= 7;
    const bAA = bRatio >= 4.5, bAAA = bRatio >= 7;
    grid.innerHTML += `
      <div class="contrast-item">
        <div style="width:24px;height:24px;background:${color};border-radius:4px;display:inline-block;vertical-align:middle;margin-right:8px;border:1px solid #e5e7eb;"></div>
        <strong>${color.toUpperCase()}</strong><br>
        <span>vs White: <span class="ratio">${wRatio}:1</span> <span class="${wAA ? 'pass' : 'fail'}">${wAA ? 'AA' : ''}</span> <span class="${wAAA ? 'pass' : 'fail'}">${wAAA ? 'AAA' : ''}</span></span><br>
        <span>vs Black: <span class="ratio">${bRatio}:1</span> <span class="${bAA ? 'pass' : 'fail'}">${bAA ? 'AA' : ''}</span> <span class="${bAAA ? 'pass' : 'fail'}">${bAAA ? 'AAA' : ''}</span></span>
      </div>`;
  });
}

function exportCSS() {
  const lines = palette.map((c, i) => `  --color-${i + 1}: ${c};`).join('\n');
  document.getElementById('exportOutput').value = `:root {\n${lines}\n}`;
}

function exportTailwind() {
  const lines = palette.map((c, i) => `      '${i + 1}': '${c}',`).join('\n');
  document.getElementById('exportOutput').value = `module.exports = {\n  theme: {\n    extend: {\n      colors: {\n        palette: {\n${lines}\n        }\n      }\n    }\n  }\n}`;
}

function exportImage() {
  const canvas = document.getElementById('hiddenCanvas');
  canvas.width = 1000; canvas.height = 400;
  const ctx = canvas.getContext('2d');
  const w = 200;
  palette.forEach((color, i) => { ctx.fillStyle = color; ctx.fillRect(i * w, 0, w, 400); ctx.fillStyle = relativeLuminance(color) > 0.5 ? '#1a1a1a' : '#fff'; ctx.font = '600 18px Manrope, sans-serif'; ctx.fillText(color.toUpperCase(), i * w + 60, 360); });
  const link = document.createElement('a');
  link.download = 'palette.png'; link.href = canvas.toDataURL();
  link.click();
  showToast('Downloaded palette.png');
}

function extractFromImage(event) {
  const file = event.target.files[0]; if (!file) return;
  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById('hiddenCanvas');
    const size = 100;
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);
    const data = ctx.getImageData(0, 0, size, size).data;
    const colors = [];
    for (let i = 0; i < data.length; i += 4 * 200) {
      const r = data[i], g = data[i+1], b = data[i+2];
      colors.push(`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`);
    }
    const unique = [...new Set(colors)];
    palette = unique.slice(0, 5);
    while (palette.length < 5) palette.push(hslToHex(Math.random()*360, 60, 50));
    locked = [false, false, false, false, false];
    render();
    showToast('Palette extracted from image');
  };
  img.src = URL.createObjectURL(file);
}

document.addEventListener('keydown', e => { if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); generate(); } });
generate();
</script>
<button class="hf-btn" id="hfToggle">History & Favorites</button>
<div class="hf-panel" id="hfPanel">
<div class="hf-panel-inner">
<div class="hf-header">
<div class="hf-tabs">
<button class="hf-tab active" data-tab="history" id="hfTabHistory">History (0)</button>
<button class="hf-tab" data-tab="favorites" id="hfTabFavs">Favorites (0)</button>
</div>
<button class="hf-close" id="hfClose">&times;</button>
</div>
<div class="hf-items" id="hfItems"></div>
</div>
</div>

<script>
(function(){
const KEY_H='fds-palette-history', KEY_F='fds-palette-favorites';
function load(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let currentTab='history';

function getState(){
  return {colors:[...palette], mode:document.getElementById('mode').value, ts:Date.now()};
}

function addHistory(){
  if(!palette.length)return;
  const h=load(KEY_H);
  const s=getState();
  // Don't add duplicate of last entry
  if(h.length&&JSON.stringify(h[0].colors)===JSON.stringify(s.colors))return;
  h.unshift(s);
  if(h.length>10)h.length=10;
  save(KEY_H,h);
  updateCounts();
  if(currentTab==='history')renderItems();
}

function addFavorite(item){
  const f=load(KEY_F);
  const s=item||getState();
  f.unshift(s);
  if(f.length>20)f.length=20;
  save(KEY_F,f);
  updateCounts();
  if(currentTab==='favorites')renderItems();
}

function removeFavorite(idx){
  const f=load(KEY_F);
  f.splice(idx,1);
  save(KEY_F,f);
  updateCounts();
  renderItems();
}

function restoreState(s){
  palette=s.colors.slice();
  locked=[false,false,false,false,false];
  document.getElementById('mode').value=s.mode||'complementary';
  render();
}

function updateCounts(){
  const h=load(KEY_H), f=load(KEY_F);
  document.getElementById('hfTabHistory').textContent='History ('+h.length+')';
  document.getElementById('hfTabFavs').textContent='Favorites ('+f.length+')';
}

function fmtTime(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function renderItems(){
  const container=document.getElementById('hfItems');
  const items=currentTab==='history'?load(KEY_H):load(KEY_F);
  if(!items.length){container.innerHTML='<div class="hf-empty">No '+(currentTab==='history'?'history':'favorites')+' yet.</div>';return;}
  container.innerHTML=items.map((it,i)=>{
    const heartBtn=currentTab==='history'
      ?`<button class="hf-heart" data-fav="${i}" title="Save to favorites">&hearts;</button>`
      :`<button class="hf-heart" data-rmfav="${i}" title="Remove">&times;</button>`;
    const swatches=(it.colors||[]).map(c=>`<span style="background:${c}"></span>`).join('');
    return `<div class="hf-item" data-restore="${i}">
      ${heartBtn}
      <div class="hf-swatches">${swatches}</div>
      <div class="hf-item-meta">${it.mode||'?'} &middot; ${fmtTime(it.ts)}</div>
    </div>`;
  }).join('');
}

document.getElementById('hfToggle').onclick=()=>document.getElementById('hfPanel').classList.toggle('open');
document.getElementById('hfClose').onclick=()=>document.getElementById('hfPanel').classList.remove('open');

document.querySelectorAll('.hf-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.hf-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab=tab.dataset.tab;
    renderItems();
  };
});

document.getElementById('hfItems').addEventListener('click',e=>{
  const favBtn=e.target.closest('[data-fav]');
  if(favBtn){e.stopPropagation();const items=load(KEY_H);addFavorite(items[+favBtn.dataset.fav]);return;}
  const rmBtn=e.target.closest('[data-rmfav]');
  if(rmBtn){e.stopPropagation();removeFavorite(+rmBtn.dataset.rmfav);return;}
  const item=e.target.closest('[data-restore]');
  if(item){const items=currentTab==='history'?load(KEY_H):load(KEY_F);restoreState(items[+item.dataset.restore]);}
});

// Hook into render to auto-save history
const origRender=render;
window.render=function(){origRender();addHistory();};

// Hook into generate too
const origGenerate=generate;
window.generate=function(){origGenerate();};

updateCounts();
})();
</script>
<script src="/related.js"></script>
</body>
</html>
