  gray: { families: ['neutral'], hues: [0, 210, 220, 200, 230], weight: 1 },

  white: { families: ['light'], hues: [0, 210, 45, 200, 220], weight: 2 },

  // Textures & materials
  wood: { families: ['earth', 'warm'], hues: [25, 30, 20, 35, 15], weight: 2 },

  leather: { families: ['earth', 'dark'], hues: [25, 20, 30, 15, 35], weight: 2 },
  denim: { families: ['cool'], hues: [220, 215, 225, 210, 230], weight: 2 },
  cotton: { families: ['light', 'neutral'], hues: [0, 210, 200, 30, 45], weight: 1 },
  glass: { families: ['cool', 'light'], hues: [200, 195, 210, 190, 205], weight: 1 },
  metal: { families: ['neutral', 'dark'], hues: [210, 220, 200, 0, 230], weight: 1 },
  concrete: { families: ['neutral'], hues: [210, 200, 0, 220, 195], weight: 1 },
  brick: { families: ['warm', 'earth'], hues: [10, 15, 5, 20, 0], weight: 2 },
  ceramic: { families: ['neutral', 'light'], hues: [30, 200, 0, 45, 210], weight: 1 },
  neon_light: { families: ['vibrant'], hues: [300, 180, 330, 60, 120], weight: 2 },

  // Decades
  '80s': { families: ['vibrant'], hues: [300, 180, 330, 280, 50], weight: 3 },
  '90s': { families: ['vibrant'], hues: [180, 280, 330, 45, 150], weight: 2 },
  '70s': { families: ['warm', 'earth'], hues: [30, 45, 15, 80, 350], weight: 2 },
  '60s': { families: ['vibrant'], hues: [45, 0, 180, 300, 120], weight: 2 },
  '50s': { families: ['pastel'], hues: [180, 340, 45, 150, 350], weight: 2 }
};

// Color name helper
const colorNames = [
  { name: 'Rose', h: [340, 360] }, { name: 'Rose', h: [0, 10] },
  { name: 'Crimson', h: [345, 360] }, { name: 'Coral', h: [10, 25] },
  { name: 'Orange', h: [25, 40] }, { name: 'Amber', h: [40, 50] },
  { name: 'Gold', h: [50, 60] }, { name: 'Yellow', h: [55, 70] },
  { name: 'Lime', h: [70, 90] }, { name: 'Olive', h: [75, 95] },
  { name: 'Green', h: [90, 150] }, { name: 'Emerald', h: [140, 160] },
  { name: 'Teal', h: [160, 180] }, { name: 'Cyan', h: [180, 195] },
  { name: 'Sky', h: [195, 210] }, { name: 'Blue', h: [210, 240] },
  { name: 'Indigo', h: [240, 260] }, { name: 'Violet', h: [260, 280] },
  { name: 'Purple', h: [280, 300] }, { name: 'Magenta', h: [300, 320] },
  { name: 'Pink', h: [320, 345] }
];

function getColorName(h, s, l) {
  if (s < 15) { return l > 70 ? 'Light Gray' : l > 40 ? 'Gray' : 'Charcoal'; }
  if (l > 85) return 'White';
  if (l < 15) return 'Black';
  const prefix = l > 70 ? 'Light ' : l < 30 ? 'Dark ' : '';
  for (const c of colorNames) {
    if (h >= c.h[0] && h < c.h[1]) return prefix + c.name;
  }
  return prefix + 'Color';
}

let currentPalette = [];
let detectedKeywords = [];

function tokenize(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 1);
}

function matchKeywords(tokens) {
  const matched = [];
  const text = tokens.join(' ');

  // Check compound keywords (two-word matches)
  for (const key of Object.keys(keywordMap)) {
    const k = key.replace('_', ' ');
    if (text.includes(k) || tokens.includes(key)) {
      matched.push({ keyword: key, ...keywordMap[key] });
    }
  }

  // Also check single tokens against map
  for (const token of tokens) {
    if (keywordMap[token] && !matched.find(m => m.keyword === token)) {
      matched.push({ keyword: token, ...keywordMap[token] });
    }
  }

  return matched;
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1, 3), 16) / 255;
  let g = parseInt(hex.slice(3, 5), 16) / 255;
  let b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) * 60; break;
      case g: h = ((b - r) / d + 2) * 60; break;
      case b: h = ((r - g) / d + 4) * 60; break;
    }
  }
  return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
}

function generateFromKeywords(matches) {
  if (matches.length === 0) {
    // Random vibrant palette as fallback
    const baseH = Math.random() * 360;
    return Array.from({ length: 5 }, (_, i) => {
      const h = (baseH + i * 72 + (Math.random() - 0.5) * 20) % 360;
      return hslToHex(h, 50 + Math.random() * 30, 40 + Math.random() * 30);
    });
  }

  // Weighted combination of matched keyword hues
  const totalWeight = matches.reduce((sum, m) => sum + m.weight, 0);
  const hueSlots = [0, 0, 0, 0, 0];
  const satAccum = [];
  const litAccum = [];

  // Blend hues from matches weighted by their importance
  for (const match of matches) {
    const w = match.weight / totalWeight;
    for (let i = 0; i < 5; i++) {
      hueSlots[i] += match.hues[i] * w;
    }
    // Accumulate family params for sat/lit
    for (const fam of match.families) {
      const f = colorFamilies[fam];
      if (f) {
        satAccum.push(f.sat);
        litAccum.push(f.lit);
      }
    }
  }

  // Average sat/lit ranges
  const avgSat = satAccum.length > 0
    ? satAccum.reduce((a, b) => [a[0] + b[0], a[1] + b[1]], [0, 0]).map(v => v / satAccum.length)
    : [50, 70];
  const avgLit = litAccum.length > 0
    ? litAccum.reduce((a, b) => [a[0] + b[0], a[1] + b[1]], [0, 0]).map(v => v / litAccum.length)
    : [35, 60];

  // Generate 5 colors with variation
  const palette = [];
  for (let i = 0; i < 5; i++) {
    const h = (hueSlots[i] + (Math.random() - 0.5) * 25 + 360) % 360;
    const s = avgSat[0] + Math.random() * (avgSat[1] - avgSat[0]);
    // Spread lightness across the range for variety
    const litSpread = avgLit[0] + (i / 4) * (avgLit[1] - avgLit[0]) + (Math.random() - 0.5) * 10;
    const l = Math.max(15, Math.min(90, litSpread));
    palette.push(hslToHex(h, s, l));
  }

  return palette;
}

function generateFromText() {
  const input = document.getElementById('descInput').value.trim();
  if (!input) return;

  const tokens = tokenize(input);
  const matches = matchKeywords(tokens);
  detectedKeywords = matches.map(m => m.keyword);

  currentPalette = generateFromKeywords(matches);
  render();
}

function regenerate() {
  if (currentPalette.length === 0) { generateFromText(); return; }
  const input = document.getElementById('descInput').value.trim();
  if (!input) return;
  const tokens = tokenize(input);
  const matches = matchKeywords(tokens);
  currentPalette = generateFromKeywords(matches);
  render();
}

function render() {
  const row = document.getElementById('paletteRow');
  const kw = document.getElementById('keywordsDisplay');
  const actions = document.getElementById('actions');

  // Show detected keywords
  if (detectedKeywords.length > 0) {
    kw.innerHTML = detectedKeywords.map(k => `<span>${k}</span>`).join('');
  } else {
    kw.innerHTML = '<span style="background:#f3f4f6;color:#6b7280;border-color:#e5e7eb;">no keywords matched — random palette</span>';
  }

  // Render palette
  row.innerHTML = '';
  currentPalette.forEach((color, i) => {
    const { h, s, l } = hexToHsl(color);
    const name = getColorName(h, s, l);
    const lum = relativeLuminance(color);
    const textColor = lum > 0.4 ? '#1a1a1a' : '#ffffff';
    row.innerHTML += `
      <div class="swatch" style="background:${color}; color:${textColor}" onclick="copyColor('${color}')">
        <div class="info">
          <div class="hex">${color.toUpperCase()}</div>
          <div class="name">${name}</div>
        </div>
      </div>`;
  });

  actions.style.display = 'flex';
}

function relativeLuminance(hex) {
  let r = parseInt(hex.slice(1, 3), 16) / 255;
  let g = parseInt(hex.slice(3, 5), 16) / 255;
  let b = parseInt(hex.slice(5, 7), 16) / 255;
  [r, g, b] = [r, g, b].map(c => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4));
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

function copyColor(hex) {
  navigator.clipboard.writeText(hex);
  showToast(`Copied ${hex}`);
}

function exportCSS() {
  const vars = currentPalette.map((c, i) => `  --color-${i + 1}: ${c};`).join('\n');
  const out = `:root {\n${vars}\n}`;
  document.getElementById('exportOutput').value = out;
  document.getElementById('exportBox').style.display = 'block';
  navigator.clipboard.writeText(out);
  showToast('CSS variables copied to clipboard');
}

function exportTailwind() {
  const colors = currentPalette.map((c, i) => `        '${i + 1}': '${c}',`).join('\n');
  const out = `module.exports = {\n  theme: {\n    extend: {\n      colors: {\n        brand: {\n${colors}\n        }\n      }\n    }\n  }\n}`;
  document.getElementById('exportOutput').value = out;
  document.getElementById('exportBox').style.display = 'block';
  navigator.clipboard.writeText(out);
  showToast('Tailwind config copied to clipboard');
}

function exportAll() {
  const out = currentPalette.join('\n');
  document.getElementById('exportOutput').value = out;
  document.getElementById('exportBox').style.display = 'block';
  navigator.clipboard.writeText(out);
  showToast('Hex codes copied to clipboard');
}

function tryExample(btn) {
  document.getElementById('descInput').value = btn.textContent;
  generateFromText();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Enter key to generate
document.getElementById('descInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateFromText();
});
</script>
<button class="hf-btn" id="hfToggle">History & Favorites</button>
<div class="hf-panel" id="hfPanel">
<div class="hf-panel-inner">
<div class="hf-header">
<div class="hf-tabs">
<button class="hf-tab active" data-tab="history" id="hfTabHistory">History (0)</button>
<button class="hf-tab" data-tab="favorites" id="hfTabFavs">Favorites (0)</button>
</div>
<button class="hf-close" id="hfClose">&times;</button>
</div>
<div class="hf-items" id="hfItems"></div>
</div>
</div>

<script>
(function(){
const KEY_H='fds-aicolor-history', KEY_F='fds-aicolor-favorites';
function load(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let currentTab='history';

function getState(){
  return {
    description:document.getElementById('descInput').value,
    colors:[...currentPalette],
    keywords:[...detectedKeywords],
    ts:Date.now()
  };
}

function addHistory(){
  if(!currentPalette.length)return;
  const h=load(KEY_H);
  const s=getState();
  if(h.length&&h[0].description===s.description&&JSON.stringify(h[0].colors)===JSON.stringify(s.colors))return;
  h.unshift(s);
  if(h.length>10)h.length=10;
  save(KEY_H,h);
  updateCounts();
  if(currentTab==='history')renderItems();
}

function addFavorite(item){
  const f=load(KEY_F);
  const s=item||getState();
  f.unshift(s);
  if(f.length>20)f.length=20;
  save(KEY_F,f);
  updateCounts();
  if(currentTab==='favorites')renderItems();
}

function removeFavorite(idx){
  const f=load(KEY_F);
  f.splice(idx,1);
  save(KEY_F,f);
  updateCounts();
  renderItems();
}

function restoreState(s){
  document.getElementById('descInput').value=s.description||'';
  currentPalette=s.colors.slice();
  detectedKeywords=s.keywords?s.keywords.slice():[];
  render();
}

function updateCounts(){
  const h=load(KEY_H), f=load(KEY_F);
  document.getElementById('hfTabHistory').textContent='History ('+h.length+')';
  document.getElementById('hfTabFavs').textContent='Favorites ('+f.length+')';
}

function fmtTime(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function renderItems(){
  const container=document.getElementById('hfItems');
  const items=currentTab==='history'?load(KEY_H):load(KEY_F);
  if(!items.length){container.innerHTML='<div class="hf-empty">No '+(currentTab==='history'?'history':'favorites')+' yet.</div>';return;}
  container.innerHTML=items.map((it,i)=>{
    const heartBtn=currentTab==='history'
      ?`<button class="hf-heart" data-fav="${i}" title="Save to favorites">&hearts;</button>`
      :`<button class="hf-heart" data-rmfav="${i}" title="Remove">&times;</button>`;
    const swatches=(it.colors||[]).map(c=>`<span style="background:${c}"></span>`).join('');
    return `<div class="hf-item" data-restore="${i}">
      ${heartBtn}
      <div class="hf-item-title">${it.description||'(no text)'}</div>
      <div class="hf-swatches">${swatches}</div>
      <div class="hf-item-meta">${fmtTime(it.ts)}</div>
    </div>`;
  }).join('');
}

document.getElementById('hfToggle').onclick=()=>document.getElementById('hfPanel').classList.toggle('open');
document.getElementById('hfClose').onclick=()=>document.getElementById('hfPanel').classList.remove('open');

document.querySelectorAll('.hf-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.hf-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab=tab.dataset.tab;
    renderItems();
  };
});

document.getElementById('hfItems').addEventListener('click',e=>{
  const favBtn=e.target.closest('[data-fav]');
  if(favBtn){e.stopPropagation();const items=load(KEY_H);addFavorite(items[+favBtn.dataset.fav]);return;}
  const rmBtn=e.target.closest('[data-rmfav]');
  if(rmBtn){e.stopPropagation();removeFavorite(+rmBtn.dataset.rmfav);return;}
  const item=e.target.closest('[data-restore]');
  if(item){const items=currentTab==='history'?load(KEY_H):load(KEY_F);restoreState(items[+item.dataset.restore]);}
});

// Hook into generateFromText to auto-save history
const origGenerate=generateFromText;
window.generateFromText=function(){origGenerate();addHistory();};
const origRegenerate=regenerate;
window.regenerate=function(){origRegenerate();addHistory();};

updateCounts();
})();
</script>
