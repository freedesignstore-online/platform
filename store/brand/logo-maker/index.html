<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--text:#1a1a1a;--muted:#6b7280;--accent:#ec4899;--panel:#ffffff;--line:#e5e7eb;--radius:10px}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a.back{display:inline-block;padding:14px 16px;color:var(--accent);text-decoration:none;font-weight:500;font-size:.85rem}
a.back:hover{text-decoration:underline}

/* SPLIT LAYOUT */
.app{display:flex;height:100vh}
.sidebar{width:340px;min-width:340px;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;padding:0 16px 16px}
.sidebar-head{padding:16px 16px 0;flex-shrink:0}
.sidebar-head h1{font-size:1.25rem;font-weight:800;margin-bottom:2px}
.sidebar-head p{font-size:.75rem;color:var(--muted);margin-bottom:12px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:var(--bg);overflow:hidden}
.canvas-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:background .3s}
.canvas-bg.dark{background:#1a1a1a}
.canvas-bg.photo{background:linear-gradient(135deg,#667eea,#764ba2)}
.canvas-bg.card{background:#e5e7eb}
.logo-frame{position:relative;z-index:1}
.biz-card{width:520px;height:300px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;padding:40px}
.zoom-bar{position:absolute;bottom:14px;right:14px;display:flex;gap:4px;z-index:2}
.zoom-btn{width:32px;height:32px;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;font-size:.8rem;font-weight:600;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{border-color:var(--accent)}
.bg-toggle{position:absolute;top:14px;right:14px;display:flex;gap:4px;z-index:2}
.bg-btn{padding:5px 10px;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;font-size:.65rem;font-weight:600;font-family:inherit}
.bg-btn:hover,.bg-btn.active{border-color:var(--accent);color:var(--accent)}

/* VARIATIONS STRIP */
.variations-strip{border-top:1px solid var(--line);background:var(--panel);padding:12px 16px;flex-shrink:0}
.variations-strip h3{font-size:.75rem;font-weight:700;margin-bottom:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.var-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.var-card{min-width:140px;height:80px;background:#fff;border:1px solid var(--line);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;padding:8px;overflow:hidden}
.var-card:hover{border-color:var(--accent);transform:translateY(-1px)}

/* PANELS */
.panel{margin-bottom:12px}
.panel-title{font-size:.75rem;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.panel-title svg{width:14px;height:14px;color:var(--muted)}
label{font-size:.7rem;color:var(--muted);display:block;margin:6px 0 3px;font-weight:500}
input[type=text],select{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:var(--radius);font-size:.85rem;font-family:inherit;background:var(--bg);outline:none}
input[type=text]:focus,select:focus{border-color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent);margin:4px 0}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1}
.range-val{font-size:.7rem;color:var(--muted);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
input[type=color]{width:36px;height:28px;border:1px solid var(--line);border-radius:6px;padding:1px 2px;cursor:pointer;background:var(--panel)}

/* GRIDS */
.font-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--radius);padding:4px}
.font-item{padding:6px 8px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:background .1s}
.font-item:hover{background:var(--bg)}
.font-item.active{background:rgba(236,72,153,.08);color:var(--accent)}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-height:200px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--radius);padding:4px}
.icon-cell{width:100%;aspect-ratio:1;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;border:1px solid transparent}
.icon-cell:hover{background:var(--bg)}
.icon-cell.active{border-color:var(--accent);background:rgba(236,72,153,.08)}
.icon-cell svg{width:20px;height:20px}
.pill-row{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 10px;border:1px solid var(--line);border-radius:6px;font-size:.68rem;font-weight:600;cursor:pointer;background:var(--panel);font-family:inherit;transition:all .12s}
.pill:hover{border-color:var(--accent)}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin:4px 0}
.cswatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cswatch:hover{transform:scale(1.1)}
.cswatch.active{border-color:var(--text);transform:scale(1.12)}
.palette-row{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.palette{display:flex;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .12s;height:24px}
.palette:hover{transform:scale(1.05)}
.palette.active{border-color:var(--text)}
.palette span{width:20px;height:24px;display:block}

/* BUTTONS */
.export-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn{padding:7px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-outline{background:var(--panel);color:var(--text);border:1px solid var(--line)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:.7rem}
.btn-ai{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;display:flex;align-items:center;gap:4px}
.btn-ai:hover{filter:brightness(1.1)}

/* HISTORY/FAVORITES PANEL */
.hf-btn{position:fixed;bottom:16px;right:16px;z-index:100;background:var(--panel);border:1px solid var(--line);padding:7px 14px;border-radius:99px;font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.hf-btn:hover{border-color:var(--accent)}
.hf-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s}
.hf-overlay.open{opacity:1;pointer-events:auto}
.hf-drawer{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--panel);border-top:1px solid var(--line);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s ease;max-height:50vh;display:flex;flex-direction:column}
.hf-drawer.open{transform:translateY(0)}
.hf-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;border-bottom:1px solid var(--line);flex-shrink:0}
.hf-tabs{display:flex;gap:6px}
.hf-tab{padding:5px 12px;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--bg);font-family:inherit}.hf-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.hf-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);padding:2px 6px;line-height:1}
.hf-body{flex:1;overflow-y:auto;padding:12px 20px}
.hf-grid{display:flex;gap:8px;flex-wrap:wrap}
.hf-card{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;cursor:pointer;font-size:.7rem;transition:border-color .12s;position:relative;min-width:130px;flex:0 0 auto}
.hf-card:hover{border-color:var(--accent)}
.hf-card-top{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.hf-card-dot{width:12px;height:12px;border-radius:3px}
.hf-card-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.hf-card-meta{color:var(--muted);font-size:.62rem}
.hf-card-actions{position:absolute;top:6px;right:6px;display:flex;gap:2px}
.hf-card-actions button{background:none;border:none;cursor:pointer;font-size:.8rem;opacity:.4;padding:0 2px}.hf-card-actions button:hover{opacity:1}
.hf-empty{color:var(--muted);font-size:.75rem;padding:20px;text-align:center}

@media(max-width:900px){
  .app{flex-direction:column;height:auto}
  .sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--line);max-height:50vh}
  .canvas-wrap{min-height:350px}
}
</style>
</head>

<div class="app">
  <!-- LEFT: Controls -->
  <div class="sidebar">
    <div class="sidebar-head">
      <a class="back" href="/">Back to Store</a>
      <h1>Logo Maker</h1>
      <p>Professional logos in seconds. Free, no signup.</p>
    </div>
    <div class="sidebar-scroll" id="controls"></div>
  </div>
  <!-- RIGHT: Preview + Variations -->
  <div class="main">

      <div class="bg-toggle">

        <button class="bg-btn" data-bg="dark">Dark</button>

        <button class="bg-btn" data-bg="card">Card</button>
      </div>
      <div class="canvas-bg" id="canvasBg">

    </div>
    <div class="variations-strip">
      <h3>Variations</h3>
      <div class="var-row" id="varRow"></div>
    </div>
  </div>
</div>

<button class="hf-btn" id="hfBtn">History &amp; Favorites</button>
<div class="hf-overlay" id="hfOverlay"></div>
<div class="hf-drawer" id="hfDrawer">
  <div class="hf-head">

      <button class="hf-tab active" data-tab="history" id="hfTabH">History (0)</button>

    </div>
    <button class="hf-close" id="hfClose">&times;</button>
  </div>
  <div class="hf-body"><div class="hf-grid" id="hfGrid"></div></div>
</div>

function esc(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// BIND EVENTS
// ============================================================
function bindControls(){
  const $=id=>document.getElementById(id);
  $('inpName').oninput=e=>{S.name=e.target.value;render();};
  $('inpTag').oninput=e=>{S.tagline=e.target.value;render();};
  $('inpWeight').oninput=e=>{S.weight=+e.target.value;$('valWeight').textContent=S.weight;render();};
  $('inpSpacing').oninput=e=>{S.spacing=+e.target.value/1000;$('valSpacing').textContent=S.spacing.toFixed(3)+'em';render();};
  $('inpFontSize').oninput=e=>{S.fontSize=+e.target.value;$('valFontSize').textContent=S.fontSize+'px';render();};
  $('inpIconSize').oninput=e=>{S.iconSize=+e.target.value;$('valIconSize').textContent=S.iconSize+'px';render();};
  $('inpIconColor').oninput=e=>{S.iconColor=e.target.value;render();};
  $('inpPrimary').oninput=e=>{S.primary=e.target.value;render();};
  $('inpSecondary').oninput=e=>{S.secondary=e.target.value;render();};

  // Font list
  document.getElementById('fontList').onclick=e=>{
    const el=e.target.closest('[data-i]');
    if(!el)return;
    S.font=+el.dataset.i;
    document.querySelectorAll('.font-item').forEach((f,i)=>f.classList.toggle('active',i===S.font));
    render();
  };
  // Icon grid
  document.getElementById('iconGrid').onclick=e=>{
    const el=e.target.closest('[data-i]');
    if(!el)return;
    S.icon=+el.dataset.i;
    document.querySelectorAll('.icon-cell').forEach((f,i)=>f.classList.toggle('active',i===S.icon));
    render();
  };
  // Transform pills
  document.getElementById('transformRow').onclick=e=>{
    const el=e.target.closest('[data-t]');
    if(!el)return;
    S.transform=el.dataset.t;
    document.querySelectorAll('#transformRow .pill').forEach(p=>p.classList.toggle('active',p.dataset.t===S.transform));
    render();
  };
  // Icon position
  document.getElementById('iconPosRow').onclick=e=>{
    const el=e.target.closest('[data-p]');
    if(!el)return;
    S.iconPos=el.dataset.p;
    document.querySelectorAll('#iconPosRow .pill').forEach(p=>p.classList.toggle('active',p.dataset.p===S.iconPos));
    render();
  };
  // Palettes
  document.getElementById('paletteRow').onclick=e=>{
    const el=e.target.closest('[data-i]');
    if(!el)return;
    const p=PALETTES[+el.dataset.i];
    S.primary=p.colors[0];S.secondary=p.colors[1];S.iconColor=p.colors[0];
    buildControls();render();
  };
  // BG type
  document.getElementById('bgTypeRow').onclick=e=>{
    const el=e.target.closest('[data-b]');
    if(!el)return;
    S.bgType=el.dataset.b;
    buildControls();render();
  };
  // BG custom/gradient inputs
  if(document.getElementById('inpBgCustom'))document.getElementById('inpBgCustom').oninput=e=>{S.bgCustom=e.target.value;render();};
  if(document.getElementById('inpBgGrad1'))document.getElementById('inpBgGrad1').oninput=e=>{S.bgGrad1=e.target.value;render();};
  if(document.getElementById('inpBgGrad2'))document.getElementById('inpBgGrad2').oninput=e=>{S.bgGrad2=e.target.value;render();};
  // Layout
  document.getElementById('layoutRow').onclick=e=>{
    const el=e.target.closest('[data-l]');
    if(!el)return;
    S.layout=el.dataset.l;
    document.querySelectorAll('#layoutRow .pill').forEach(p=>p.classList.toggle('active',p.dataset.l===S.layout));
    render();
  };
  // Effects
  $('togShadow').onclick=()=>{S.shadow=!S.shadow;$('togShadow').classList.toggle('active');render();};
  $('togRounded').onclick=()=>{S.rounded=!S.rounded;$('togRounded').classList.toggle('active');render();};
  $('togDivider').onclick=()=>{S.divider=!S.divider;$('togDivider').classList.toggle('active');render();};
  $('togOutline').onclick=()=>{S.outline=!S.outline;$('togOutline').classList.toggle('active');render();};
  // AI
  $('btnAI').onclick=aiSuggest;
  // Export
  $('expSVG').onclick=()=>downloadSVG();
  $('expPNG1').onclick=()=>downloadPNG(1);
  $('expPNG2').onclick=()=>downloadPNG(2);
  $('expPNG4').onclick=()=>downloadPNG(4);
  $('expFav').onclick=downloadFavicon;
  $('expCopy').onclick=copySVG;
  $('expBrandPack').onclick=downloadBrandPack;
}

// ============================================================
// RENDER LOGO (HTML preview)
// ============================================================
function applyText(text){
  if(S.transform==='uppercase')return text.toUpperCase();
  if(S.transform==='lowercase')return text.toLowerCase();
  if(S.transform==='capitalize')return text.replace(/\b\w/g,c=>c.toUpperCase());
  return text;
}

function renderLogoHTML(overrides){
  const st={...S,...(overrides||{})};
  const font=FONTS[st.font];
  const name=applyText(st.name||'Acme');
  const tag=st.tagline;
  const ic=ICONS[st.icon];
  const showIcon=st.iconPos!=='none'&&st.layout!=='text-only'&&st.layout!=='minimal'&&st.layout!=='monogram'&&st.layout!=='badge';

  // Background
  let bgStyle='';
  if(st.bgType==='white')bgStyle='background:#fff;';
  else if(st.bgType==='black')bgStyle='background:#000;';
  else if(st.bgType==='custom')bgStyle=`background:${st.bgCustom};`;
  else if(st.bgType==='gradient')bgStyle=`background:linear-gradient(135deg,${st.bgGrad1},${st.bgGrad2});`;

  // Container
  let containerStyle=`padding:24px 32px;display:inline-flex;align-items:center;gap:12px;${bgStyle}`;
  if(st.shadow)containerStyle+=`filter:drop-shadow(0 4px 12px rgba(0,0,0,.15));`;
  if(st.rounded)containerStyle+=`background:${bgStyle?'':'#fff'};border-radius:99px;padding:16px 32px;${bgStyle}`;

  // Text styles
  const nameStyle=`font-family:'${font.family}',sans-serif;font-weight:${st.weight};font-size:${st.fontSize}px;letter-spacing:${st.spacing}em;color:${st.outline?'transparent':st.primary};line-height:1.1;${st.outline?`-webkit-text-stroke:2px ${st.primary};paint-order:stroke fill;`:''}`;
  const tagStyle=`font-family:'${font.family}',sans-serif;font-weight:400;font-size:${Math.max(12,st.fontSize*0.3)}px;color:${st.secondary};letter-spacing:.04em;margin-top:2px;`;
  const iconSvg=`<svg viewBox="0 0 24 24" width="${st.iconSize}" height="${st.iconSize}" fill="${st.iconColor}" style="flex-shrink:0"><path d="${ic.d}"/></svg>`;

  // Divider
  const dividerEl=st.divider&&tag?`<div style="width:40px;height:2px;background:${st.primary};opacity:.4;margin:4px 0"></div>`:'';

  // Monogram
  if(st.layout==='monogram'){
    const initials=(st.name||'A').split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,3);
    const mSize=st.fontSize*1.8;
    return `<div style="${containerStyle}flex-direction:column"><div style="width:${mSize}px;height:${mSize}px;border-radius:${st.rounded?'50%':'12px'};background:${st.primary};display:flex;align-items:center;justify-content:center"><span style="font-family:'${font.family}';font-weight:${st.weight};font-size:${st.fontSize*0.8}px;color:#fff;letter-spacing:${st.spacing}em">${initials}</span></div>${tag?`<div style="${tagStyle}">${tag}</div>`:''}</div>`;
  }

  // Badge/Seal
  if(st.layout==='badge'){
    const bSize=st.fontSize*3;
    return `<div style="${containerStyle}flex-direction:column"><div style="width:${bSize}px;height:${bSize}px;border-radius:50%;border:3px solid ${st.primary};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px"><span style="font-family:'${font.family}';font-weight:${st.weight};font-size:${st.fontSize*0.55}px;color:${st.primary};text-align:center;letter-spacing:${st.spacing}em;line-height:1.1">${name}</span>${tag?`<div style="font-size:${Math.max(9,st.fontSize*0.2)}px;color:${st.secondary};margin-top:4px;letter-spacing:.08em;text-transform:uppercase">${tag}</div>`:''}</div></div>`;
  }

  // Minimal
  if(st.layout==='minimal'){
    return `<div style="${containerStyle}"><span style="${nameStyle}">${name}</span></div>`;
  }

  // Text only
  if(st.layout==='text-only'){
    return `<div style="${containerStyle}flex-direction:column;align-items:center"><span style="${nameStyle}">${name}</span>${dividerEl}${tag?`<div style="${tagStyle}">${tag}</div>`:''}</div>`;
  }

  // Stacked
  if(st.layout==='stacked'){
    return `<div style="${containerStyle}flex-direction:column;align-items:center;text-align:center"><span style="${nameStyle}">${name}</span>${dividerEl}${tag?`<div style="${tagStyle}">${tag}</div>`:''}</div>`;
  }

  // Underline
  if(st.layout==='underline'){
    return `<div style="${containerStyle}flex-direction:column;align-items:flex-start">${showIcon?iconSvg:''}<span style="${nameStyle}">${name}</span><div style="width:${Math.min(80,st.fontSize*1.2)}px;height:3px;background:${st.primary};border-radius:2px;margin-top:4px"></div>${tag?`<div style="${tagStyle}">${tag}</div>`:''}</div>`;
  }

  // Vertical
  if(st.layout==='vertical'){
    return `<div style="${containerStyle}flex-direction:column;align-items:center;text-align:center">${showIcon?iconSvg:''}<span style="${nameStyle}">${name}</span>${dividerEl}${tag?`<div style="${tagStyle}">${tag}</div>`:''}</div>`;
  }

  // Horizontal (default)
  const textBlock=`<div style="display:flex;flex-direction:column"><span style="${nameStyle}">${name}</span>${dividerEl}${tag?`<div style="${tagStyle}">${tag}</div>`:''}</div>`;
  if(st.iconPos==='right'&&showIcon)return `<div style="${containerStyle}">${textBlock}${iconSvg}</div>`;
  if(st.iconPos==='top'&&showIcon)return `<div style="${containerStyle}flex-direction:column;align-items:center">${iconSvg}${textBlock}</div>`;
  if(st.iconPos==='stacked'&&showIcon)return `<div style="${containerStyle}flex-direction:column;align-items:center">${iconSvg}${textBlock}</div>`;
  if(st.iconPos==='background'&&showIcon){
    return `<div style="${containerStyle}position:relative">${textBlock}<div style="position:absolute;right:16px;top:50%;transform:translateY(-50%);opacity:.1">${`<svg viewBox="0 0 24 24" width="${st.iconSize*3}" height="${st.iconSize*3}" fill="${st.iconColor}"><path d="${ic.d}"/></svg>`}</div></div>`;
  }
  if(showIcon)return `<div style="${containerStyle}">${iconSvg}${textBlock}</div>`;
  return `<div style="${containerStyle}">${textBlock}</div>`;
}

function render(){
  // Main preview
  const frame=document.getElementById('logoFrame');
  const bgEl=document.getElementById('canvasBg');
  if(S.bgMode==='card'){
    frame.innerHTML=`<div class="biz-card">${renderLogoHTML()}</div>`;
  } else {
    frame.innerHTML=renderLogoHTML();
  }
  frame.style.transform=`scale(${S.zoom})`;

  // Variations
  renderVariations();

  // Auto-save history
  saveHistory();
}

// ============================================================
// VARIATIONS
// ============================================================
function renderVariations(){
  const row=document.getElementById('varRow');
  const sameCat=FONTS.filter(f=>f.cat===FONTS[S.font].cat);
  const altFont=FONTS.indexOf(sameCat[(sameCat.indexOf(FONTS[S.font])+1)%sameCat.length]);

  const variations=[
    {label:'Alt Font',overrides:{font:altFont!==S.font?altFont:(S.font+1)%FONTS.length}},
    {label:'Inverted',overrides:{primary:S.secondary,secondary:S.primary,iconColor:S.secondary}},
    {label:'Vertical',overrides:{layout:'vertical'}},
    {label:'No Icon',overrides:{iconPos:'none',layout:'text-only'}},
    {label:'Monogram',overrides:{layout:'monogram'}},
    {label:'Minimal',overrides:{layout:'minimal',outline:false,shadow:false,rounded:false}},
  ];

  row.innerHTML=variations.map((v,i)=>{
    const html=renderLogoHTML({...v.overrides,fontSize:Math.min(S.fontSize,28),iconSize:Math.min(S.iconSize,18)});
    return `<div class="var-card" data-vi="${i}" title="${v.label}">${html}</div>`;
  }).join('');

  row.onclick=e=>{
    const el=e.target.closest('[data-vi]');
    if(!el)return;
    const v=variations[+el.dataset.vi];
    Object.assign(S,v.overrides);
    buildControls();render();
  };
}

// ============================================================
// ZOOM & BACKGROUND TOGGLES
// ============================================================
document.querySelector('.zoom-bar').onclick=e=>{
  const el=e.target.closest('[data-z]');
  if(!el)return;
  const z=el.dataset.z;
  if(z==='+')S.zoom=Math.min(3,S.zoom+0.25);
  else if(z==='-')S.zoom=Math.max(0.25,S.zoom-0.25);
  else S.zoom=1;
  document.getElementById('zoomLabel').textContent=Math.round(S.zoom*100)+'%';
  document.getElementById('logoFrame').style.transform=`scale(${S.zoom})`;
};

document.querySelector('.bg-toggle').onclick=e=>{
  const el=e.target.closest('[data-bg]');
  if(!el)return;
  S.bgMode=el.dataset.bg;
  document.querySelectorAll('.bg-btn').forEach(b=>b.classList.toggle('active',b.dataset.bg===S.bgMode));
  const bg=document.getElementById('canvasBg');
  bg.className='canvas-bg';
  if(S.bgMode!=='light')bg.classList.add(S.bgMode);
  render();
};

// ============================================================
// SVG GENERATION (for export)
// ============================================================
function generateSVG(){
  const font=FONTS[S.font];
  const name=applyText(S.name||'Acme');
  const tag=S.tagline;
  const ic=ICONS[S.icon];
  const showIcon=S.iconPos!=='none'&&S.layout!=='text-only'&&S.layout!=='minimal'&&S.layout!=='monogram'&&S.layout!=='badge';

  // Estimate widths
  const charW=S.fontSize*0.58;
  const nameW=name.length*charW+Math.abs(S.spacing)*name.length*S.fontSize;
  const tagW=tag?tag.length*S.fontSize*0.18:0;
  const iconW=showIcon?S.iconSize+12:0;
  const pad=40;

  let w,h,content='';
  const isVert=S.layout==='vertical'||S.iconPos==='top'||S.iconPos==='stacked';

  // Background rect
  let bgRect='';
  if(S.bgType==='white')bgRect=`<rect width="100%" height="100%" fill="#fff"/>`;
  else if(S.bgType==='black')bgRect=`<rect width="100%" height="100%" fill="#000"/>`;
  else if(S.bgType==='custom')bgRect=`<rect width="100%" height="100%" fill="${S.bgCustom}"/>`;
  else if(S.bgType==='gradient'){
    bgRect=`<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${S.bgGrad1}"/><stop offset="100%" stop-color="${S.bgGrad2}"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#bg)"/>`;
  }

  // Monogram
  if(S.layout==='monogram'){
    const initials=(S.name||'A').split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,3);
    const mSize=S.fontSize*1.8;
    w=mSize+pad*2;h=mSize+pad*2+(tag?30:0);
    const cx=w/2,cy=pad+mSize/2;
    content+=`<${S.rounded?'circle':'rect'} ${S.rounded?`cx="${cx}" cy="${cy}" r="${mSize/2}"`:`x="${cx-mSize/2}" y="${pad}" width="${mSize}" height="${mSize}" rx="12"`} fill="${S.primary}"/>`;
    content+=`<text x="${cx}" y="${cy+S.fontSize*0.28}" font-family="'${font.family}',sans-serif" font-weight="${S.weight}" font-size="${S.fontSize*0.8}" fill="#fff" text-anchor="middle" letter-spacing="${S.spacing}em">${initials}</text>`;
    if(tag)content+=`<text x="${cx}" y="${cy+mSize/2+24}" font-family="'${font.family}',sans-serif" font-size="${Math.max(12,S.fontSize*0.3)}" fill="${S.secondary}" text-anchor="middle">${escXml(tag)}</text>`;
    return svgWrap(w,h,bgRect+content);
  }

  // Badge
  if(S.layout==='badge'){
    const bSize=S.fontSize*3;
    w=bSize+pad*2;h=bSize+pad*2;
    const cx=w/2,cy=h/2;
    content+=`<circle cx="${cx}" cy="${cy}" r="${bSize/2}" fill="none" stroke="${S.primary}" stroke-width="3"/>`;
    content+=`<text x="${cx}" y="${cy+S.fontSize*0.15}" font-family="'${font.family}',sans-serif" font-weight="${S.weight}" font-size="${S.fontSize*0.55}" fill="${S.primary}" text-anchor="middle" letter-spacing="${S.spacing}em">${escXml(name)}</text>`;
    if(tag)content+=`<text x="${cx}" y="${cy+S.fontSize*0.55}" font-family="'${font.family}',sans-serif" font-size="${Math.max(9,S.fontSize*0.2)}" fill="${S.secondary}" text-anchor="middle" letter-spacing=".08em" text-transform="uppercase">${escXml(tag)}</text>`;
    return svgWrap(w,h,bgRect+content);
  }

  // Horizontal/Vertical/TextOnly/Stacked/Minimal/Underline
  const textW=Math.max(nameW,tagW);
  if(isVert){
    w=Math.max(textW,S.iconSize)+pad*2;
    h=pad*2+S.fontSize+(showIcon?S.iconSize+12:0)+(tag?S.fontSize*0.45:0)+(S.divider&&tag?10:0);
  } else {
    w=textW+iconW+pad*2;
    h=pad*2+S.fontSize+(tag?S.fontSize*0.45:0)+(S.divider&&tag?10:0);
  }
  if(S.layout==='underline')h+=12;

  const cx=w/2;
  let cy=pad;

  // Rounded bg
  if(S.rounded){
    content+=`<rect x="4" y="4" width="${w-8}" height="${h-8}" rx="${h/2}" fill="${S.bgType==='transparent'?'#fff':''}" ${S.bgType==='transparent'?'':'opacity="0"'}/>`;
  }

  // Shadow filter
  if(S.shadow){
    content+=`<defs><filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity=".12"/></filter></defs>`;
  }
  const gOpen=S.shadow?`<g filter="url(#s)">`:'<g>';

  content+=gOpen;

  if(isVert&&showIcon){
    content+=`<g transform="translate(${cx-S.iconSize/2},${cy})"><svg viewBox="0 0 24 24" width="${S.iconSize}" height="${S.iconSize}" fill="${S.iconColor}"><path d="${ic.d}"/></svg></g>`;
    cy+=S.iconSize+12;
  }

  if(!isVert&&showIcon&&S.iconPos==='left'){
    content+=`<g transform="translate(${pad},${cy+S.fontSize/2-S.iconSize/2})"><svg viewBox="0 0 24 24" width="${S.iconSize}" height="${S.iconSize}" fill="${S.iconColor}"><path d="${ic.d}"/></svg></g>`;
  }

  // Name text
  const textX=isVert?cx:(!isVert&&showIcon&&S.iconPos==='left'?pad+S.iconSize+12:(!isVert&&showIcon&&S.iconPos==='right'?pad:cx));
  const anchor=isVert?'middle':(showIcon&&(S.iconPos==='left'||S.iconPos==='right')?'start':'middle');
  const nameAttrs=`x="${textX}" y="${cy+S.fontSize*0.82}" font-family="'${font.family}',sans-serif" font-weight="${S.weight}" font-size="${S.fontSize}" letter-spacing="${S.spacing}em" text-anchor="${anchor}"`;

  if(S.outline){
    content+=`<text ${nameAttrs} fill="none" stroke="${S.primary}" stroke-width="2">${escXml(name)}</text>`;
  } else {
    content+=`<text ${nameAttrs} fill="${S.primary}">${escXml(name)}</text>`;
  }
  cy+=S.fontSize;

  // Underline accent
  if(S.layout==='underline'){
    const ulW=Math.min(80,S.fontSize*1.2);
    const ulX=anchor==='middle'?textX-ulW/2:textX;
    content+=`<rect x="${ulX}" y="${cy+4}" width="${ulW}" height="3" rx="1.5" fill="${S.primary}"/>`;
    cy+=12;
  }

  // Divider
  if(S.divider&&tag){
    const dW=40;
    const dX=anchor==='middle'?textX-dW/2:textX;
    content+=`<rect x="${dX}" y="${cy+4}" width="${dW}" height="2" rx="1" fill="${S.primary}" opacity=".4"/>`;
    cy+=10;
  }

  // Tagline
  if(tag){
    content+=`<text x="${textX}" y="${cy+S.fontSize*0.38}" font-family="'${font.family}',sans-serif" font-size="${Math.max(12,S.fontSize*0.3)}" fill="${S.secondary}" text-anchor="${anchor}" letter-spacing=".04em">${escXml(tag)}</text>`;
  }

  // Right icon
  if(!isVert&&showIcon&&S.iconPos==='right'){
    content+=`<g transform="translate(${textX+textW+12},${pad+S.fontSize/2-S.iconSize/2})"><svg viewBox="0 0 24 24" width="${S.iconSize}" height="${S.iconSize}" fill="${S.iconColor}"><path d="${ic.d}"/></svg></g>`;
  }

  // Background icon
  if(showIcon&&S.iconPos==='background'){
    const bSize=S.iconSize*3;
    content+=`<g transform="translate(${w-pad-bSize/2},${h/2-bSize/2})" opacity=".08"><svg viewBox="0 0 24 24" width="${bSize}" height="${bSize}" fill="${S.iconColor}"><path d="${ic.d}"/></svg></g>`;
  }

  content+='</g>';
  return svgWrap(w,h,bgRect+content);
}

function svgWrap(w,h,content){
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${Math.ceil(w)} ${Math.ceil(h)}" width="${Math.ceil(w)}" height="${Math.ceil(h)}">${content}</svg>`;
}

function escXml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ============================================================
// EXPORT
// ============================================================
function downloadSVG(){
  const svg=generateSVG();
  const blob=new Blob([svg],{type:'image/svg+xml'});
  dl(URL.createObjectURL(blob),(S.name||'logo')+'.svg');
}

function downloadPNG(scale){
  const svg=generateSVG();
  const m=svg.match(/width="(\d+)" height="(\d+)"/);
  const w=(+m[1])*scale,h=(+m[2])*scale;
  const canvas=document.createElement('canvas');
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0,w,h);
    dl(canvas.toDataURL('image/png'),`${S.name||'logo'}-${scale}x.png`);
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
}

function downloadFavicon(){
  const svg=generateSVG();
  const canvas=document.createElement('canvas');
  canvas.width=32;canvas.height=32;
  const ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0,32,32);
    dl(canvas.toDataURL('image/png'),`${S.name||'logo'}-favicon.png`);
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
}

function copySVG(){
  navigator.clipboard.writeText(generateSVG()).then(()=>{
    const btn=document.getElementById('expCopy');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy SVG',1500);
  });
}

function dl(url,name){
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
}

// ============================================================
// AI SUGGEST (Chrome AI or fallback)
// ============================================================
async function aiSuggest(){
  const res=document.getElementById('aiResult');
  const name=S.name||'Acme';
  res.textContent='Thinking...';

  // Try Chrome built-in AI
  if(self.ai&&self.ai.languageModel){
    try{
      const session=await self.ai.languageModel.create({systemPrompt:'You are a brand designer. Respond ONLY with valid JSON.'});
      const prompt=`Suggest a logo style for brand "${name}". Return JSON: {"fontIndex": 0-19, "weight": 400-900, "layout": "horizontal"|"vertical"|"text-only"|"monogram"|"badge"|"stacked"|"minimal"|"underline", "paletteIndex": 0-14, "iconIndex": 0-41, "reason": "one sentence"}`;
      const text=await session.prompt(prompt);
      const json=JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
      applyAISuggestion(json);
      res.textContent=json.reason||'Applied!';
      session.destroy();
      return;
    }catch(e){/* fallback */}
  }

  // Keyword-based fallback
  const lower=name.toLowerCase();
  let suggestion={fontIndex:0,weight:700,layout:'horizontal',paletteIndex:0,iconIndex:0,reason:''};
  if(/tech|app|code|dev|digital|cyber|ai|data/.test(lower)){
    suggestion={fontIndex:3,weight:600,layout:'horizontal',paletteIndex:9,iconIndex:32,reason:'Tech brands work well with geometric sans-serifs and electric colors.'};
  }else if(/food|cafe|cook|kitchen|bak|restaurant/.test(lower)){
    suggestion={fontIndex:15,weight:700,layout:'vertical',paletteIndex:7,iconIndex:34,reason:'Food brands shine with warm serif fonts and gold tones.'};
  }else if(/nature|eco|green|garden|organic|leaf/.test(lower)){
    suggestion={fontIndex:11,weight:600,layout:'horizontal',paletteIndex:6,iconIndex:8,reason:'Nature brands pair best with friendly fonts and forest greens.'};
  }else if(/luxury|royal|premium|gold|elite/.test(lower)){
    suggestion={fontIndex:16,weight:700,layout:'stacked',paletteIndex:7,iconIndex:13,reason:'Luxury brands call for elegant serifs and gold accents.'};
  }else if(/fitness|sport|gym|active|run|train/.test(lower)){
    suggestion={fontIndex:14,weight:900,layout:'horizontal',paletteIndex:12,iconIndex:21,reason:'Fitness brands need bold, impactful display fonts with energetic colors.'};
  }else if(/art|design|creative|studio|craft/.test(lower)){
    suggestion={fontIndex:5,weight:600,layout:'vertical',paletteIndex:4,iconIndex:29,reason:'Creative brands benefit from modern clean fonts and lavender tones.'};
  }else if(/music|sound|audio|beat|rhythm/.test(lower)){
    suggestion={fontIndex:4,weight:700,layout:'horizontal',paletteIndex:13,iconIndex:35,reason:'Music brands pair well with clean sans-serifs and midnight purples.'};
  }else{
    suggestion={fontIndex:1,weight:700,layout:'horizontal',paletteIndex:0,iconIndex:4,reason:'A versatile modern style that works for most brands.'};
  }
  applyAISuggestion(suggestion);
  res.textContent=suggestion.reason;
}

function applyAISuggestion(s){
  if(s.fontIndex!=null)S.font=Math.min(FONTS.length-1,Math.max(0,s.fontIndex));
  if(s.weight)S.weight=s.weight;
  if(s.layout)S.layout=s.layout;
  if(s.paletteIndex!=null){
    const p=PALETTES[Math.min(PALETTES.length-1,Math.max(0,s.paletteIndex))];
    S.primary=p.colors[0];S.secondary=p.colors[1];S.iconColor=p.colors[0];
  }
  if(s.iconIndex!=null)S.icon=Math.min(ICONS.length-1,Math.max(0,s.iconIndex));
  buildControls();render();
}

// ============================================================
// HISTORY & FAVORITES
// ============================================================
const HK='fds-logo-hist',FK='fds-logo-favs';
function loadLS(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let lastSavedHash='';
function saveHistory(){
  const snap=stateSnap();
  const hash=JSON.stringify(snap);
  if(hash===lastSavedHash)return;
  lastSavedHash=hash;
  const h=loadLS(HK);
  h.unshift(snap);
  if(h.length>30)h.length=30;
  saveLS(HK,h);
  updateHFCounts();
}

function stateSnap(){
  return{...S,ts:Date.now()};
}

function updateHFCounts(){
  document.getElementById('hfTabH').textContent=`History (${loadLS(HK).length})`;
  document.getElementById('hfTabF').textContent=`Favorites (${loadLS(FK).length})`;
}

let hfTab='history';
function renderHF(){
  const items=hfTab==='history'?loadLS(HK):loadLS(FK);
  const grid=document.getElementById('hfGrid');
  if(!items.length){grid.innerHTML=`<div class="hf-empty">No ${hfTab} yet.</div>`;return;}
  grid.innerHTML=items.map((it,i)=>{
    const actions=hfTab==='history'
      ?`<button data-addFav="${i}" title="Save to favorites">&#9829;</button>`
      :`<button data-rmFav="${i}" title="Remove">&#215;</button>`;
    return `<div class="hf-card" data-restore="${i}"><div class="hf-card-actions">${actions}</div><div class="hf-card-top"><div class="hf-card-dot" style="background:${it.primary||'#ec4899'}"></div><div class="hf-card-name">${it.name||'Acme'}</div></div><div class="hf-card-meta">${FONTS[it.font]?.name||'?'} ${it.weight||700} / ${it.layout||'?'}</div></div>`;
  }).join('');
}

// HF events
document.getElementById('hfBtn').onclick=()=>{
  document.getElementById('hfDrawer').classList.add('open');
  document.getElementById('hfOverlay').classList.add('open');
  renderHF();
};
function closeHF(){
  document.getElementById('hfDrawer').classList.remove('open');
  document.getElementById('hfOverlay').classList.remove('open');
}
document.getElementById('hfClose').onclick=closeHF;
document.getElementById('hfOverlay').onclick=closeHF;

document.querySelectorAll('.hf-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.hf-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    hfTab=tab.dataset.tab;
    renderHF();
  };
});

document.getElementById('hfGrid').addEventListener('click',e=>{
  const addBtn=e.target.closest('[data-addFav]');
  if(addBtn){
    e.stopPropagation();
    const items=loadLS(HK);
    const snap=items[+addBtn.dataset.addfav];
    if(snap){const f=loadLS(FK);f.unshift(snap);if(f.length>50)f.length=50;saveLS(FK,f);updateHFCounts();renderHF();}
    return;
  }
  const rmBtn=e.target.closest('[data-rmFav]');
  if(rmBtn){
    e.stopPropagation();
    const f=loadLS(FK);f.splice(+rmBtn.dataset.rmfav,1);saveLS(FK,f);updateHFCounts();renderHF();
    return;
  }
  const card=e.target.closest('[data-restore]');
  if(card){
    const items=hfTab==='history'?loadLS(HK):loadLS(FK);
    const snap=items[+card.dataset.restore];
    if(snap){
      const ts=snap.ts;delete snap.ts;
      Object.assign(S,snap);
      buildControls();render();
      closeHF();
    }
  }
});

// ============================================================
// BRAND PACK EXPORT (all sizes for all platforms)
// ============================================================
async function downloadBrandPack(){
  const btn=$('expBrandPack');
  btn.disabled=true;btn.textContent='Generating pack...';

  const svg=generateSVG();
  const name=(S.name||'logo').toLowerCase().replace(/[^a-z0-9]/g,'-');
  const sizes=[
    {name:'logo-primary',w:800,h:400},
    {name:'favicon-32',w:32,h:32},
    {name:'favicon-16',w:16,h:16},
    {name:'apple-touch-icon-180',w:180,h:180},
    {name:'android-192',w:192,h:192},
    {name:'android-512',w:512,h:512},
    {name:'og-image-1200x630',w:1200,h:630},
    {name:'twitter-card-1200x675',w:1200,h:675},
    {name:'icon-square-256',w:256,h:256},
    {name:'icon-square-64',w:64,h:64},
    {name:'watermark-200',w:200,h:100},
  ];

  // Generate each size as PNG
  const files=[];
  files.push({name:`${name}.svg`,content:svg,type:'image/svg+xml'});

  for(const size of sizes){
    try{
      const canvas=document.createElement('canvas');
      canvas.width=size.w;canvas.height=size.h;
      const ctx=canvas.getContext('2d');
      // White background for non-transparent sizes
      if(!size.name.includes('watermark')){
        ctx.fillStyle=size.name.includes('og-')||size.name.includes('twitter-')?S.primary||'#ec4899':'#ffffff';
        ctx.fillRect(0,0,size.w,size.h);
        if(size.name.includes('og-')||size.name.includes('twitter-')){
          // Draw logo centered on colored bg
          ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,size.w,size.h);
        }
      }
      const img=new Image();
      const blob=new Blob([svg],{type:'image/svg+xml'});
      const url=URL.createObjectURL(blob);
      await new Promise((resolve,reject)=>{
        img.onload=()=>{
          // Center the logo in the canvas
          const scale=Math.min(size.w*0.8/img.naturalWidth,size.h*0.8/img.naturalHeight,1);
          const w=img.naturalWidth*scale;
          const h=img.naturalHeight*scale;
          ctx.drawImage(img,(size.w-w)/2,(size.h-h)/2,w,h);
          URL.revokeObjectURL(url);
          resolve();
        };
        img.onerror=reject;
        img.src=url;
      });
      const dataUrl=canvas.toDataURL('image/png');
      files.push({name:`${name}-${size.name}.png`,dataUrl});
    }catch(e){console.warn('Failed to generate',size.name,e);}
  }

  // Download as individual files (ZIP requires a library, so we create a simple HTML manifest)
  // First download SVG
  const svgBlob=new Blob([svg],{type:'image/svg+xml'});
  downloadBlob(svgBlob,`${name}.svg`);

  // Then download a manifest HTML that shows all sizes and lets user save each
  const manifest=`<!DOCTYPE html><html><head><title>${S.name} Brand Pack</title><style>
body{font-family:Manrope,system-ui,sans-serif;background:#fafafa;padding:2rem;max-width:900px;margin:0 auto}
h1{font-size:1.5rem}p{color:#6b7280;font-size:.85rem;margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem;text-align:center}
.item img{max-width:100%;height:auto;margin-bottom:.5rem;background:repeating-conic-gradient(#f3f4f6 0% 25%, transparent 0% 50%) 50% / 16px 16px}
.item .name{font-size:.75rem;font-weight:600;margin-bottom:.3rem}
.item .size{font-size:.65rem;color:#6b7280}
.item a{display:inline-block;margin-top:.5rem;font-size:.72rem;color:#ec4899;font-weight:600}
</style></head><body>
<h1>${S.name} — Brand Pack</h1>
<p>Right-click any image and "Save As" to download. SVG is the master file.</p>
<div class="grid">
${files.map(f=>{
  if(f.dataUrl)return`<div class="item"><img src="${f.dataUrl}"><div class="name">${f.name}</div><a href="${f.dataUrl}" download="${f.name}">Download</a></div>`;
  return'';
}).join('')}
</div></body></html>`;

  const manifestBlob=new Blob([manifest],{type:'text/html'});
  const mUrl=URL.createObjectURL(manifestBlob);
  window.open(mUrl,'_blank');

  btn.disabled=false;btn.innerHTML='Download Brand Pack (all sizes)';
}

function downloadBlob(blob,filename){
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

// INIT
// ============================================================
buildControls();
render();
updateHFCounts();
</script>
